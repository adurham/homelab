    - name: "Living Room (Right) Vent Position"
      unique_id: living_room_5d8e_vent_position
      unit_of_measurement: "%"
      state: "{{ state_attr('cover.living_room_5d8e_vent_2', 'current_tilt_position') | float(0) }}"

    - name: "Main Bedroom (A) Vent Position"
      unique_id: main_bedroom_a96d_vent_position
      unit_of_measurement: "%"
      state: "{{ state_attr('cover.main_bedroom_a96d_vent_2', 'current_tilt_position') | float(0) }}"

