      unique_id: kitchen_d124_vent_position
      unit_of_measurement: "%"
      state: "{{ state_attr('cover.kitchen_d124_vent_2', 'current_tilt_position') | float(0) }}"

    - name: "Dining Room Vent Position"
      unique_id: dining_room_7a28_vent_position
      unit_of_measurement: "%"
      state: "{{ state_attr('cover.dining_room_7a28_vent_2', 'current_tilt_position') | float(0) }}"

    - name: "Hallway Vent Position"
      unique_id: hallway_907e_vent_position
      unit_of_measurement: "%"
      state: "{{ state_attr('cover.hallway_907e_vent_2', 'current_tilt_position') | float(0) }}"

    - name: "Guest Bedroom 2 Vent Position"
      unique_id: guest_bedroom_2_1ec7_vent_position
      unit_of_measurement: "%"
      state: "{{ state_attr('cover.guest_bedroom_2_1ec7_vent_2', 'current_tilt_position') | float(0) }}"

    - name: "Hallway Temperature"
      unique_id: hallway_temperature
      unit_of_measurement: "°F"
      device_class: temperature
      state: "{{ state_attr('climate.ecobee_thermostat', 'current_temperature') | float(0) }}"

    - name: "Laundry Room Vent Position"
      unique_id: laundry_room_d189_vent_position
      unit_of_measurement: "%"
      state: "{{ state_attr('cover.laundry_room_d189_vent_2', 'current_tilt_position') | float(0) }}"

    - name: "Main Bathroom Vent Position"
      unique_id: main_bathroom_f586_vent_position
      unit_of_measurement: "%"
      state: "{{ state_attr('cover.main_bathroom_f586_vent_2', 'current_tilt_position') | float(0) }}"

    - name: "Salon Temperature"
      unique_id: salon_temperature
      unit_of_measurement: "°F"
      device_class: temperature
      state: "{{ states('sensor.basement_heatpump_basement_office_ac_ambient_temp') | float(0) }}"

    - name: "Heat Pump Water Heater"
      unique_id: edgewater_road_power_minute_average_water_heater
      unit_of_measurement: "W"
      device_class: power
      state: "{{ states('sensor.econet_hpwh_power') | float(0) }}"

    - name: "Game Room (A) Vent Position"
      unique_id: game_room_0c83_vent_position
      unit_of_measurement: "%"
      state: "{{ state_attr('cover.game_room_0c83_vent', 'current_tilt_position') | float(0) }}"

    - name: "Game Room (B) Vent Position"
      unique_id: game_room_89ae_vent_position
      unit_of_measurement: "%"
      state: "{{ state_attr('cover.game_room_89ae_vent', 'current_tilt_position') | float(0) }}"

    - name: "Guest Bedroom 1 Vent Position"
      unique_id: guest_bedroom_1_8136_vent_position
      unit_of_measurement: "%"
      state: "{{ state_attr('cover.guest_bedroom_1_8136_vent', 'current_tilt_position') | float(0) }}"

    - name: "Basement Vent Position"
      unique_id: basement_4d79_vent_position
      unit_of_measurement: "%"
      state: "{{ state_attr('cover.basement_4d79_vent', 'current_tilt_position') | float(0) }}"

    - name: "House Temperature Delta"
      unique_id: house_temperature_delta
      unit_of_measurement: "°F"
      state: >
        {% set temps = [
          states('sensor.dining_room_temperature') | float(0),
          states('sensor.main_bedroom_temperature') | float(0),
          states('sensor.living_room_temperature') | float(0),
          states('sensor.kitchen_temperature') | float(0),
          states('sensor.guest_bedroom_1_temperature') | float(0),
          states('sensor.game_room_temperature') | float(0),
          states('sensor.guest_bedroom_2_temperature') | float(0),
          states('sensor.cat_room_temperature') | float(0),
          states('sensor.main_bathroom_temperature') | float(0),
          states('sensor.half_bathroom_temperature') | float(0),
          states('sensor.laundry_room_temperature') | float(0),
          states('sensor.guest_bathroom_temperature') | float(0)
        ] | select('>', 0) | list %}
        {{ (temps | max - temps | min) | round(1) if temps | count > 0 else 0 }}

    - name: "House Average Temperature"
      unique_id: house_average_temperature
      unit_of_measurement: "°F"
      state: >
        {% set temps = [
          states('sensor.dining_room_temperature') | float(0),
          states('sensor.main_bedroom_temperature') | float(0),
          states('sensor.living_room_temperature') | float(0),
          states('sensor.kitchen_temperature') | float(0),
          states('sensor.guest_bedroom_1_temperature') | float(0),
          states('sensor.game_room_temperature') | float(0),
          states('sensor.guest_bedroom_2_temperature') | float(0),
          states('sensor.cat_room_temperature') | float(0),
          states('sensor.main_bathroom_temperature') | float(0),
          states('sensor.half_bathroom_temperature') | float(0),
          states('sensor.laundry_room_temperature') | float(0),
          states('sensor.guest_bathroom_temperature') | float(0)
        ] | select('>', 0) | list %}
        {{ (temps | sum / temps | count) | round(1) if temps | count > 0 else 0 }}

    # ── Humidity / dew-point observability ────────────────────────────────
    # The ecobee's reliable live indoor RH lives in a CLIMATE attribute
    # (climate.ecobee_thermostat current_humidity). The standalone
    # sensor.edgewater_road_current_humidity goes stale/frozen and is the only
    # humidity series Prometheus was exporting -> dashboards plotted a flat
    # wrong line. Mirror the climate attribute into a real sensor so the
    # /api/prometheus export (and Grafana) sees the TRUE indoor RH.
    - name: "Indoor Humidity Live"
      unique_id: indoor_humidity_live
      unit_of_measurement: "%"
      device_class: humidity
      state_class: measurement
      state: "{{ state_attr('climate.ecobee_thermostat', 'current_humidity') | float(0) }}"

    # Indoor dew point (°F) via Magnus-Tetens. Computed in °C then converted.
    # Dew point is the real comfort/moisture metric — RH alone is temp-relative.
    - name: "Indoor Dew Point"
      unique_id: indoor_dew_point
      unit_of_measurement: "°F"
      device_class: temperature
      state_class: measurement
      state: >
        {% set tf = state_attr('climate.ecobee_thermostat', 'current_temperature') | float(0) %}
        {% set rh = state_attr('climate.ecobee_thermostat', 'current_humidity') | float(0) %}
        {% if tf > 0 and rh > 0 %}
          {% set tc = (tf - 32) * 5 / 9 %}
          {% set a = 17.27 %}
          {% set b = 237.7 %}
          {% set g = (a * tc / (b + tc)) + log(rh / 100) %}
          {% set dc = (b * g) / (a - g) %}
          {{ (dc * 9 / 5 + 32) | round(1) }}
        {% else %}
          {{ none }}
        {% endif %}

    # Outdoor dew point (°F) from the weather integration. met.no exposes
    # dew_point directly as a forecast attribute; fall back to computing it
    # from temperature + humidity if the attribute is ever missing.
    - name: "Outdoor Dew Point"
      unique_id: outdoor_dew_point
      unit_of_measurement: "°F"
      device_class: temperature
      state_class: measurement
      state: >
        {% set dp = state_attr('weather.forecast_home', 'dew_point') %}
        {% if dp is not none %}
          {{ dp | float | round(1) }}
        {% else %}
          {% set tf = state_attr('weather.forecast_home', 'temperature') | float(0) %}
          {% set rh = state_attr('weather.forecast_home', 'humidity') | float(0) %}
          {% if tf != 0 and rh > 0 %}
            {% set tc = (tf - 32) * 5 / 9 %}
            {% set g = (17.27 * tc / (237.7 + tc)) + log(rh / 100) %}
            {% set dc = (237.7 * g) / (17.27 - g) %}
            {{ (dc * 9 / 5 + 32) | round(1) }}
          {% else %}
            {{ none }}
          {% endif %}
        {% endif %}

    # Dew-point spread (°F): outdoor minus indoor. Positive = outdoor air is
    # WETTER than inside, so opening windows / pulling in fresh air ADDS
    # moisture. Drives the "don't open windows" alert.
    - name: "Dew Point Spread"
      unique_id: dew_point_spread
      unit_of_measurement: "°F"
      state_class: measurement
      state: >
        {% set o = states('sensor.outdoor_dew_point') | float(-99) %}
        {% set i = states('sensor.indoor_dew_point') | float(-99) %}
        {% if o > -90 and i > -90 %}
          {{ (o - i) | round(1) }}
        {% else %}
          {{ none }}
        {% endif %}

- binary_sensor:
    # ON when outdoor air is meaningfully wetter than indoor air (>=2°F dew
    # point spread) — i.e. opening windows would raise indoor humidity. Keep
    # the house sealed while this is on.
    - name: "Outdoor Air Wetter Than Indoor"
      unique_id: outdoor_air_wetter_than_indoor
      device_class: moisture
      delay_on: "00:05:00"
      delay_off: "00:10:00"
      state: "{{ states('sensor.dew_point_spread') | float(0) >= 2 }}"

    - name: "Washing Machine Running"
      unique_id: washing_machine_running
      delay_off: "00:05:00"
      device_class: running
      state: "{{ states('sensor.laundry_switch_plug_power') | float(0) > 10 }}"

    - name: "House Occupied"
      unique_id: house_occupied
      device_class: occupancy
      state: >
        {{ is_state('binary_sensor.kitchen_occupancy', 'on') or
           is_state('binary_sensor.dining_room_occupancy', 'on') or
           is_state('binary_sensor.main_bedroom_occupancy', 'on') or
           is_state('binary_sensor.living_room_occupancy', 'on') or
           is_state('binary_sensor.guest_bedroom_1_occupancy', 'on') or
           is_state('binary_sensor.game_room_occupancy', 'on') or
           is_state('binary_sensor.guest_bedroom_2_occupancy', 'on') or
           is_state('binary_sensor.cat_room_occupancy', 'on') or
           is_state('binary_sensor.main_bathroom_occupancy', 'on') or
           is_state('binary_sensor.half_bathroom_occupancy', 'on') or
           is_state('binary_sensor.laundry_room_occupancy', 'on') or
           is_state('binary_sensor.guest_bathroom_occupancy', 'on') or
           is_state('binary_sensor.nest_protect_living_room_occupancy', 'on') or
           is_state('binary_sensor.nest_protect_foyer_occupancy', 'on') }}
