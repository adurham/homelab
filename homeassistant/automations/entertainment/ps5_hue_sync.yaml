# PS5 Hue Sync - Simplified with Intelligent Scene Restore
- alias: "Entertainment: PS5 Hue Sync"
  id: "ps5_hue_sync_simple"
  description: "Sync lights when PS5 is on, and intelligently restore previous state/scene"
  mode: restart

  trigger:
    # Trigger when HDMI 2 changes state (PS5 Power)
    - platform: state
      entity_id: sensor.living_room_sync_box_hdmi2_status
      id: "ps5_on"
    - platform: state
      entity_id: sensor.living_room_sync_box_hdmi2_status
      to: "unplugged"
      for: "00:00:15"
      id: "ps5_off"

  action:
    - choose:
        # ON Sequence: PS5 Wakes Up
        - conditions:
            - condition: trigger
              id: "ps5_on"
            - condition: state
              entity_id: sensor.living_room_sync_box_hdmi2_status
              state: "linked"
            - condition: state
              entity_id: switch.living_room_sync_box_light_sync
              state: "off"
          sequence:
            # CAPTURE: Determine if a dynamic scene is active and save its name
            - service: input_text.set_value
              target:
                entity_id: input_text.living_room_active_scene
              data:
                value: >
                  {% if state_attr('light.living_room', 'dynamics') == true or state_attr('light.living_room', 'hue_scene') %}
                    {{ state_attr('light.living_room', 'hue_scene') | default('none') }}
                  {% else %}
                    none
                  {% endif %}

            # CAPTURE: Always create a static snapshot as the ultimate fallback
            - service: scene.create
              data:
                scene_id: "before_ps5_sync"
                snapshot_entities: "light.living_room"

            # Start Light Sync
            - service: switch.turn_on
              target:
                entity_id: switch.living_room_sync_box_light_sync

        # OFF Sequence: PS5 Sleeps
        - conditions:
            - condition: trigger
              id: "ps5_off"
          sequence:
            # Stop Light Sync
            - service: switch.turn_off
              target:
                entity_id: switch.living_room_sync_box_light_sync

            # Wait for sync box to release lights
            - delay: "00:00:02"

            # RESTORE: Choose between Dynamic Scene or Static Snapshot
            - choose:
                # If we saved a valid scene name, reactivate it
                - conditions:
                    - condition: template
                      value_template: "{{ states('input_text.living_room_active_scene') not in ['none', 'unknown', 'unavailable'] }}"
                  sequence:
                    - service: hue.activate_scene
                      target:
                        entity_id: light.living_room
                      data:
                        scene_name: "{{ states('input_text.living_room_active_scene') }}"
              # Corrected: default is a direct property of choose
              default:
                - service: scene.turn_on
                  target:
                    entity_id: scene.before_ps5_sync

            # Clear the helper
            - service: input_text.set_value
              target:
                entity_id: input_text.living_room_active_scene
              data:
                value: "none"
