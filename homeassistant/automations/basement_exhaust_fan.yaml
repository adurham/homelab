- alias: "Basement Exhaust Fan CO2 On"
  id: "basement_exhaust_fan_co2_on"
  description: >
    Turns on the basement exhaust fan when CO2 rises above 800 ppm.
    Whole-house strategy: negative pressure pulls outside air in via
    infiltration; ecobee 30/60 circulate distributes through ducts.
    Runs regardless of HVAC blower state — 100 CFM is not enough to
    cause meaningful pressure issues.
  mode: single
  max_exceeded: silent

  trigger:
    - platform: numeric_state
      entity_id: sensor.ecobee_edgewater_road_co2
      above: 800
    - platform: homeassistant
      event: start

  condition:
    - condition: numeric_state
      entity_id: sensor.ecobee_edgewater_road_co2
      above: 800

  action:
    - service: switch.turn_on
      target:
        entity_id: switch.basement_exhaust_fan

- alias: "Basement Exhaust Fan CO2 Off"
  id: "basement_exhaust_fan_co2_off"
  description: >
    Turns off the basement exhaust fan when CO2 drops below 550 ppm.
    250 ppm hysteresis (on at 800, off at 550) prevents short-cycling
    and pushes harder than the old 900/700 to actually win against
    evening occupancy loads.
  mode: single
  max_exceeded: silent

  trigger:
    - platform: numeric_state
      entity_id: sensor.ecobee_edgewater_road_co2
      below: 550

  action:
    - service: switch.turn_off
      target:
        entity_id: switch.basement_exhaust_fan

- alias: "Basement Exhaust Fan Baseline On"
  id: "basement_exhaust_fan_baseline_on"
  description: >
    Baseline ventilation: runs fan 15 min at the top of every hour
    regardless of CO2. At 100 CFM × 25% duty that's ~25 CFM average —
    roughly ASHRAE 62.2 minimum for 2 people in a tight-ish envelope.
    Prevents CO2 from climbing uncontested during evening occupancy.
  mode: single
  max_exceeded: silent

  trigger:
    - platform: time_pattern
      minutes: "0"

  action:
    - service: switch.turn_on
      target:
        entity_id: switch.basement_exhaust_fan

- alias: "Basement Exhaust Fan Baseline Off"
  id: "basement_exhaust_fan_baseline_off"
  description: >
    Ends the hourly baseline run 15 min after it started — unless CO2
    is still above the ON threshold, in which case the CO2 On path
    holds the fan until CO2 drops to 550 ppm.
  mode: single
  max_exceeded: silent

  trigger:
    - platform: time_pattern
      minutes: "15"

  condition:
    - condition: numeric_state
      entity_id: sensor.ecobee_edgewater_road_co2
      below: 800

  action:
    - service: switch.turn_off
      target:
        entity_id: switch.basement_exhaust_fan
