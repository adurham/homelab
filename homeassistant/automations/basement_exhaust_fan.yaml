- alias: "Basement Exhaust Fan After HVAC"
  id: "basement_exhaust_fan_after_hvac"
  description: >
    Runs basement exhaust fan for 5 minutes after HVAC blower stops
    to draw fresh air in via negative pressure. Max 30 minutes per hour.
  mode: single
  max_exceeded: silent

  trigger:
    - platform: state
      entity_id: climate.ecobee_thermostat
      attribute: hvac_action
      to: "idle"

  condition:
    # Check runtime budget (max 30 min per rolling hour)
    - condition: template
      value_template: >
        {% set window_start = state_attr(
          'input_datetime.exhaust_fan_window_start',
          'timestamp'
        ) | default(0) %}
        {% set elapsed = now().timestamp() - window_start %}
        {% set runtime = states('input_number.exhaust_fan_runtime_minutes') | float(0) %}
        {% if elapsed > 3600 %}
          true
        {% else %}
          {{ runtime + 5 <= 30 }}
        {% endif %}

  action:
    # Reset hour window if expired
    - if:
        - condition: template
          value_template: >
            {% set window_start = state_attr(
              'input_datetime.exhaust_fan_window_start',
              'timestamp'
            ) | default(0) %}
            {{ (now().timestamp() - window_start) > 3600 }}
      then:
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.exhaust_fan_window_start
          data:
            timestamp: "{{ now().timestamp() }}"
        - service: input_number.set_value
          target:
            entity_id: input_number.exhaust_fan_runtime_minutes
          data:
            value: 0

    # Record start time for reboot recovery
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.exhaust_fan_last_started
      data:
        timestamp: "{{ now().timestamp() }}"

    # Turn on exhaust fan
    - service: switch.turn_on
      target:
        entity_id: switch.basement_exhaust_fan

    # Run for 5 minutes
    - delay: "00:05:00"

    # Turn off exhaust fan
    - service: switch.turn_off
      target:
        entity_id: switch.basement_exhaust_fan

    # Update runtime counter
    - service: input_number.set_value
      target:
        entity_id: input_number.exhaust_fan_runtime_minutes
      data:
        value: "{{ states('input_number.exhaust_fan_runtime_minutes') | float(0) + 5 }}"

- alias: "Basement Exhaust Fan CO2 Override"
  id: "basement_exhaust_fan_co2_override"
  description: >
    Runs basement exhaust fan and HVAC fan continuously when indoor CO2 exceeds
    1000 ppm. Bypasses the normal runtime budget since this is health-related.
    Loops until CO2 drops below 1000 ppm, checking every 5 minutes.
  mode: single
  max_exceeded: silent

  trigger:
    - platform: numeric_state
      entity_id: sensor.ecobee_edgewater_road_co2
      above: 1000
    # Also trigger when sensor appears (e.g. after HA restart) already above threshold
    - platform: state
      entity_id: sensor.ecobee_edgewater_road_co2
      from: "unavailable"
    - platform: state
      entity_id: sensor.ecobee_edgewater_road_co2
      from: "unknown"

  condition:
    # Ensure CO2 is actually above 1000 (needed for the from-unavailable triggers)
    - condition: numeric_state
      entity_id: sensor.ecobee_edgewater_road_co2
      above: 1000

  action:
    - service: switch.turn_on
      target:
        entity_id: switch.basement_exhaust_fan

    # Turn on HVAC fan to circulate air throughout the house
    - service: climate.set_fan_mode
      target:
        entity_id: climate.ecobee_thermostat
      data:
        fan_mode: "on"

    - service: persistent_notification.create
      data:
        title: "CO2 Override Active"
        message: "Indoor CO2 at {{ states('sensor.ecobee_edgewater_road_co2') }} ppm. Exhaust fan and HVAC fan running until below 1000 ppm."
        notification_id: "co2_override"

    # Loop until CO2 drops below 1000 ppm, checking every 5 minutes
    - repeat:
        while:
          - condition: numeric_state
            entity_id: sensor.ecobee_edgewater_road_co2
            above: 1000
        sequence:
          - delay: "00:05:00"

    # CO2 is now below 1000 ppm — restore HVAC fan to auto
    - service: climate.set_fan_mode
      target:
        entity_id: climate.ecobee_thermostat
      data:
        fan_mode: "auto"

    - service: persistent_notification.create
      data:
        title: "CO2 Override Complete"
        message: "CO2 dropped to {{ states('sensor.ecobee_edgewater_road_co2') }} ppm. HVAC fan restored to auto."
        notification_id: "co2_override"

    # Keep exhaust fan running for 5 minutes after HVAC fan goes idle
    - wait_for_trigger:
        - platform: state
          entity_id: climate.ecobee_thermostat
          attribute: hvac_action
          to: "idle"
      timeout: "00:30:00"
      continue_on_timeout: true

    - delay: "00:05:00"

    # If CO2 climbed back above 1000 during wind-down, re-enter the loop
    - if:
        - condition: numeric_state
          entity_id: sensor.ecobee_edgewater_road_co2
          above: 1000
      then:
        - service: climate.set_fan_mode
          target:
            entity_id: climate.ecobee_thermostat
          data:
            fan_mode: "on"

        - service: persistent_notification.create
          data:
            title: "CO2 Override Re-engaged"
            message: "CO2 back above 1000 ppm ({{ states('sensor.ecobee_edgewater_road_co2') }} ppm). Resuming override."
            notification_id: "co2_override"

        # Re-enter the loop
        - repeat:
            while:
              - condition: numeric_state
                entity_id: sensor.ecobee_edgewater_road_co2
                above: 1000
            sequence:
              - delay: "00:05:00"

        - service: climate.set_fan_mode
          target:
            entity_id: climate.ecobee_thermostat
          data:
            fan_mode: "auto"

    - service: switch.turn_off
      target:
        entity_id: switch.basement_exhaust_fan

    - service: persistent_notification.create
      data:
        title: "CO2 Exhaust Fan Off"
        message: "Exhaust fan off after post-idle cooldown. CO2 at {{ states('sensor.ecobee_edgewater_road_co2') }} ppm."
        notification_id: "co2_override"
