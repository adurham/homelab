- alias: "Hot Water Recovery Manager"
  id: "hot_water_recovery_manager"
  mode: single
  max_exceeded: silent

  # POLICY: Eco Mode is NEVER used. The unit rests in Heat Pump (compressor-only,
  # COP ~3.5) which holds the 140F setpoint on its own tight internal deadband and
  # still dehumidifies the basement. Eco Mode's only "savings" come from letting the
  # tank coast cold between cycles, which we do not want -- it short-cycled the
  # compressor and never let the tank reach setpoint.
  #
  # This automation does exactly two things, plus one guardrail:
  #   1. Crash-out (<35% hot water capacity) -> High Demand (compressor + resistive
  #      electric elements) for rapid recovery.
  #   2. Recovered (lower tank within 5F of setpoint) -> back to Heat Pump.
  #   3. Guardrail: if the unit ever lands in Eco Mode, force it back to Heat Pump.

  trigger:
    # Trigger 1: Hot water capacity crashed out (emergency)
    - platform: numeric_state
      entity_id: sensor.econet_hpwh_hot_water
      below: 35
      id: "low_hot_water"

    # Trigger 2: Recovery complete (lower tank within 5F of setpoint)
    - platform: template
      value_template: >
        {{ states('sensor.econet_hpwh_lower_tank_temperature')|float(0) >
           (state_attr('climate.econet_hpwh', 'temperature')|float(140) - 5) }}
      id: "recovery_complete"

    # Trigger 3: Eco guardrail (unit somehow entered Eco Mode)
    - platform: state
      entity_id: climate.econet_hpwh
      attribute: preset_mode
      to: "Eco Mode"
      id: "eco_guard"

  condition: []

  action:
    - choose:
        # Case A: Crash-out -> High Demand (compressor + electric elements)
        - conditions:
            - condition: trigger
              id: "low_hot_water"
            - condition: not
              conditions:
                - condition: state
                  entity_id: climate.econet_hpwh
                  attribute: preset_mode
                  state: "High Demand"
          sequence:
            - service: climate.set_preset_mode
              target:
                entity_id: climate.econet_hpwh
              data:
                preset_mode: "High Demand"
            - service: persistent_notification.create
              data:
                title: "Hot Water Emergency Recovery"
                message: >
                  Hot water capacity low (<35%). Switched to High Demand
                  (electric elements) for rapid recovery.

        # Case B: Recovery complete -> back to Heat Pump (resting state)
        - conditions:
            - condition: trigger
              id: "recovery_complete"
            - condition: state
              entity_id: climate.econet_hpwh
              attribute: preset_mode
              state: "High Demand"
          sequence:
            - service: climate.set_preset_mode
              target:
                entity_id: climate.econet_hpwh
              data:
                preset_mode: "Heat Pump"
            - service: persistent_notification.create
              data:
                title: "Hot Water Recovery Complete"
                message: >
                  Lower tank recovered to
                  {{ states('sensor.econet_hpwh_lower_tank_temperature')|round(0) }}°F.
                  Returning to Heat Pump mode.

        # Case C: Eco guardrail -> never rest in Eco Mode
        - conditions:
            - condition: trigger
              id: "eco_guard"
          sequence:
            - service: climate.set_preset_mode
              target:
                entity_id: climate.econet_hpwh
              data:
                preset_mode: "Heat Pump"
            - service: persistent_notification.create
              data:
                title: "Hot Water: Eco Mode Blocked"
                message: >
                  Unit entered Eco Mode; forced back to Heat Pump
                  (Eco is disabled by policy).
