# Robust Laundry Monitor
- alias: "Laundry: Washing Machine Finished"
  id: "laundry_washing_machine_finished"
  description: "Notify when the washing machine cycle is complete (Resilient to restarts)"
  mode: single

  trigger:
    - platform: state
      entity_id: binary_sensor.washing_machine_running
      from: "on"
      to: "off"

  action:
    # 1. Voice Announcement
    - service: tts.google_translate_say
      target:
        entity_id: media_player.kitchen_display
      data:
        message: "The laundry is done. Please move the clothes."

    # 2. Critical/Phone Notification (Update this when notify service is confirmed)
    - service: notify.mobile_app_adams_iphone_16
      data:
        title: "Laundry Status"
        message: "The washing machine has finished its cycle."
