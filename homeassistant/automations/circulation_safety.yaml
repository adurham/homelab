- alias: "Circulation Safety Watchdog"
  id: "circulation_safety_watchdog"
  mode: single
  max_exceeded: silent

  trigger:
    - platform: homeassistant
      event: start

  action:
    # Force all relay-controlled devices OFF to prevent orphaned state
    - service: switch.turn_off
      target:
        entity_id:
          - switch.shelly1minig3_28372f21c1dc
          - switch.basement_exhaust_fan

    # If exhaust fan was mid-cycle, account for partial runtime
    - if:
        - condition: template
          value_template: >
            {% set last = state_attr(
              'input_datetime.exhaust_fan_last_started',
              'timestamp'
            ) | default(0) %}
            {% set window = state_attr(
              'input_datetime.exhaust_fan_window_start',
              'timestamp'
            ) | default(0) %}
            {{ last > 0 and last >= window and
               (now().timestamp() - last) < 300 }}
      then:
        - service: input_number.set_value
          target:
            entity_id: input_number.exhaust_fan_runtime_minutes
          data:
            value: >
              {% set last = state_attr(
                'input_datetime.exhaust_fan_last_started',
                'timestamp'
              ) | default(0) %}
              {% set partial = ((now().timestamp() - last) / 60) | round(0) %}
              {% set current = states('input_number.exhaust_fan_runtime_minutes') | float(0) %}
              {{ current + partial }}

    - service: persistent_notification.create
      data:
        title: "Safety Watchdog"
        message: "Circulation pump and exhaust fan forced OFF on startup to prevent orphaned state."

    # After cleanup, re-engage exhaust fan if CO2 is high
    - if:
        - condition: numeric_state
          entity_id: sensor.ecobee_edgewater_road_co2
          above: 800
      then:
        - service: switch.turn_on
          target:
            entity_id: switch.basement_exhaust_fan
        - service: persistent_notification.create
          data:
            title: "CO2 Override Active"
            message: "Post-startup: CO2 at {{ states('sensor.ecobee_edgewater_road_co2') }} ppm. Exhaust fan re-engaged."
            notification_id: "co2_override"
