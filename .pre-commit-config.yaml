---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-yaml
        # Skip files that aren't plain YAML: ansible-vault, j2 templates,
        # and HA configs that use !secret / !include custom tags.
        exclude: |
          (?x)^(
            ansible/group_vars/all/.*\.yml|
            ansible/inventory/group_vars/all\.yml|
            homeassistant/.*|
            .*\.j2|
            .*ansible-vault.*
          )$
      - id: detect-private-key

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        # Match the CI shellcheck severity (style/note skipped)
        args: [--severity=warning]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c, .yamllint]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
        # Skip the scripts/ tree — legacy diagnostic tooling that's not
        # actively maintained; reformatting pollutes git blame.
        exclude: ^scripts/

  - repo: local
    hooks:
      - id: ansible-lint
        name: Ansible Lint
        # Run from the ansible/ directory so ansible-lint picks up
        # ansible.cfg (it has relative paths that require this cwd) and
        # actually scans files instead of silently exiting 0.
        entry: bash -c 'cd ansible && ansible-lint --offline'
        language: system
        files: ^ansible/.*\.(yaml|yml)$
        pass_filenames: false
