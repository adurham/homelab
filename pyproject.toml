[tool.ruff]
line-length = 120
target-version = "py312"
extend-exclude = [
    # Snapshot of an upstream HA integration kept for reference; not loadable
    # without sibling __init__.py / const.py / coordinator.py.
    "flair_sensor.py",
]

[tool.ruff.lint]
# Start with a pragmatic core: errors, pyflakes, warnings, bugbear, security.
# Skip I (import sort) and UP (pyupgrade) globally — too noisy across legacy
# Tanium diagnostic scripts. New code is welcome to add them per-file.
select = ["E", "F", "W", "B", "S"]
ignore = [
    "E501",  # line length (yamllint warns on YAML; not enforcing for Python)
    "E741",  # ambiguous variable names like `l` (legacy network/protocol code)
    "F541",  # f-string without placeholders (cosmetic)
    "S101",  # asserts ok in scripts
    "S603",  # subprocess call: case-by-case
    "S607",  # partial executable paths in scripts
]

[tool.ruff.lint.per-file-ignores]
"scripts/**" = ["S105", "S106"]
# Legacy diagnostic / one-off Tanium scripts — quiet pre-existing style and
# inherited security warnings without weakening rules globally.
"scripts/tanium/**" = [
    "S105", "S106",
    "S113",  # requests without timeout (legacy)
    "S310",  # urlopen scheme audit (config-driven URLs)
    "S314",  # xml.etree on untrusted data
    "S318",  # xml.dom.minidom on untrusted data
    "E402",  # module-level import not at top (legacy layout)
    "E701",  # multiple statements on one line (legacy formatting)
    "F401",  # unused imports
    "F841",  # unused locals
    "B007",  # unused loop variable
    "B018",  # useless expression
    "B904",  # raise from
]
"homeassistant/**" = [
    "S310",  # urlopen against config-file URL is fine
]
