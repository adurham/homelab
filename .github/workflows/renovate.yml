name: Renovate

on:
  schedule:
    # Mondays 08:00 UTC = 03:00 CT — Renovate filters its own actions via
    # the `schedule` field in renovate.json, so this just gives it a chance
    # to wake up; it'll only open PRs in the configured window.
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.13
        with:
          configurationFile: .github/renovate.json
          # PAT must have repo + workflow scopes so Renovate can open PRs
          # that touch .github/workflows/. Configure as a repo secret named
          # RENOVATE_TOKEN. The default GITHUB_TOKEN won't work for
          # renovatebot/github-action.
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          # Without this, renovate logs "No repositories found" — it doesn't
          # auto-discover from the workflow's repo unless told to.
          RENOVATE_REPOSITORIES: ${{ github.repository }}
