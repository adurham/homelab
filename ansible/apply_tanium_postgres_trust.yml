---
# WARNING: lab-only convenience play.
# Adds a passwordless ("trust") PostgreSQL pg_hba entry scoped to the
# lab subnet (172.16.0.0/24) and opens the listener port in iptables on
# every Tanium platform appliance (TS x2, TMS x2). Do not apply on shared,
# internet-reachable, or production Tanium servers.
#
# scripts/tanium/open_psql.sh does the same thing per-host as a fallback.

- name: Open Tanium Postgres for lab subnet access
  hosts: tanium_servers:tanium_modules
  gather_facts: false
  vars:
    lab_subnet: "172.16.0.0/24"
    candidate_services:
      - postgresql-ts
      - postgresql-tms

  tasks:
    - name: Find enabled Postgres service
      ansible.builtin.command: "systemctl is-enabled {{ item }}"
      register: pg_check
      changed_when: false
      failed_when: false
      check_mode: false
      loop: "{{ candidate_services }}"

    - name: Resolve service name from enabled candidate
      ansible.builtin.set_fact:
        pg_service: >-
          {{ (pg_check.results
              | selectattr('rc', 'equalto', 0)
              | map(attribute='item')
              | list
              | first)
              | default('') }}

    - name: Fail if no candidate Postgres service is enabled
      ansible.builtin.fail:
        msg: "Neither postgresql-ts nor postgresql-tms is enabled on this host."
      when: pg_service == ""

    - name: Read systemd Environment for the enabled service
      ansible.builtin.command: "systemctl show {{ pg_service }} --property=Environment"
      register: pg_env
      changed_when: false
      check_mode: false

    - name: Extract PGDATA and PGPORT
      ansible.builtin.set_fact:
        pg_data: "{{ pg_env.stdout | regex_search('PGDATA=\\S+') | default('PGDATA=', true) | regex_replace('^PGDATA=', '') }}"
        pg_port: "{{ pg_env.stdout | regex_search('PGPORT=\\d+') | default('PGPORT=', true) | regex_replace('^PGPORT=', '') }}"

    - name: Fail if PGDATA or PGPORT could not be parsed
      ansible.builtin.fail:
        msg: "Could not parse PGDATA/PGPORT from `systemctl show {{ pg_service }}`: {{ pg_env.stdout }}"
      when: pg_data == "" or pg_port == ""

    - name: Open Postgres port in iptables for lab subnet
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "{{ pg_port }}"
        source: "{{ lab_subnet }}"
        jump: ACCEPT
        action: insert
        state: present
      become: true

    - name: Add lab-subnet trust entry to pg_hba.conf
      ansible.builtin.lineinfile:
        path: "{{ pg_data }}/pg_hba.conf"
        line: "host    all    all    {{ lab_subnet }}    trust"
        state: present
      become: true
      notify: Reload Postgres

    # Persistence: install open_psql.sh + a oneshot unit that runs every time
    # postgres starts. iptables rules don't survive a reboot, so we re-apply
    # them on each postgres start. The script is idempotent (no-op when state
    # is already correct).
    - name: Install open_psql.sh on the appliance
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../scripts/tanium/open_psql.sh"
        dest: /usr/local/bin/open_psql.sh
        owner: root
        group: root
        mode: '0755'
      become: true

    - name: Install tanium-postgres-lab-trust systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/tanium-postgres-lab-trust.service
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=Open Tanium Postgres for lab-subnet trust access (lab-only)
          After=postgresql-ts.service postgresql-tms.service

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/open_psql.sh
          # No RemainAfterExit — unit must return to inactive (dead) after
          # success so subsequent postgres starts re-trigger it via the
          # WantedBy chain. Keeping it "active" would make systemd skip
          # re-runs as already-satisfied.

          [Install]
          WantedBy=postgresql-ts.service postgresql-tms.service
      become: true
      notify: Restart trust unit

    # Cleanup: an earlier version of open_psql.sh added an iptables rule
    # without a source filter (open to all). Remove any such rule, leaving
    # only the lab-subnet-scoped one created by the iptables task above.
    - name: Remove legacy open-to-all postgres iptables rule
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "{{ pg_port }}"
        jump: ACCEPT
        state: absent
      become: true

    - name: Enable tanium-postgres-lab-trust to run on postgres start
      ansible.builtin.systemd:
        name: tanium-postgres-lab-trust.service
        enabled: true
        daemon_reload: true
      become: true

  handlers:
    - name: Reload Postgres
      ansible.builtin.systemd:
        name: "{{ pg_service }}"
        state: reloaded
      become: true

    # When the unit definition changes, force a fresh run so systemd
    # re-evaluates state under the new options. Otherwise a unit left
    # in `active (exited)` from a previous definition won't re-trigger
    # via WantedBy on the next postgres start.
    - name: Restart trust unit
      ansible.builtin.systemd:
        name: tanium-postgres-lab-trust.service
        state: restarted
        daemon_reload: true
      become: true
