---
# Two-stage deploy of the encrypted media store (browser gallery):
#   1. media_gallery_host runs on pve02 to create the LXC (vmid 115,
#      ip_media_gallery, hostname gallery-01) and inject SSH keys + TUN
#      passthrough for Tailscale.
#   2. media_gallery runs against the CT to install rclone + the gallery/thumb/
#      trash/upload services, the manifest builder, the dedup scanner, and the
#      single-page app, wiring the systemd units. Access is via lb-01 (Authentik
#      SSO); the services themselves are firewalled to lb-01 + loopback only.
#
# Usage:
#   ansible-playbook deploy_media_gallery.yml --ask-vault-pass

- name: Provision Media Gallery Container
  hosts: pve02
  gather_facts: false
  roles:
    - media_gallery_host

- name: Deploy Media Gallery Services
  hosts: media_gallery
  gather_facts: true
  roles:
    - media_gallery
