---
- name: Install unzip dependency
  ansible.builtin.apt:
    name: unzip
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Download promtail release zip
  ansible.builtin.get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-linux-amd64.zip"
    dest: "/tmp/promtail-{{ promtail_version }}.zip"
    mode: '0644'

- name: Extract promtail binary
  ansible.builtin.unarchive:
    src: "/tmp/promtail-{{ promtail_version }}.zip"
    dest: /tmp/
    remote_src: true
    creates: /tmp/promtail-linux-amd64

- name: Install binary
  ansible.builtin.copy:
    src: /tmp/promtail-linux-amd64
    dest: /usr/local/bin/promtail
    remote_src: true
    owner: root
    group: root
    mode: '0755'
  notify: Restart promtail

- name: Create promtail state directory
  ansible.builtin.file:
    path: /var/lib/promtail
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create config directory
  ansible.builtin.file:
    path: /etc/promtail
    state: directory
    mode: '0755'

- name: Render promtail config
  ansible.builtin.template:
    src: promtail.yml.j2
    dest: /etc/promtail/promtail.yml
    owner: root
    group: root
    mode: '0644'
  notify: Restart promtail

- name: Deploy promtail systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/promtail.service
    content: |
      [Unit]
      Description=Promtail log shipper
      After=network.target

      [Service]
      # Runs as root to read /var/log/journal. Could be tightened with
      # systemd-journal group membership but root is simpler for a homelab.
      User=root
      Type=simple
      ExecStart=/usr/local/bin/promtail -config.file=/etc/promtail/promtail.yml
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  notify: Restart promtail

- name: Flush handlers so config/binary changes apply before enable
  ansible.builtin.meta: flush_handlers

- name: Start and enable promtail
  ansible.builtin.systemd:
    name: promtail
    state: started
    enabled: true
    daemon_reload: true

- name: Cleanup tmp
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/promtail-{{ promtail_version }}.zip"
    - "/tmp/promtail-linux-amd64"
