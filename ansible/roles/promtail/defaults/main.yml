---
# Promtail was removed from Loki releases starting at v3.7.0 — Grafana is
# pushing Alloy as its successor. We keep using Promtail 3.0.0 (the last
# version we deployed when it was still bundled with Loki); newer Loki is
# backwards-compatible with older Promtail per upstream docs. See
# docs/promtail-to-alloy-plan.md for the planned migration off Promtail.
promtail_version: "3.0.0"
# Loki push endpoint. Uses vm-01's private-subnet IP from inventory so this
# resolves regardless of whether the source host has DNS.
loki_url: "http://{{ hostvars['vm-01']['ansible_host'] }}:3100/loki/api/v1/push"
promtail_port: 9080
