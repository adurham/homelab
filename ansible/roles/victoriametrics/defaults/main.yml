---
victoriametrics_version: "1.143.0"

# homeassistant_token comes from inventory/group_vars/all.yml (vault-encrypted)

# Public-facing HTTPS endpoints we probe for cert expiry + reachability.
# Override at inventory level if a host should add/remove targets.
blackbox_https_targets:
  - https://grafana.chi.lab.amd-e.com
  - https://auth.chi.lab.amd-e.com
  - https://proxmox.chi.lab.amd-e.com

# Admin UIs that iframe their own console pane same-origin. Probed with the
# https_iframe_self_ok module — fails if X-Frame-Options: DENY or
# CSP frame-ancestors 'none' is returned, both of which silently break the
# in-app console pane in the browser.
blackbox_iframe_self_targets:
  - https://proxmox.chi.lab.amd-e.com
  - https://tanium.chi.lab.amd-e.com
