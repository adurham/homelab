---
- name: Install dependencies
  ansible.builtin.apt:
    name:
      - nginx
      - git
      - socat
      - curl
    state: present
    update_cache: true
    cache_valid_time: 3600

# LAN ingress: lb-01's eth1 (vmbr0) gets a STATIC IP so Google Home can
# port-forward :80/:443 to a stable target. Static (not DHCP) because
# systemd-networkd won't reliably hold a DHCP lease on this CT and AdGuard
# (the LAN DHCP server) reservations are an extra dependency. CRITICAL: no
# Gateway= here — default egress must stay via the private SDN gateway on eth0,
# or lb-01's return traffic to backends takes the LAN path and causes
# asymmetric-routing 502s (the bug we hit when first adding this NIC).
- name: Configure LAN ingress interface (static, no default route)
  ansible.builtin.copy:
    dest: /etc/systemd/network/eth1.network
    owner: root
    group: root
    mode: '0644'
    content: |
      [Match]
      Name = eth1

      [Network]
      Description = LAN ingress (Google Home forwards :80/:443 here) — static
      Address = {{ lb_lan_ingress_ip | default('192.168.86.86') }}/24
      IPv6AcceptRA = false
  register: lb_eth1_net

- name: Restart systemd-networkd if ingress config changed
  ansible.builtin.systemd:
    name: systemd-networkd
    state: restarted
  when: lb_eth1_net.changed

- name: Create SSL Directory
  ansible.builtin.file:
    path: /etc/nginx/ssl
    state: directory
    mode: '0755'

- name: Install acme.sh
  ansible.builtin.shell: |
    set -o pipefail
    curl https://get.acme.sh | sh -s email=admin@lab.amd-e.com
  args:
    executable: /bin/bash
    creates: /root/.acme.sh/acme.sh

- name: Register ACME Account (Let's Encrypt)
  ansible.builtin.shell: |
    set -o pipefail
    /root/.acme.sh/acme.sh --register-account -m admin@lab.amd-e.com --server letsencrypt
  args:
    executable: /bin/bash
  register: loadbalancer_service_acme_reg
  changed_when: "'Account created' in loadbalancer_service_acme_reg.stdout"
  failed_when: >
    loadbalancer_service_acme_reg.rc != 0 and
    "already registered" not in loadbalancer_service_acme_reg.stdout and
    "Account already exists" not in loadbalancer_service_acme_reg.stderr

# acme.sh saves the DNS-plugin env var into account.conf on every run.
# Past runs corrupted SAVED_DEDYN_TOKEN to a literal placeholder string
# ("SAVED_...Qr7'"), which then masked $DEDYN_TOKEN at issue time and made
# deSEC return "invalid domain". Strip any saved token before issuing — the
# real one is exported below from vault every time anyway.
- name: Remove any stale SAVED_DEDYN_TOKEN from acme.sh account.conf
  ansible.builtin.lineinfile:
    path: /root/.acme.sh/account.conf
    regexp: '^SAVED_DEDYN_TOKEN='
    state: absent
  failed_when: false  # account.conf may not exist on first run

# --dnssleep 60 gives deSEC time to commit both TXT records on
# _acme-challenge.chi.lab.amd-e.com before LE polls. Without it the second
# challenge often races and LE returns "Incorrect TXT record".
- name: Issue Certificate (DNS-01 Wildcard)
  ansible.builtin.shell: |
    set -o pipefail
    /root/.acme.sh/acme.sh --issue \
    --server letsencrypt \
    --dns dns_desec \
    --dnssleep 60 \
    -d "*.chi.lab.amd-e.com" \
    -d chi.lab.amd-e.com
  environment:
    DEDYN_TOKEN: "{{ acme_dedyn_token_proxmox }}"
    noip_username: "{{ noip_username }}"
    noip_password: "{{ noip_password }}"
  no_log: true
  args:
    executable: /bin/bash
  register: loadbalancer_service_acme_issue
  changed_when: "'Cert success' in loadbalancer_service_acme_issue.stdout"
  failed_when: >
    loadbalancer_service_acme_issue.rc != 0 and
    "Domains not changed" not in loadbalancer_service_acme_issue.stdout

- name: Install Certificate to Nginx (Wildcard) # noqa: no-handler
  ansible.builtin.shell: |
    set -o pipefail
    /root/.acme.sh/acme.sh --install-cert -d "*.chi.lab.amd-e.com" \
    --key-file       /etc/nginx/ssl/wildcard.key \
    --fullchain-file /etc/nginx/ssl/wildcard.fullchain.cer \
    --reloadcmd     "systemctl reload nginx"
  args:
    executable: /bin/bash
  when: loadbalancer_service_acme_issue.changed

- name: Deploy WhoAmI Script
  ansible.builtin.template:
    src: whoami.py.j2
    dest: /usr/local/bin/whoami.py
    mode: '0755'
    owner: root
    group: root
  notify: Restart WhoAmI

- name: Deploy WhoAmI Service
  ansible.builtin.template:
    src: whoami.service.j2
    dest: /etc/systemd/system/whoami.service
    mode: '0644'
    owner: root
    group: root
  notify: Restart WhoAmI

- name: Start WhoAmI Service
  ansible.builtin.systemd:
    name: whoami
    state: started
    enabled: true
    daemon_reload: true

- name: Add Authentik to Hosts File
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ ip_authentik }} auth.chi.lab.amd-e.com"
    state: present

- name: Deploy Nginx Configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/proxmox
    mode: '0644'
    owner: root
    group: root
  notify:
    - Validate Nginx Config
    - Restart Nginx

- name: Enable Nginx Site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/proxmox
    dest: /etc/nginx/sites-enabled/proxmox
    state: link
  notify: Restart Nginx

- name: Remove Default Site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Restart Nginx

- name: Create Proxmox Web Directory
  ansible.builtin.file:
    path: /var/www/html/proxmox
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Deploy OIDC Redirect Page
  ansible.builtin.template:
    src: redirect_oidc.html.j2
    dest: /var/www/html/proxmox/redirect_oidc.html
    mode: '0644'
    owner: root
    group: root

  notify: Restart Nginx

- name: Configure DDNS (No-IP)
  ansible.builtin.include_tasks: ddns.yml
