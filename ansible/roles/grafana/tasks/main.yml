---
- name: Install dependencies
  ansible.builtin.apt:
    name:
      - curl
      - gnupg2
      - software-properties-common
      - apt-transport-https
    state: present
    update_cache: true

- name: Add Grafana GPG Key
  ansible.builtin.get_url:
    url: https://packages.grafana.com/gpg.key
    dest: /usr/share/keyrings/grafana.key
    mode: '0644'

- name: Add Grafana Repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/grafana.key] https://packages.grafana.com/oss/deb stable main"
    state: present
    filename: grafana

- name: Install Grafana
  ansible.builtin.apt:
    name: grafana
    state: present
    update_cache: true

- name: Install Dependencies for Image Renderer
  ansible.builtin.apt:
    name:
      - libasound2
      - libatk-bridge2.0-0
      - libcups2
      - libdrm2
      - libgbm1
      - libnss3
      - libxcomposite1
      - libxdamage1
      - libxrandr2
      - libxshmfence1
      - libx11-xcb1
      - libxfixes3
      - libxkbcommon0
      - fontconfig
      - fonts-dejavu-core
    state: present

- name: Install Build Dependencies
  ansible.builtin.apt:
    name:
      - git
      - sudo
      - chromium
      - curl
    state: present
    update_cache: true

# Detect installed Go version via the VERSION file Go ships at the
# install root (e.g. "go1.26.2\nlinux/amd64\n...").
- name: Detect installed Go version
  ansible.builtin.command: cat /usr/local/go/VERSION
  register: current_go
  failed_when: false
  changed_when: false

# If the installed version doesn't match what we want, blow away the
# existing tree so the unarchive below won't be no-op'd by `creates:`.
- name: Remove old Go install if version mismatched
  ansible.builtin.file:
    path: /usr/local/go
    state: absent
  when:
    - current_go.rc == 0
    - ('go' + go_version) not in current_go.stdout
  become: true

- name: Install Golang {{ go_version }}
  ansible.builtin.unarchive:
    src: "https://go.dev/dl/go{{ go_version }}.linux-amd64.tar.gz"
    dest: /usr/local
    remote_src: true
    creates: /usr/local/go/bin/go
  become: true

- name: Create Renderer Directory
  ansible.builtin.file:
    path: /usr/local/share/grafana-image-renderer
    state: directory
    owner: grafana
    group: grafana
    mode: '0755'

- name: Clone Grafana Image Renderer
  ansible.builtin.git:
    repo: https://github.com/grafana/grafana-image-renderer.git
    dest: /usr/local/share/grafana-image-renderer
    version: "{{ grafana_image_renderer_version }}"
    force: true
  become: true
  become_user: grafana
  notify: Restart Image Renderer

- name: Build Grafana Image Renderer (Go)
  ansible.builtin.shell: |
    /usr/local/go/bin/go build -buildvcs=false -o grafana-image-renderer .
  args:
    chdir: /usr/local/share/grafana-image-renderer
  become: true
  become_user: grafana
  environment:
    CGO_ENABLED: "0"
    GOCACHE: "/usr/local/share/grafana-image-renderer/.cache/go-build"
    GOMODCACHE: "/usr/local/share/grafana-image-renderer/.cache/go-mod"
  changed_when: true
  notify: Restart Image Renderer

- name: Deploy Image Renderer Service
  ansible.builtin.copy:
    dest: /etc/systemd/system/grafana-image-renderer.service
    content: |
      [Unit]
      Description=Grafana Image Renderer
      After=network.target

      [Service]
      ExecStart=/usr/local/share/grafana-image-renderer/grafana-image-renderer server
      WorkingDirectory=/usr/local/share/grafana-image-renderer
      Restart=always
      User=grafana
      Group=grafana
      Environment=HTTP_PORT=8081
      Environment=CHROME_BIN=/usr/bin/chromium
      Environment=GF_RENDERER_PLUGIN_MODE=true

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  notify: Restart Image Renderer

- name: Enable and Start Image Renderer Service
  ansible.builtin.systemd:
    name: grafana-image-renderer
    enabled: true
    state: started

- name: Remove Old Plugin (Cleanup)
  ansible.builtin.file:
    path: /var/lib/grafana/plugins/grafana-image-renderer
    state: absent
  notify: Restart Grafana

- name: Configure Grafana SSO (Authentik)
  no_log: true
  ansible.builtin.copy:
    dest: /etc/grafana/grafana.ini
    mode: '0640'
    content: |
      [server]
      root_url = https://grafana.chi.lab.amd-e.com

      [auth.generic_oauth]
      enabled = true
      name = Authentik
      allow_sign_up = true
      client_id = {{ grafana_client_id }}
      client_secret = {{ grafana_client_secret }}
      scopes = openid profile email
      auth_url = https://auth.chi.lab.amd-e.com/application/o/authorize/
      token_url = https://auth.chi.lab.amd-e.com/application/o/token/
      api_url = https://auth.chi.lab.amd-e.com/application/o/userinfo/
      role_attribute_path = contains(groups[*], 'Grafana Admins') && 'Admin' || contains(groups[*], 'Grafana Editors') && 'Editor' || 'Viewer'

      [security]
      admin_password = {{ grafana_admin_password }}

      [rendering]
      server_url = http://localhost:8081/render
      callback_url = http://localhost:3000/
      renderer_log_level = debug

      [unified_alerting]
      enabled = true

      [smtp]
      enabled = true
      host = {{ ip_mail_server }}:25
      from_address = grafana@chi.lab.amd-e.com
      from_name = Grafana Homelab
      skip_verify = true

- name: Create Provisioning Directory
  ansible.builtin.file:
    path: /etc/grafana/provisioning/datasources
    state: directory
    mode: '0755'

- name: Configure VictoriaMetrics Datasource
  ansible.builtin.template:
    src: datasource.yml.j2
    dest: /etc/grafana/provisioning/datasources/victoriametrics.yml
    mode: '0644'
  notify: Restart Grafana

- name: Create Dashboard Provisioning Directory
  ansible.builtin.file:
    path: /etc/grafana/provisioning/dashboards
    state: directory
    mode: '0755'

- name: Create Dashboard Storage Directory
  ansible.builtin.file:
    path: /var/lib/grafana/dashboards
    state: directory
    owner: grafana
    group: grafana
    mode: '0755'

- name: Configure Dashboard Provider
  ansible.builtin.template:
    src: dashboards.yml.j2
    dest: /etc/grafana/provisioning/dashboards/default.yml
    mode: '0644'
  notify: Restart Grafana

- name: Deploy Node Exporter Dashboard (Patched)
  ansible.builtin.copy:
    src: node_exporter_full.json
    dest: /var/lib/grafana/dashboards/node-exporter-full.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: Restart Grafana

- name: Deploy Logs (Loki) Dashboard
  ansible.builtin.copy:
    src: logs_loki.json
    dest: /var/lib/grafana/dashboards/logs-loki.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: Restart Grafana

- name: Deploy Blackbox Probes Dashboard
  ansible.builtin.copy:
    src: blackbox_probes.json
    dest: /var/lib/grafana/dashboards/blackbox-probes.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: Restart Grafana

- name: Deploy Homelab Status Dashboard
  ansible.builtin.copy:
    src: homelab_status.json
    dest: /var/lib/grafana/dashboards/homelab-status.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: Restart Grafana

- name: Deploy Smart Circulation Dashboard
  ansible.builtin.copy:
    src: smart_circulation.json
    dest: /var/lib/grafana/dashboards/smart_circulation.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: Restart Grafana
- name: Deploy Energy Dashboard
  ansible.builtin.copy:
    src: energy.json
    dest: /var/lib/grafana/dashboards/energy.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: Restart Grafana

- name: Deploy Heat Pump Water Heater Dashboard
  ansible.builtin.copy:
    src: heat_pump_water_heater.json
    dest: /var/lib/grafana/dashboards/heat_pump_water_heater.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: Restart Grafana

- name: Deploy Climate Dashboard
  ansible.builtin.copy:
    src: climate.json
    dest: /var/lib/grafana/dashboards/climate.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: Restart Grafana

- name: Create Alerting Provisioning Directory
  ansible.builtin.file:
    path: /etc/grafana/provisioning/alerting
    state: directory
    mode: '0755'

- name: Provision Grafana Alerting Contact Points
  ansible.builtin.template:
    src: alerting_contact_points.yml.j2
    dest: /etc/grafana/provisioning/alerting/contact_points.yml
    mode: '0644'
  notify: Restart Grafana

- name: Provision Grafana Notification Policies
  ansible.builtin.template:
    src: alerting_policies.yml.j2
    dest: /etc/grafana/provisioning/alerting/policies.yml
    mode: '0644'
  notify: Restart Grafana

- name: Provision Grafana Alert Rules
  ansible.builtin.template:
    src: alerting_rules.yml.j2
    dest: /etc/grafana/provisioning/alerting/rules.yml
    mode: '0644'
  notify: Restart Grafana

- name: Configure Grafana Environment (Unsigned Plugins)
  ansible.builtin.lineinfile:
    path: /etc/default/grafana-server
    line: 'GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=grafana-image-renderer'
    create: true
    mode: '0644'
  notify: Restart Grafana

- name: Start Grafana
  ansible.builtin.service:
    name: grafana-server
    state: started
    enabled: true
