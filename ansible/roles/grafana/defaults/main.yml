---
# Bump in lockstep with grafana-image-renderer's go.mod requirement.
# As of 2026-04-30 the upstream master needed >= 1.26.x, and 1.25.6
# triggered an auto-toolchain download that fails on the grafana user's
# perms inside the CT.
go_version: "1.26.2"

# grafana-image-renderer release tag. Pinned (not `master`) so upstream
# changes don't silently break the build at re-deploy time.
grafana_image_renderer_version: "v5.8.3"
