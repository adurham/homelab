---
# HA-aware node resolution. The authentik role touches TWO CTs:
#   - CT 101 (tailscale-gw) is used as an SSH/network bastion via `pct exec`.
#   - CT 100 (authentik) is the CT this role manages.
# Both can be HA-migrated independently, so resolve each owning node. Resolve
# 101 first and stash it as gw_node; resolve 100 last so ct_node/ct_exists
# refer to the managed CT for every management task below.
- name: Resolve owning node for Tailscale GW CT (bastion)
  ansible.builtin.include_role:
    name: resolve_ct_node
  vars:
    ct_vmid: 101

- name: Stash Tailscale GW owning node
  ansible.builtin.set_fact:
    gw_node: "{{ ct_node }}"

- name: Resolve owning node for Authentik CT
  ansible.builtin.include_role:
    name: resolve_ct_node
  vars:
    ct_vmid: 100

- name: Update Template Database
  ansible.builtin.command: pveam update
  changed_when: false
  when: not ct_exists

- name: Download Ubuntu 22.04 Template
  ansible.builtin.command: pveam download local ubuntu-22.04-standard_22.04-1_amd64.tar.zst
  args:
    creates: /var/lib/vz/template/cache/ubuntu-22.04-standard_22.04-1_amd64.tar.zst
  register: authentik_host_template_download

- name: Get Tailscale Gateway IP (Bastion)
  ansible.builtin.shell: |
    set -o pipefail
    pct exec 101 -- ip -4 addr show eth0 | grep -oP '(?<=inet\s)\d+(\.\d+){3}'
  delegate_to: "{{ gw_node }}"
  register: authentik_host_gw_ip
  changed_when: false

- name: Create Authentik Container (Private Net)
  # --unprivileged 1 + keyctl=1: Authentik runs Docker (compose) inside the
  # CT, which needs nesting + keyctl to function in an unprivileged LXC.
  # The live CT (created before this hardening) is still privileged; this
  # only takes effect on a fresh rebuild. Conversion in-place isn't
  # supported (uid/gid offsets differ) — would require backup → recreate
  # → restore.
  ansible.builtin.command: >
    pct create 100 /var/lib/vz/template/cache/ubuntu-22.04-standard_22.04-1_amd64.tar.zst
    --hostname authentik
    --cores 2 --memory 2048 --swap 512
    --net0 name=eth0,bridge={{ net_private_bridge }},ip={{ ip_authentik }}/24,gw={{ net_private_gw }},firewall=1
    --storage nvme-data
    --unprivileged 1
    --features nesting=1,keyctl=1
    --password "{{ authentik_host_lxc_password }}"
    --ssh-public-keys /root/.ssh/authorized_keys
  changed_when: true
  when: not ct_exists
  no_log: true

- name: Start Authentik Container
  ansible.builtin.command: pct start 100
  delegate_to: "{{ ct_node }}"
  changed_when: true
  when: not ct_exists

# openssh-server ships with the Ubuntu LXC template but is not enabled by
# default. Enable it before the network-wait loop so the loop succeeds.
- name: Ensure SSH is enabled and running
  ansible.builtin.command: pct exec 100 -- systemctl enable --now ssh
  delegate_to: "{{ ct_node }}"
  changed_when: false

# Per-CT firewall — Authentik HTTP ports (80/443/9000/9443) reachable
# only from lb-01. pmxcfs rejects ansible's atomic template-then-rename;
# render to /tmp then cp (same pattern as apply_tanium_firewall.yml).
- name: Render authentik per-CT firewall to /tmp
  ansible.builtin.template:
    src: firewall.fw.j2
    dest: /tmp/100.fw
    mode: '0640'
  delegate_to: pve01

- name: Move authentik per-CT firewall into pmxcfs
  ansible.builtin.command: cp /tmp/100.fw /etc/pve/firewall/100.fw
  changed_when: true
  delegate_to: pve01

- name: Cleanup tmp .fw
  ansible.builtin.file:
    path: /tmp/100.fw
    state: absent
  delegate_to: pve01

- name: Wait for Container Network (via Gateway)
  ansible.builtin.shell: pct exec 101 -- timeout 1 bash -c "cat < /dev/null > /dev/tcp/{{ ip_authentik }}/22"
  delegate_to: "{{ gw_node }}"
  register: authentik_host_wait_net
  until: authentik_host_wait_net.rc == 0
  retries: 30
  delay: 5
  changed_when: false
  when: not ct_exists

- name: Add Authentik Host to Inventory
  ansible.builtin.add_host:
    name: "authentik"
    ansible_host: "{{ ip_authentik }}"
    ansible_user: "root"
    ansible_ssh_common_args: '-o ProxyCommand="ssh -W %h:%p -q root@{{ authentik_host_gw_ip.stdout }}"'
    groups: "authentik_containers"
