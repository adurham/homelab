---
- name: Install libpve-network-perl
  ansible.builtin.apt:
    name: libpve-network-perl
    state: present

- name: Check if SDN Zone exists
  ansible.builtin.command: pvesh get /cluster/sdn/zones/homelab
  register: zone_check
  failed_when: false
  changed_when: false
  run_once: true

- name: Create SDN Zone (VXLAN)
  ansible.builtin.command: >
    pvesh create /cluster/sdn/zones --type vxlan --zone homelab
    --peers {{ proxmox_cluster_peers }}
    --ipam pve
    --mtu 1450
  when: zone_check.rc != 0
  run_once: true
  notify: Apply SDN

# --- VNet: private (default service subnet) -----------------------------
- name: Check if VNet 'private' exists
  ansible.builtin.command: pvesh get /cluster/sdn/vnets/private
  register: vnet_check
  failed_when: false
  changed_when: false
  run_once: true

- name: Create VNet 'private'
  ansible.builtin.command: >
    pvesh create /cluster/sdn/vnets --vnet private --zone homelab --tag 100 --alias "Private Network"
  when: vnet_check.rc != 0
  run_once: true
  notify: Apply SDN

# --- VNet: bwt (Bandwidth Throttle repro lab) ---------------------------
# Isolated /24 for reproducing Tanium platform throttle behavior. Disjoint
# from `private` so BWT-lab load tests don't perturb the main service
# subnet. See group_vars/all/vars.yml (net_bwt_*) and docs/ipam.md.
- name: Check if VNet 'bwt' exists
  ansible.builtin.command: "pvesh get /cluster/sdn/vnets/{{ net_bwt_bridge }}"
  register: bwt_vnet_check
  failed_when: false
  changed_when: false
  run_once: true

- name: Create VNet 'bwt'
  ansible.builtin.command: >
    pvesh create /cluster/sdn/vnets
    --vnet {{ net_bwt_bridge }}
    --zone homelab
    --tag {{ net_bwt_vlan_tag }}
    --alias "BWT Repro Lab"
  when: bwt_vnet_check.rc != 0
  run_once: true
  notify: Apply SDN

# --- Subnet on BWT VNet --------------------------------------------------
# Adds a subnet definition so Proxmox can host-route the /24 and provide a
# gateway IP on each node (.gateway). Without this, traffic between VMs on
# different pve hosts works (VXLAN handles L2), but external routing (eg.
# pulling files from the Mac) needs the gateway populated.
- name: Check if BWT subnet exists
  ansible.builtin.command: "pvesh get /cluster/sdn/vnets/{{ net_bwt_bridge }}/subnets/homelab-{{ net_bwt_range | replace('/', '-') }}"
  register: bwt_subnet_check
  failed_when: false
  changed_when: false
  run_once: true

- name: Create BWT subnet
  ansible.builtin.command: >
    pvesh create /cluster/sdn/vnets/{{ net_bwt_bridge }}/subnets
    --subnet {{ net_bwt_range }}
    --type subnet
    --gateway {{ net_bwt_gw }}
    --snat 1
  when: bwt_subnet_check.rc != 0
  run_once: true
  notify: Apply SDN

- name: Force Apply SDN (If needed)
  ansible.builtin.command: pvesh set /cluster/sdn
  when: zone_check.rc != 0 or vnet_check.rc != 0 or bwt_vnet_check.rc != 0 or bwt_subnet_check.rc != 0
  run_once: true
