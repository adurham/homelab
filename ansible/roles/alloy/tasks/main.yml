---
# Install via the .deb published on grafana/alloy GitHub releases. Same
# distribution channel pattern as node_exporter / promtail / VM (all via
# GitHub release artifacts), and Renovate tracks `alloy_version` against
# grafana/alloy releases the same way.

- name: Install dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Detect installed alloy version
  ansible.builtin.command: dpkg-query -W -f='${Version}' alloy
  register: current_alloy
  failed_when: false
  changed_when: false

- name: Download alloy .deb
  ansible.builtin.get_url:
    url: "https://github.com/grafana/alloy/releases/download/v{{ alloy_version }}/alloy-{{ alloy_version }}-1.amd64.deb"
    dest: "/tmp/alloy-{{ alloy_version }}.deb"
    mode: '0644'
  when: current_alloy.rc != 0 or alloy_version not in current_alloy.stdout

- name: Install alloy package
  ansible.builtin.apt:
    deb: "/tmp/alloy-{{ alloy_version }}.deb"
    state: present
  when: current_alloy.rc != 0 or alloy_version not in current_alloy.stdout
  notify: Restart alloy

- name: Render alloy config
  ansible.builtin.template:
    src: config.alloy.j2
    dest: /etc/alloy/config.alloy
    owner: root
    group: alloy
    mode: '0640'
  notify: Restart alloy

- name: Configure alloy CLI args
  ansible.builtin.copy:
    dest: /etc/default/alloy
    owner: root
    group: root
    mode: '0644'
    content: |
      ## Managed by ansible — see roles/alloy/tasks/main.yml.
      CONFIG_FILE="/etc/alloy/config.alloy"
      CUSTOM_ARGS="--server.http.listen-addr={{ alloy_listen_addr }} --storage.path=/var/lib/alloy/data"
      RESTART_ON_UPGRADE=true
      WORKING_DIRECTORY=/var/lib/alloy/data
      USER=alloy
  notify: Restart alloy

- name: Flush handlers so config/package changes apply before enable
  ansible.builtin.meta: flush_handlers

- name: Start and enable alloy
  ansible.builtin.systemd:
    name: alloy
    state: started
    enabled: true
    daemon_reload: true

- name: Cleanup tmp .deb
  ansible.builtin.file:
    path: "/tmp/alloy-{{ alloy_version }}.deb"
    state: absent
