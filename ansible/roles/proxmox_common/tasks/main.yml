---
- name: Configure /etc/hosts for cluster members
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ hostvars[item].ansible_host }} {{ item }} {{ item }}.homelab.local"
    state: present
  loop: "{{ groups['proxmox_nodes'] }}"

- name: Remove Enterprise Repository Source
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/pve-enterprise.sources
    state: absent

- name: Remove Ceph Enterprise Repository Source
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/ceph.sources
    state: absent

- name: Enable No-Subscription Repository
  ansible.builtin.apt_repository:
    repo: "deb http://download.proxmox.com/debian/pve {{ ansible_facts['distribution_release'] }} pve-no-subscription"
    state: present
    filename: pve-no-subscription

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install common packages
  ansible.builtin.apt:
    name:
      - vim
      - htop
      - git
      - curl
      - zsh
    state: present

# ----- pve fleet hardening -----

- name: Purge unused squid from pve hosts
  # Was running on pve02 with zero access.log entries — leftover from
  # an earlier experiment, listening on 0.0.0.0:3128 unprotected. The
  # supported squid lives in CT 108 (roles/squid_proxy/) on :3129.
  ansible.builtin.apt:
    name: squid
    state: absent
    purge: true

- name: Disable + mask rpcbind (NFS portmap; we don't use NFS)
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    masked: true
  loop:
    - rpcbind.service
    - rpcbind.socket
  failed_when: false  # idempotent: already-masked / not-installed both ok
