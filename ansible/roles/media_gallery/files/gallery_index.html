<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>
<style>
  :root{
    --bg:#0d0f12; --panel:#15181d; --panel2:#1c2026; --text:#e7e9ee;
    --muted:#8a909b; --accent:#5b8cff; --border:#262b33;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  header{position:sticky;top:0;z-index:10;background:rgba(13,15,18,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--border);
    padding:12px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  header h1{font-size:17px;margin:0;font-weight:600;letter-spacing:.2px;}
  .sub{color:var(--muted);font-size:13px;}
  .spacer{flex:1}
  button{font:inherit;cursor:pointer;border:1px solid var(--border);
    background:var(--panel2);color:var(--text);border-radius:8px;
    padding:7px 12px;transition:background .15s,border-color .15s;}
  button:hover{background:#262c35;border-color:#39414c;}
  #backBtn{display:none;}
  select{font:inherit;background:var(--panel2);color:var(--text);
    border:1px solid var(--border);border-radius:8px;padding:7px 10px;}
  main{padding:16px;max-width:1500px;margin:0 auto;}

  /* folder grid */
  #folderGrid{display:grid;gap:14px;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));}
  .folder{position:relative;aspect-ratio:1/.82;border-radius:14px;overflow:hidden;
    cursor:pointer;background:var(--panel);border:1px solid var(--border);
    box-shadow:0 2px 8px rgba(0,0,0,.3);transition:transform .12s,box-shadow .12s;}
  .folder:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(0,0,0,.45);}
  .folder .cover{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    opacity:0;transition:opacity .35s;}
  .folder .cover.loaded{opacity:1;}
  .folder .grad{position:absolute;inset:0;
    background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.25) 38%,rgba(0,0,0,0) 65%);}
  .folder .meta{position:absolute;left:0;right:0;bottom:0;padding:12px 14px;}
  .folder .fname{font-size:16px;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.7);}
  .folder .fcount{font-size:12.5px;color:#cfd3db;text-shadow:0 1px 4px rgba(0,0,0,.7);}
  .folder .ftab{position:absolute;top:0;left:14px;width:54px;height:12px;
    background:var(--panel2);border-radius:0 0 6px 6px;border:1px solid var(--border);border-top:none;}

  /* photo grid */
  #photoGrid{display:grid;gap:10px;min-height:140px;
    grid-template-columns:repeat(auto-fill,minmax(var(--tilesize,170px),1fr));}
  #zoom{width:90px;vertical-align:middle;}
  .tile{position:relative;aspect-ratio:1/1;border-radius:10px;overflow:hidden;
    cursor:pointer;background:var(--panel);border:1px solid var(--border);}
  .tile img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;
    transition:opacity .3s;}
  .tile img.loaded{opacity:1;}
  .shimmer{position:absolute;inset:0;background:linear-gradient(100deg,
    #1a1d23 30%,#23272f 50%,#1a1d23 70%);background-size:200% 100%;
    animation:sh 1.3s linear infinite;}
  @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .tile.broken .shimmer{animation:none;background:var(--panel);
    display:flex;align-items:center;justify-content:center;}
  .tile.broken .shimmer::after{content:"\26A0";font-size:26px;color:#4a505b;}
  .tile.loaded .shimmer{display:none;}
  .badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:46px;height:46px;border-radius:50%;background:rgba(0,0,0,.55);
    display:flex;align-items:center;justify-content:center;pointer-events:none;}
  .badge::after{content:"";border-left:15px solid #fff;border-top:10px solid transparent;
    border-bottom:10px solid transparent;margin-left:4px;}
  .vtag{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.7);
    color:#fff;font-size:9.5px;font-weight:700;letter-spacing:.5px;
    padding:2px 5px;border-radius:4px;pointer-events:none;}
  .dlabel{position:absolute;left:0;right:0;bottom:0;padding:14px 8px 5px;
    font-size:11px;color:#dfe2e8;pointer-events:none;
    background:linear-gradient(to top,rgba(0,0,0,.78),transparent);}

  /* trash button on tiles */
  .trash{position:absolute;top:6px;right:6px;z-index:3;width:28px;height:28px;
    border-radius:50%;border:none;padding:0;display:flex;align-items:center;
    justify-content:center;font-size:14px;line-height:1;color:#fff;
    background:rgba(0,0,0,.6);opacity:0;transition:opacity .15s,background .15s;}
  .tile:hover .trash{opacity:1;}
  .trash:hover{background:#d23b3b;border:none;}
  /* on touch devices, always show */
  @media(hover:none){.tile .trash{opacity:.85;}}
  /* inline confirm pill */
  .confirm{position:absolute;top:6px;left:6px;right:6px;z-index:4;display:flex;
    gap:4px;}
  .confirm button{flex:1;padding:4px 0;font-size:11px;font-weight:700;
    border-radius:6px;border:none;}
  .confirm .yes{background:#d23b3b;color:#fff;}
  .confirm .yes:hover{background:#e85050;border:none;}
  .confirm .no{background:rgba(0,0,0,.7);color:#fff;}
  .confirm .no:hover{background:rgba(0,0,0,.85);border:none;}
  .tile.err{outline:2px solid #d23b3b;}
  .tile.err::after{content:"Delete failed";position:absolute;top:6px;left:6px;
    right:6px;z-index:5;background:#d23b3b;color:#fff;font-size:10px;font-weight:700;
    padding:3px 5px;border-radius:5px;text-align:center;}

  .state{text-align:center;color:var(--muted);padding:60px 20px;font-size:15px;}

  /* new-folder tile */
  .folder.newfolder{display:flex;align-items:center;justify-content:center;
    background:var(--panel2);border:1px dashed #39414c;box-shadow:none;}
  .folder.newfolder:hover{background:#222831;border-color:var(--accent);}
  .folder.newfolder .nf-inner{display:flex;flex-direction:column;align-items:center;
    gap:8px;color:var(--muted);font-size:15px;font-weight:600;}
  .folder.newfolder .nf-plus{font-size:38px;line-height:1;color:var(--accent);}
  .folder.empty .grad{background:linear-gradient(to top,rgba(0,0,0,.6),rgba(0,0,0,.1));}
  /* inline new-folder form (replaces the newfolder tile contents while creating) */
  .nf-form{display:flex;flex-direction:column;gap:6px;width:84%;}
  .nf-form input{font:inherit;background:var(--bg);color:var(--text);
    border:1px solid var(--border);border-radius:7px;padding:7px 9px;width:100%;}
  .nf-form .nf-row{display:flex;gap:6px;}
  .nf-form .nf-row button{flex:1;padding:6px 0;font-size:13px;}
  .nf-form .nf-row .nf-ok{background:var(--accent);border-color:var(--accent);color:#fff;}
  .nf-form .nf-row .nf-ok:hover{background:#4a7bee;}
  .nf-err{color:#e85050;font-size:11.5px;min-height:14px;}

  /* upload button + hidden input */
  #uploadBtn{display:none;}
  /* drag highlight on photo grid */
  #photoGrid.dragover{outline:3px dashed var(--accent);outline-offset:-6px;
    border-radius:12px;background:rgba(91,140,255,.06);}
  /* upload progress bar */
  #uploadBar{display:none;align-items:center;gap:12px;background:var(--panel);
    border:1px solid var(--border);border-radius:10px;padding:10px 14px;
    margin:0 0 14px;font-size:13.5px;}
  #uploadBar.show{display:flex;}
  #uploadBar .ub-track{flex:1;height:8px;background:var(--panel2);
    border-radius:5px;overflow:hidden;}
  #uploadBar .ub-fill{height:100%;width:0;background:var(--accent);
    transition:width .25s;}
  #uploadBar .ub-text{color:var(--muted);white-space:nowrap;}
  #uploadBar.done .ub-fill{background:#3ba35a;}
  #uploadBar.error .ub-fill{background:#d23b3b;}

  /* lightbox */
  #lb{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.92);
    display:none;align-items:center;justify-content:center;}
  #lb.open{display:flex;}
  #lb .media{max-width:92vw;max-height:90vh;}
  #lb img,#lb video{max-width:92vw;max-height:90vh;display:block;
    border-radius:6px;background:#000;}
  #lb .close{position:absolute;top:16px;right:20px;font-size:26px;line-height:1;
    padding:6px 14px;}
  #lb .nav{position:absolute;top:50%;transform:translateY(-50%);
    font-size:30px;padding:10px 18px;}
  #lb .prev{left:18px;} #lb .next{right:18px;}
  #lb .lbtrash{position:absolute;top:16px;right:74px;font-size:18px;
    padding:6px 12px;border-color:#5a3030;}
  #lb .lbtrash:hover{background:#d23b3b;border-color:#d23b3b;}
  #lb .lbconfirm{position:absolute;top:16px;right:20px;display:none;gap:8px;
    z-index:60;}
  #lb .lbconfirm.show{display:flex;}
  #lb .lbconfirm .yes{background:#d23b3b;color:#fff;border-color:#d23b3b;}
  #lb .lbconfirm .yes:hover{background:#e85050;}
  /* move button + folder picker menu */
  #lb .lbmove{position:absolute;top:16px;right:128px;font-size:18px;
    padding:6px 12px;z-index:60;}
  #lb .lbmove:hover{background:var(--accent);border-color:var(--accent);}
  #lb .lbmovemenu{position:absolute;top:60px;right:20px;z-index:61;display:none;
    flex-direction:column;gap:4px;background:#1a1f27;border:1px solid var(--border);
    border-radius:10px;padding:8px;max-height:60vh;overflow-y:auto;min-width:180px;
    box-shadow:0 8px 30px rgba(0,0,0,.5);}
  #lb .lbmovemenu.show{display:flex;}
  #lb .lbmovemenu .mm-title{font-size:11px;color:#8a93a0;padding:2px 6px 6px;}
  #lb .lbmovemenu button{text-align:left;font-size:13px;padding:7px 10px;
    background:#222831;border-color:#2a313b;}
  #lb .lbmovemenu button:hover{background:var(--accent);border-color:var(--accent);}
  /* folder rename pencil */
  .folder .frename{position:absolute;top:6px;right:6px;z-index:4;width:26px;height:26px;
    padding:0;font-size:13px;border-radius:6px;opacity:0;transition:opacity .12s;
    background:rgba(20,24,30,.8);}
  .folder .fdelete{position:absolute;top:6px;right:38px;z-index:4;width:26px;height:26px;
    padding:0;font-size:13px;border-radius:6px;opacity:0;transition:opacity .12s;
    background:rgba(20,24,30,.8);}
  .folder:hover .frename,.folder:hover .fdelete{opacity:1;}
  .folder .frename:hover{background:var(--accent);border-color:var(--accent);}
  .folder .fdelete:hover{background:#d23b3b;border-color:#d23b3b;}
  @media(hover:none){.folder .frename,.folder .fdelete{opacity:.85;}}
  /* ---- multi-select + bulk action bar ---- */
  #bulkBar{display:none;position:sticky;top:54px;z-index:9;align-items:center;gap:10px;
    flex-wrap:wrap;background:rgba(28,32,38,.97);border:1px solid var(--border);
    border-radius:10px;padding:10px 14px;margin:10px 16px;backdrop-filter:blur(8px);}
  #bulkBar.show{display:flex;}
  #bulkBar #bulkCount{font-weight:600;font-size:14px;min-width:90px;}
  #bulkBar button{font-size:13px;padding:7px 12px;}
  #bulkBar button.danger{border-color:#5a3030;}
  #bulkBar button.danger:hover{background:#d23b3b;border-color:#d23b3b;}
  #bulkBar #bulkMove:hover{background:var(--accent);border-color:var(--accent);}
  .bulkmovemenu{display:none;position:absolute;top:48px;left:14px;z-index:20;
    flex-direction:column;gap:4px;background:#1a1f27;border:1px solid var(--border);
    border-radius:10px;padding:8px;max-height:50vh;overflow-y:auto;min-width:200px;
    box-shadow:0 8px 30px rgba(0,0,0,.5);}
  .bulkmovemenu.show{display:flex;}
  .bulkmovemenu .mm-title{font-size:11px;color:#8a93a0;padding:2px 6px 6px;}
  .bulkmovemenu button{text-align:left;font-size:13px;padding:7px 10px;
    background:#222831;border-color:#2a313b;}
  .bulkmovemenu button:hover{background:var(--accent);border-color:var(--accent);}
  /* per-tile selection checkbox — ALWAYS visible (mirror of the trash button) */
  .tile .selbox{position:absolute;top:6px;left:6px;z-index:5;width:28px;height:28px;
    border-radius:6px;border:2px solid rgba(255,255,255,.85);background:rgba(20,24,30,.55);
    display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;
    cursor:pointer;opacity:.85;transition:opacity .12s,background .12s;}
  .tile:hover .selbox{opacity:1;}
  .tile.selected{outline:3px solid var(--accent);outline-offset:-3px;}
  .tile.selected .selbox{background:var(--accent);border-color:var(--accent);opacity:1;}
  .tile.dragging{opacity:.45;}
  /* rubber-band selection box */
  #rubber{position:fixed;z-index:30;border:1.5px solid var(--accent);
    background:rgba(91,140,255,.15);pointer-events:none;display:none;}
  /* folder rail (drop targets while inside a folder) */
  #folderRail{display:none;position:sticky;top:54px;z-index:8;gap:8px;flex-wrap:wrap;
    align-items:center;background:rgba(21,24,29,.95);border:1px solid var(--border);
    border-radius:10px;padding:10px 12px;margin:10px 16px;backdrop-filter:blur(8px);}
  #folderRail.show{display:flex;}
  #folderRail .rail-label{font-size:11px;color:var(--muted);width:100%;margin-bottom:2px;}
  #folderRail .railitem{display:inline-flex;align-items:center;gap:6px;font-size:13px;
    padding:7px 12px;border:1px solid #2a313b;border-radius:8px;background:#222831;
    cursor:pointer;user-select:none;}
  #folderRail .railitem:hover{border-color:var(--accent);}
  #folderRail .railitem.dragover{background:var(--accent);border-color:var(--accent);
    transform:scale(1.05);}
  #folderRail .railitem.newfolder{border-style:dashed;color:var(--accent);}
  /* folder tiles become drop targets on the landing page too */
  .folder.dragover{outline:3px solid var(--accent);outline-offset:-3px;}
  /* toast notifications (bottom-center) */
  #toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    z-index:200;display:flex;align-items:center;gap:10px;min-width:220px;max-width:90vw;
    background:#1c2230;border:1px solid var(--border);border-radius:12px;
    padding:12px 18px;font-size:14px;color:var(--text);box-shadow:0 10px 40px rgba(0,0,0,.55);
    opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #toast.ok{border-color:#2e7d4f;}
  #toast.err{border-color:#d23b3b;}
  #toast.work{border-color:var(--accent);}
  #toast .spin{width:15px;height:15px;border:2px solid #3a4150;border-top-color:var(--accent);
    border-radius:50%;animation:spin .7s linear infinite;flex:0 0 auto;}
  @keyframes spin{to{transform:rotate(360deg);}}
  /* OS-style progress dialog (file-manager copy/move sheet) */
  #progScrim{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.45);
    display:none;align-items:center;justify-content:center;}
  #progScrim.show{display:flex;}
  #progDlg{width:380px;max-width:92vw;background:#1b2129;border:1px solid var(--border);
    border-radius:14px;padding:20px 22px;box-shadow:0 20px 60px rgba(0,0,0,.6);}
  #progDlg .pd-title{font-size:15px;font-weight:600;margin-bottom:4px;display:flex;
    align-items:center;gap:10px;}
  #progDlg .pd-sub{font-size:12.5px;color:var(--muted);margin-bottom:14px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #progDlg .pd-track{height:8px;border-radius:6px;background:#2a313b;overflow:hidden;}
  #progDlg .pd-fill{height:100%;width:0;background:linear-gradient(90deg,#5b8cff,#7aa2ff);
    border-radius:6px;transition:width .15s ease;}
  #progDlg .pd-stats{display:flex;justify-content:space-between;font-size:12px;
    color:var(--muted);margin-top:8px;}
  #progDlg .pd-done{margin-top:14px;text-align:right;}
  #progDlg .pd-done button{font-size:13px;padding:7px 16px;}
  #progDlg.err .pd-fill{background:#d23b3b;}
  /* breadcrumb */
  .crumb{display:flex;align-items:center;gap:6px;font-size:16px;font-weight:600;min-width:0;}
  .crumb a{color:var(--text);cursor:pointer;text-decoration:none;white-space:nowrap;}
  .crumb a:hover{color:var(--accent);text-decoration:underline;}
  .crumb .sep{color:var(--muted);font-weight:400;}
  .crumb .leaf{color:var(--muted);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  /* search box */
  #searchBox{font:inherit;font-size:13px;padding:7px 12px;border-radius:8px;
    border:1px solid var(--border);background:#1a1f27;color:var(--text);width:200px;max-width:34vw;}
  #searchBox:focus{outline:none;border-color:var(--accent);}
  #viewToggle{font-size:15px;}
  /* right-click context menu */
  #ctxMenu{position:fixed;z-index:120;display:none;flex-direction:column;gap:2px;
    background:#1a1f27;border:1px solid var(--border);border-radius:10px;padding:6px;
    min-width:180px;box-shadow:0 10px 40px rgba(0,0,0,.55);}
  #ctxMenu.show{display:flex;}
  #ctxMenu button{text-align:left;font-size:13px;padding:8px 12px;background:transparent;
    border:none;border-radius:6px;color:var(--text);cursor:pointer;}
  #ctxMenu button:hover{background:var(--accent);}
  #ctxMenu button.danger:hover{background:#d23b3b;}
  #ctxMenu .ctx-sep{height:1px;background:var(--border);margin:4px 2px;}
  #ctxMenu .ctx-sub{font-size:11px;color:var(--muted);padding:4px 12px 2px;}
  /* properties panel */
  #propScrim{position:fixed;inset:0;z-index:155;background:rgba(0,0,0,.45);display:none;
    align-items:center;justify-content:center;}
  #propScrim.show{display:flex;}
  #propDlg{width:420px;max-width:92vw;background:#1b2129;border:1px solid var(--border);
    border-radius:14px;padding:0;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6);}
  #propDlg .ph{padding:16px 20px;border-bottom:1px solid var(--border);font-weight:600;}
  #propDlg .pb{padding:16px 20px;font-size:13px;}
  #propDlg .prow{display:flex;justify-content:space-between;gap:16px;padding:5px 0;border-bottom:1px solid #232a33;}
  #propDlg .prow .k{color:var(--muted);}
  #propDlg .prow .v{text-align:right;word-break:break-all;}
  #propDlg .pf{padding:12px 20px;text-align:right;border-top:1px solid var(--border);}
  /* keyboard focus ring on a tile */
  .tile.kbfocus{outline:3px solid #7aa2ff;outline-offset:-3px;}
  /* ---- LIST / DETAILS VIEW ---- */
  body.listview #photoGrid{display:block!important;}
  body.listview #photoGrid .tile{display:flex;align-items:center;gap:12px;width:auto;
    height:auto;aspect-ratio:auto;padding:6px 10px;border-bottom:1px solid #1d222a;border-radius:0;}
  body.listview #photoGrid .tile img{width:44px;height:44px;object-fit:cover;border-radius:4px;
    position:static;flex:0 0 auto;}
  body.listview #photoGrid .tile .shimmer{position:static;width:44px;height:44px;flex:0 0 auto;}
  body.listview #photoGrid .tile .selbox{position:static;flex:0 0 auto;}
  body.listview #photoGrid .tile .trash{position:static;margin-left:auto;}
  body.listview #photoGrid .tile .dlabel,body.listview #photoGrid .tile .vtag,
  body.listview #photoGrid .tile .badge{position:static;}
  body.listview .tile .li-name{flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  body.listview .tile .li-meta{font-size:12px;color:var(--muted);flex:0 0 auto;min-width:90px;text-align:right;}
  .tile .li-name,.tile .li-meta{display:none;}
  body.listview .tile .li-name,body.listview .tile .li-meta{display:block;}
  /* status bar */
  #statusBar{position:sticky;bottom:0;z-index:7;display:none;justify-content:space-between;
    font-size:12px;color:var(--muted);background:rgba(13,15,18,.95);border-top:1px solid var(--border);
    padding:6px 16px;backdrop-filter:blur(8px);}
  #statusBar.show{display:flex;}
  /* thumbnail zoom: tile min-width driven by --tilesize */
  @media(max-width:600px){#lb .nav{padding:8px 12px;font-size:24px;}}
</style>
</head>
<body>
<header>
  <button id="backBtn">&larr; Back</button>
  <nav id="crumb" class="crumb"></nav>
  <span class="sub" id="sub"></span>
  <span class="spacer"></span>
  <input type="search" id="searchBox" placeholder="Search…" autocomplete="off">
  <input type="range" id="zoom" min="110" max="320" step="10" value="170" title="Thumbnail size" style="display:none">
  <button id="viewToggle" title="Toggle list/grid view">&#9776;</button>
  <button id="uploadBtn">&#8593; Upload</button>
  <select id="sort" style="display:none">
    <option value="new">Newest first</option>
    <option value="old">Oldest first</option>
    <option value="name">Name A–Z</option>
    <option value="namez">Name Z–A</option>
    <option value="size">Largest first</option>
    <option value="type">Type</option>
  </select>
  <input type="file" id="fileInput" multiple accept="image/*,video/*" style="display:none">
</header>
<main>
  <div id="uploadBar">
    <div class="ub-track"><div class="ub-fill" id="ubFill"></div></div>
    <span class="ub-text" id="ubText"></span>
  </div>
  <!-- bulk action bar: shows whenever ≥1 item is selected -->
  <div id="bulkBar">
    <span id="bulkCount">0 selected</span>
    <button id="bulkAll">Select all</button>
    <button id="bulkMove">&#128194; Move to&hellip;</button>
    <button id="bulkDelete" class="danger">&#128465; Delete</button>
    <button id="bulkClear">Clear</button>
    <div class="bulkmovemenu" id="bulkMoveMenu"></div>
  </div>
  <!-- folder rail: drop targets while viewing a folder (drag selected photos here) -->
  <div id="folderRail"></div>
  <div id="folderGrid"></div>
  <div id="photoGrid" style="display:none"></div>
  <div id="state" class="state">Loading…</div>
  <div id="statusBar"><span id="statusLeft"></span><span id="statusRight"></span></div>
</main>
<div id="rubber"></div>
<div id="toast"></div>
<div id="ctxMenu"></div>
<div id="propScrim">
  <div id="propDlg">
    <div class="ph" id="propTitle">Properties</div>
    <div class="pb" id="propBody"></div>
    <div class="pf"><button id="propClose">Close</button></div>
  </div>
</div>
<div id="progScrim">
  <div id="progDlg">
    <div class="pd-title"><span class="spin" id="pdSpin"></span><span id="pdTitle">Moving…</span></div>
    <div class="pd-sub" id="pdSub"></div>
    <div class="pd-track"><div class="pd-fill" id="pdFill"></div></div>
    <div class="pd-stats"><span id="pdLeft">0 of 0</span><span id="pdPct">0%</span></div>
    <div class="pd-done" id="pdDone" style="display:none"><button id="pdClose">Done</button></div>
  </div>
</div>

<div id="lb">
  <button class="close" id="lbClose">&times;</button>
  <button class="lbmove" id="lbMove" title="Move to folder">&#128194;</button>
  <button class="lbtrash" id="lbTrash" title="Delete">&#128465;</button>
  <div class="lbconfirm" id="lbConfirm">
    <button class="yes" id="lbConfirmYes">Delete?</button>
    <button class="no" id="lbConfirmNo">Cancel</button>
  </div>
  <div class="lbmovemenu" id="lbMoveMenu"></div>
  <button class="nav prev" id="lbPrev">&#8249;</button>
  <div class="media" id="lbMedia"></div>
  <button class="nav next" id="lbNext">&#8250;</button>
</div>

<script>
(function(){
  var manifest=[], chats=[], chatMap={};
  var emptyFolders=[];     // user-created folders not yet in manifest
  var current=null;        // null = landing; "*" all; else chat name
  var view=[];             // current folder's sorted items
  var lbIndex=-1;

  // ---- toast (visible feedback for every action) ----
  var _toastEl=null, _toastTimer=null;
  function toast(msg, kind, sticky){
    if(!_toastEl) _toastEl=document.getElementById('toast');
    if(!_toastEl) return;
    _toastEl.className=''; void _toastEl.offsetWidth;  // restart transition
    _toastEl.classList.add(kind||'ok','show');
    _toastEl.innerHTML=(kind==='work'?'<span class="spin"></span>':'')+
      '<span>'+msg+'</span>';
    if(_toastTimer){ clearTimeout(_toastTimer); _toastTimer=null; }
    if(!sticky){ _toastTimer=setTimeout(function(){ _toastEl.classList.remove('show'); }, kind==='err'?4500:2600); }
  }
  function toastHide(){ if(_toastEl) _toastEl.classList.remove('show'); }

  // ---- OS-style progress dialog ----
  var _pd={};
  function progOpen(title,total){
    _pd.total=total; _pd.done=0;
    _pd.scrim=document.getElementById('progScrim');
    document.getElementById('pdTitle').textContent=title;
    document.getElementById('pdSpin').style.display='';
    document.getElementById('pdSub').textContent='';
    document.getElementById('pdFill').style.width='0%';
    document.getElementById('pdLeft').textContent='0 of '+total;
    document.getElementById('pdPct').textContent='0%';
    document.getElementById('pdDone').style.display='none';
    document.getElementById('progDlg').classList.remove('err');
    _pd.scrim.classList.add('show');
  }
  function progStep(label){
    _pd.done++;
    var pct=_pd.total?Math.round(_pd.done/_pd.total*100):100;
    document.getElementById('pdFill').style.width=pct+'%';
    document.getElementById('pdLeft').textContent=_pd.done+' of '+_pd.total;
    document.getElementById('pdPct').textContent=pct+'%';
    if(label) document.getElementById('pdSub').textContent=label;
  }
  function progFinish(title, isErr){
    document.getElementById('pdSpin').style.display='none';
    document.getElementById('pdTitle').textContent=title;
    document.getElementById('pdFill').style.width='100%';
    if(isErr) document.getElementById('progDlg').classList.add('err');
    document.getElementById('pdDone').style.display='';
  }
  function progClose(){ var s=document.getElementById('progScrim'); if(s) s.classList.remove('show'); }
  document.addEventListener('DOMContentLoaded',function(){});
  // wire Done button once (element exists at parse time)
  setTimeout(function(){
    var c=document.getElementById('pdClose'); if(c) c.addEventListener('click',progClose);
  },0);

  var elFolder=document.getElementById('folderGrid');
  var elPhoto=document.getElementById('photoGrid');
  var elState=document.getElementById('state');
  var elCrumb=document.getElementById('crumb');
  var elSub=document.getElementById('sub');
  var elSort=document.getElementById('sort');
  var elBack=document.getElementById('backBtn');
  var elSearch=document.getElementById('searchBox');
  var elViewToggle=document.getElementById('viewToggle');
  var searchQuery='';      // active filter text (lowercased)
  var listView=false;      // grid vs details list

  // breadcrumb renderer (replaces the old single <h1> title)
  function setCrumb(folderName){
    elCrumb.innerHTML='';
    var home=document.createElement('a'); home.textContent='Gallery';
    home.addEventListener('click',function(){ renderFolders(); });
    elCrumb.appendChild(home);
    if(folderName){
      var sep=document.createElement('span'); sep.className='sep'; sep.textContent='›'; elCrumb.appendChild(sep);
      var leaf=document.createElement('span'); leaf.className='leaf'; leaf.textContent=folderName; elCrumb.appendChild(leaf);
    }
  }
  var lb=document.getElementById('lb');
  var lbMedia=document.getElementById('lbMedia');
  var elUploadBtn=document.getElementById('uploadBtn');
  var elFileInput=document.getElementById('fileInput');
  var elUploadBar=document.getElementById('uploadBar');
  var elUbFill=document.getElementById('ubFill');
  var elUbText=document.getElementById('ubText');

  function fmtDate(iso){
    if(!iso) return "";
    var d=new Date(iso); if(isNaN(d)) return "";
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }

  // Client-authoritative pending ops: the server manifest rebuild is debounced
  // (~20s), so an immediate refetch returns STALE data (moved/deleted files still
  // present). We track what the client knows changed and reconcile every manifest
  // we load: apply pending moves (rewrite chat) / deletes (drop), and once the
  // server's data already agrees, retire that pending entry.
  //   pendingMove[stem] = destFolder ; pendingDel[stem] = true
  var pendingMove={}, pendingDel={};
  function applyPending(){
    // returns a reconciled copy and prunes pending entries the server caught up on
    var out=[];
    manifest.forEach(function(it){
      if(pendingDel[it.stem]){
        // server still lists it -> keep suppressing; if server dropped it we won't see it
        return; // omit
      }
      if(pendingMove[it.stem]){
        if(it.chat===pendingMove[it.stem]){ delete pendingMove[it.stem]; out.push(it); } // server caught up
        else { var clone={}; for(var k in it) clone[k]=it[k]; clone.chat=pendingMove[it.stem];
               clone.file=clone.file&&clone.file.replace('by-chat/'+it.chat+'/','by-chat/'+clone.chat+'/');
               clone.thumb=clone.thumb&&clone.thumb.replace('/'+it.chat+'/','/'+clone.chat+'/');
               out.push(clone); }
        return;
      }
      out.push(it);
    });
    // retire deletes the server has dropped (stem no longer anywhere in manifest)
    var stillThere={}; manifest.forEach(function(it){ stillThere[it.stem]=1; });
    Object.keys(pendingDel).forEach(function(s){ if(!stillThere[s]) delete pendingDel[s]; });
    manifest=out;
  }
  function buildChats(){
    applyPending();
    chatMap={}; chats=[];
    manifest.forEach(function(it){
      var c=it.chat||"(unknown)";
      if(!chatMap[c]){chatMap[c]=[];chats.push(c);}
      chatMap[c].push(it);
    });
    chats.sort(function(a,b){return chatMap[b].length-chatMap[a].length;});
    // drop any user-created empty folders that now have real items
    emptyFolders=emptyFolders.filter(function(n){return !chatMap[n];});
  }

  // ---- per-tile image loading with shimmer + one retry ----
  function wireImg(tile,img,src){
    var retried=false;
    img.onload=function(){tile.classList.add('loaded');img.classList.add('loaded');};
    img.onerror=function(){
      if(!retried){retried=true;
        setTimeout(function(){img.src=src+(src.indexOf('?')<0?'?':'&')+'r='+Date.now();},3000);
      }else{tile.classList.add('broken');}
    };
    img.src=src;
  }

  // ---- trash / delete ----
  function trashItem(it){
    return fetch('/trash/'+encodeURIComponent(it.chat)+'/'+encodeURIComponent(it.stem),
      {method:'POST',credentials:'same-origin'})
      .then(function(r){return r.status===200;})
      .catch(function(){return false;});
  }
  function removeFromData(it){
    var idx=manifest.indexOf(it); if(idx>=0) manifest.splice(idx,1);
    var c=it.chat||"(unknown)";
    if(chatMap[c]){
      var j=chatMap[c].indexOf(it); if(j>=0) chatMap[c].splice(j,1);
      if(!chatMap[c].length){
        delete chatMap[c];
        var ci=chats.indexOf(c); if(ci>=0) chats.splice(ci,1);
      }
    }
    var v=view.indexOf(it); if(v>=0) view.splice(v,1);
  }
  function refreshFolderView(){
    elSub.textContent=view.length+' item'+(view.length===1?'':'s');
    if(!view.length){
      elPhoto.style.display='none'; elPhoto.innerHTML='';
      elState.style.display='block'; elState.textContent='No items in this folder.';
    }else{
      renderPhotos();
    }
  }
  function tileError(tile){
    tile.classList.add('err');
    setTimeout(function(){tile.classList.remove('err');},2500);
  }
  function showTileConfirm(tile,it,tb){
    if(tile.querySelector('.confirm')) return;
    tb.style.display='none';
    var c=document.createElement('div'); c.className='confirm';
    c.addEventListener('click',function(e){e.stopPropagation();});
    var yes=document.createElement('button'); yes.className='yes'; yes.textContent='Delete?';
    var no=document.createElement('button'); no.className='no'; no.textContent='Cancel';
    c.appendChild(yes); c.appendChild(no); tile.appendChild(c);
    var timer=setTimeout(cleanup,3000);
    function cleanup(){clearTimeout(timer); if(c.parentNode)c.parentNode.removeChild(c); tb.style.display='';}
    no.addEventListener('click',function(e){e.stopPropagation(); cleanup();});
    yes.addEventListener('click',function(e){
      e.stopPropagation(); clearTimeout(timer);
      yes.textContent='…'; yes.disabled=true; no.disabled=true;
      trashItem(it).then(function(ok){
        if(ok){ removeFromData(it); refreshFolderView(); }
        else { cleanup(); tileError(tile); }
      });
    });
  }

  // ---------- LANDING ----------
  function renderFolders(){
    current=null;
    elPhoto.style.display='none'; elPhoto.innerHTML='';
    elFolder.style.display='grid';
    elBack.style.display='none';
    elSort.style.display='none';
    document.getElementById('zoom').style.display='none';
    elUploadBtn.style.display='none';
    document.getElementById('statusBar').classList.remove('show');
    hideUploadBar();
    setCrumb(null);
    elSub.textContent=chats.length+' folders · '+manifest.length+' items total';
    elState.style.display='none';

    var frag=document.createDocumentFragment();

    // "+ New folder" tile (first in grid)
    frag.appendChild(makeNewFolderTile());

    function makeFolder(name,items,cover){
      var f=document.createElement('div');
      f.className='folder'+(items===0?' empty':''); f.dataset.chat=name;
      var tab=document.createElement('div'); tab.className='ftab'; f.appendChild(tab);
      if(cover){
        var img=document.createElement('img'); img.className='cover';
        img.loading='lazy'; img.decoding='async';
        img.onload=function(){img.classList.add('loaded');};
        img.src=cover; f.appendChild(img);
      }
      var g=document.createElement('div'); g.className='grad'; f.appendChild(g);
      var m=document.createElement('div'); m.className='meta';
      m.innerHTML='<div class="fname"></div><div class="fcount"></div>';
      m.querySelector('.fname').textContent=name;
      m.querySelector('.fcount').textContent=items+' item'+(items===1?'':'s');
      f.appendChild(m);
      // rename pencil + delete (not on the "All items" aggregate)
      if(name!=='All items'){
        var rb=document.createElement('button'); rb.className='frename';
        rb.title='Rename folder'; rb.innerHTML='&#9998;';
        f.appendChild(rb);
        var db=document.createElement('button'); db.className='fdelete';
        db.title='Delete folder'; db.innerHTML='&#128465;';
        f.appendChild(db);
        // folder is a drop target for drag-to-move from inside another folder
        f.addEventListener('dragover',function(e){ if(dragStems.length){ e.preventDefault(); f.classList.add('dragover'); e.dataTransfer.dropEffect='move'; } });
        f.addEventListener('dragleave',function(){ f.classList.remove('dragover'); });
        f.addEventListener('drop',function(e){
          e.preventDefault(); f.classList.remove('dragover');
          if(!dragStems.length) return;
          var stems=dragStems.slice(); dragStems=[];
          bulkMove(name, stems);
        });
      }
      return f;
    }

    // optional "All items" pseudo-folder
    if(manifest.length){
      var allCover=manifest[0]?'/'+manifest[0].thumb:'';
      var af=makeFolder('All items',manifest.length,allCover);
      af.dataset.chat='*'; frag.appendChild(af);
    }
    chats.forEach(function(c){
      var items=chatMap[c];
      frag.appendChild(makeFolder(c,items.length,'/'+items[0].thumb));
    });
    // user-created empty folders (no items yet)
    emptyFolders.forEach(function(n){
      frag.appendChild(makeFolder(n,0,''));
    });
    elFolder.innerHTML=''; elFolder.appendChild(frag);
  }

  // ---- "+ New folder" tile + inline create form ----
  function makeNewFolderTile(){
    var f=document.createElement('div');
    f.className='folder newfolder'; f.dataset.newfolder='1';
    var inner=document.createElement('div'); inner.className='nf-inner';
    inner.innerHTML='<div class="nf-plus">+</div><div>New folder</div>';
    f.appendChild(inner);
    return f;
  }
  function showNewFolderForm(tile){
    if(tile.querySelector('.nf-form')) return;
    tile.innerHTML='';
    var form=document.createElement('div'); form.className='nf-form';
    var input=document.createElement('input');
    input.type='text'; input.placeholder='Folder name'; input.maxLength=120;
    var row=document.createElement('div'); row.className='nf-row';
    var ok=document.createElement('button'); ok.className='nf-ok'; ok.textContent='Create';
    var cancel=document.createElement('button'); cancel.textContent='Cancel';
    var err=document.createElement('div'); err.className='nf-err';
    row.appendChild(ok); row.appendChild(cancel);
    form.appendChild(input); form.appendChild(row); form.appendChild(err);
    form.addEventListener('click',function(e){e.stopPropagation();});
    tile.appendChild(form);
    input.focus();
    function reset(){
      tile.className='folder newfolder'; tile.dataset.newfolder='1';
      tile.innerHTML='';
      var inner=document.createElement('div'); inner.className='nf-inner';
      inner.innerHTML='<div class="nf-plus">+</div><div>New folder</div>';
      tile.appendChild(inner);
    }
    cancel.addEventListener('click',function(e){e.stopPropagation(); reset();});
    input.addEventListener('keydown',function(e){
      if(e.key==='Enter'){e.preventDefault(); submit();}
      else if(e.key==='Escape'){e.preventDefault(); reset();}
    });
    ok.addEventListener('click',function(e){e.stopPropagation(); submit();});
    function submit(){
      var name=input.value.trim();
      err.textContent='';
      if(!name){err.textContent='Enter a name.'; return;}
      if(chatMap[name]||emptyFolders.indexOf(name)>=0){
        err.textContent='Folder already exists.'; return;
      }
      ok.disabled=true; cancel.disabled=true; ok.textContent='…';
      fetch('/mkdir/'+encodeURIComponent(name),
        {method:'POST',credentials:'same-origin'})
        .then(function(r){
          if(r.status===200){
            emptyFolders.push(name);
            renderFolders();   // re-render landing with the new empty tile
          }else{
            ok.disabled=false; cancel.disabled=false; ok.textContent='Create';
            err.textContent='Failed (HTTP '+r.status+').';
          }
        })
        .catch(function(){
          ok.disabled=false; cancel.disabled=false; ok.textContent='Create';
          err.textContent='Network error.';
        });
    }
  }

  // ---------- FOLDER VIEW ----------
  function openFolder(chat){
    // Only reset the selection when NAVIGATING to a different folder — NOT on a
    // same-folder re-render (e.g. the background reloadManifest timer calls
    // openFolder(current) to refresh, and must not wipe an in-progress selection).
    var navigating = (chat !== current);
    current=chat;
    var items=(chat==='*')?manifest.slice():(chatMap[chat]?chatMap[chat].slice():[]);
    var name=(chat==='*')?'All items':chat;
    applySort(items);
    view=items;

    elFolder.style.display='none'; elFolder.innerHTML='';
    elPhoto.style.display='grid';
    elBack.style.display='inline-block';
    elSort.style.display='inline-block';
    document.getElementById('zoom').style.display=listView?'none':'';
    // "All items" is a virtual aggregate; can't upload into it
    elUploadBtn.style.display=(chat==='*')?'none':'inline-block';
    if(navigating){ clearSelection(); searchQuery=''; if(elSearch) elSearch.value=''; }
    else { pruneSelection(); refreshBulkBar(); }  // same-folder refresh: keep valid selections
    hideUploadBar();
    setCrumb(name);
    elSub.textContent=items.length+' item'+(items.length===1?'':'s');

    renderPhotos();
    renderFolderRail();   // drop targets for drag-to-move
    if(navigating) window.scrollTo(0,0);
  }

  // items in the current folder after applying the search filter
  function filteredView(){
    if(!searchQuery) return view;
    return view.filter(function(it){
      return (it.stem||'').toLowerCase().indexOf(searchQuery)>=0 ||
             (it.chat||'').toLowerCase().indexOf(searchQuery)>=0 ||
             (it.file||'').toLowerCase().indexOf(searchQuery)>=0;
    });
  }
  function updateStatusBar(shown){
    var sb=document.getElementById('statusBar');
    if(!shown){ sb.classList.remove('show'); return; }
    var fv=filteredView();
    document.getElementById('statusLeft').textContent=
      fv.length+' item'+(fv.length===1?'':'s')+(searchQuery?(' (filtered from '+view.length+')'):'')+
      (selected.size?('  ·  '+selected.size+' selected'):'');
    document.getElementById('statusRight').textContent=current==='*'?'All items':(current||'');
    sb.classList.add('show');
  }

  // ---- folder rail: every OTHER folder as a drop target, while viewing a folder ----
  function renderFolderRail(){
    var others=chats.filter(function(c){return c!==current;})
      .concat(emptyFolders.filter(function(c){return c!==current && chats.indexOf(c)<0;}));
    elFolderRail.innerHTML='';
    var lbl=document.createElement('div'); lbl.className='rail-label';
    lbl.textContent='Drag selected photos onto a folder to move them:';
    elFolderRail.appendChild(lbl);
    others.forEach(function(dest){
      var r=document.createElement('div'); r.className='railitem'; r.textContent='📁 '+dest;
      r.dataset.dest=dest;
      wireRailDrop(r,dest);
      elFolderRail.appendChild(r);
    });
    // "+ new folder" drop target
    var nf=document.createElement('div'); nf.className='railitem newfolder'; nf.textContent='＋ New folder';
    nf.addEventListener('click',function(){ promptNewFolderThenMove(null); });
    wireRailDrop(nf,'__new__');
    elFolderRail.appendChild(nf);
    elFolderRail.classList.toggle('show', current!=null && current!=='*');
  }

  function fmtBytes(n){
    if(n==null||isNaN(n)) return '';
    if(n<1024) return n+' B';
    var u=['KB','MB','GB','TB'],i=-1; do{ n/=1024; i++; }while(n>=1024&&i<u.length-1);
    return n.toFixed(n<10?1:0)+' '+u[i];
  }
  function applySort(arr){
    var m=elSort.value;
    if(m==='old'){ arr.reverse(); }                       // manifest is newest-first
    else if(m==='name'){ arr.sort(function(a,b){return (a.stem||'').localeCompare(b.stem||'');}); }
    else if(m==='namez'){ arr.sort(function(a,b){return (b.stem||'').localeCompare(a.stem||'');}); }
    else if(m==='size'){ arr.sort(function(a,b){return (b.size||0)-(a.size||0);}); }
    else if(m==='type'){ arr.sort(function(a,b){return (a.type||'').localeCompare(b.type||'')|| (a.stem||'').localeCompare(b.stem||'');}); }
    // 'new' = default manifest order
  }

  // shown[] = the array the grid + lightbox actually operate on (filtered+sorted)
  var shown=[];
  function renderPhotos(){
    shown=filteredView();
    var frag=document.createDocumentFragment();
    shown.forEach(function(it,i){
      var t=document.createElement('div');
      t.className='tile'; t.dataset.i=i; t.dataset.stem=it.stem;
      if(selected.has(it.stem)) t.classList.add('selected');
      var sh=document.createElement('div'); sh.className='shimmer'; t.appendChild(sh);
      var img=document.createElement('img');
      img.loading='lazy'; img.decoding='async';
      t.appendChild(img);
      wireImg(t,img,'/'+it.thumb);
      if(it.type==='video'){
        var b=document.createElement('div'); b.className='badge'; t.appendChild(b);
        var vt=document.createElement('div'); vt.className='vtag'; vt.textContent='VIDEO'; t.appendChild(vt);
      }
      var dl=fmtDate(it.date);
      if(dl){var d=document.createElement('div'); d.className='dlabel'; d.textContent=dl; t.appendChild(d);}
      // list-view extra columns (hidden in grid via CSS)
      var ext=(it.file||'').split('.').pop().toLowerCase();
      var ln=document.createElement('div'); ln.className='li-name'; ln.textContent=it.stem+'.'+ext; t.appendChild(ln);
      var lm=document.createElement('div'); lm.className='li-meta';
      lm.textContent=(it.type||'')+(it.size?(' · '+fmtBytes(it.size)):'')+(dl?(' · '+dl):''); t.appendChild(lm);
      // ALWAYS-visible selection checkbox (top-left, mirror of trash top-right)
      var sb=document.createElement('div'); sb.className='selbox';
      sb.innerHTML=selected.has(it.stem)?'&#10003;':'';
      sb.addEventListener('click',function(e){ e.stopPropagation(); toggleSelect(i,t,e); });
      t.appendChild(sb);
      // draggable for drag-to-move
      t.draggable=true;
      (function(tile,item,idx){
        var tb=document.createElement('button'); tb.className='trash';
        tb.title='Delete'; tb.innerHTML='&#128465;';
        tb.addEventListener('click',function(e){
          e.stopPropagation(); showTileConfirm(tile,item,tb);
        });
        tile.appendChild(tb);
        tile.addEventListener('dragstart',function(e){ onTileDragStart(e,idx,tile); });
        tile.addEventListener('dragend',function(e){ onTileDragEnd(e,tile); });
        tile.addEventListener('contextmenu',function(e){ openCtxMenu(e,idx,tile); });
      })(t,it,i);
      frag.appendChild(t);
    });
    elPhoto.innerHTML=''; elPhoto.appendChild(frag);
    kbFocus=-1;
    updateStatusBar(current!=null && current!=='__landing__');
    if(!shown.length){ elState.style.display='block'; elState.textContent=searchQuery?'No matches.':'No items in this folder.'; }
    else elState.style.display='none';
  }

  // ---------- LIGHTBOX ----------
  function openLb(i){
    lbIndex=i; var it=shown[i]; if(!it) return;
    lbMedia.innerHTML='';
    var el;
    if(it.type==='video'){
      el=document.createElement('video');
      el.controls=true; el.autoplay=true; el.playsInline=true;
      el.setAttribute('playsinline','');
      el.poster='/'+it.thumb; el.src='/'+it.file;
    }else{
      el=document.createElement('img'); el.src='/'+it.file;
    }
    lbMedia.appendChild(el);
    lb.classList.add('open');
  }
  function closeLb(){
    lb.classList.remove('open');

  // ---------- UPLOAD ----------
  var BATCH_SIZE=25;
  var uploading=false;

  function hideUploadBar(){
    elUploadBar.className=''; elUbFill.style.width='0';
    elUbText.textContent='';
  }
  function setProgress(done,total,pct){
    elUploadBar.classList.add('show');
    elUbFill.style.width=pct+'%';
    elUbText.textContent='Uploading '+done+'/'+total+'…';
  }

  function uploadBatch(folder,files){
    var fd=new FormData();
    files.forEach(function(f){fd.append('files',f,f.name);});
    return fetch('/upload/'+encodeURIComponent(folder),
      {method:'POST',credentials:'same-origin',body:fd})
      .then(function(r){
        if(r.status!==200) throw new Error('HTTP '+r.status);
        return r.json().catch(function(){return {};});
      });
  }

  function uploadFiles(folder,fileList){
    if(uploading) return;
    var files=Array.prototype.slice.call(fileList||[]);
    if(!files.length) return;
    if(folder==null||folder==='*') return;
    uploading=true;
    elUploadBtn.disabled=true;
    var total=files.length, done=0, storedTotal=0, allErrors=[];
    elUploadBar.className='show';
    setProgress(0,total,0);

    var batches=[];
    for(var i=0;i<files.length;i+=BATCH_SIZE) batches.push(files.slice(i,i+BATCH_SIZE));

    var chain=Promise.resolve();
    batches.forEach(function(batch){
      chain=chain.then(function(){
        return uploadBatch(folder,batch).then(function(res){
          done+=batch.length;
          if(res&&typeof res.stored==='number') storedTotal+=res.stored;
          else storedTotal+=batch.length;
          if(res&&Array.isArray(res.errors)) allErrors=allErrors.concat(res.errors);
          setProgress(done,total,Math.round(done/total*100));
        },function(err){
          // batch failed entirely
          done+=batch.length;
          allErrors.push('batch failed: '+err.message);
          setProgress(done,total,Math.round(done/total*100));
        });
      });
    });

    chain.then(function(){
      elUploadBar.classList.add('done');
      var errTxt=allErrors.length?(' '+allErrors.length+' error(s).'):'';
      elUbText.textContent='Uploaded '+storedTotal+'/'+total+' files.'+errTxt+' Refreshing…';
      // re-fetch manifest now and again after server debounce (~25s)
      reloadManifest(folder);
      setTimeout(function(){ if(current===folder) reloadManifest(folder); },25000);
    }).catch(function(err){
      elUploadBar.classList.add('error');
      elUbText.textContent='Upload failed: '+err.message;
    }).then(function(){
      uploading=false; elUploadBtn.disabled=false;
      if(elFileInput) elFileInput.value='';
    });
  }

  function reloadManifest(stayFolder){
    return fetch('/gallery/manifest.json',{credentials:'same-origin'})
      .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();})
      .then(function(data){
        manifest=Array.isArray(data)?data:[];
        buildChats();
        if(current===null){ renderFolders(); }
        else if(stayFolder!=null && (chatMap[stayFolder]||emptyFolders.indexOf(stayFolder)>=0)){
          openFolder(stayFolder);
          if(!uploading){
            elUploadBar.classList.add('show','done');
            elUbText.textContent='Up to date. Thumbnails appear shortly after processing.';
            setTimeout(function(){if(current===stayFolder&&!uploading)hideUploadBar();},6000);
          }
        }else{
          openFolder(current);
        }
      })
      .catch(function(){
        elUbText.textContent='Uploaded, but manifest refresh failed — reload the page shortly.';
      });
  }

  // ---- delete a whole folder (and its contents) ----
  function deleteFolder(name){
    if(!name||name==='*') return;
    var count=(chatMap[name]?chatMap[name].length:0);
    if(!confirm('Delete folder "'+name+'"'+(count?(' and its '+count+' item'+(count===1?'':'s')):'')+'? This cannot be undone.')) return;
    toast('Deleting folder “'+name+'”…','work',true);
    fetch('/rmdir/'+encodeURIComponent(name),{method:'POST',credentials:'same-origin'})
      .then(function(r){
        if(r.status===200){
          toast('✓ Deleted folder “'+name+'”','ok');
          // suppress all its items locally until the server manifest catches up
          if(chatMap[name]) chatMap[name].forEach(function(it){ pendingDel[it.stem]=true; });
          var ei=emptyFolders.indexOf(name); if(ei>=0) emptyFolders.splice(ei,1);
          reloadManifest(null);
        } else { toast('Delete failed (HTTP '+r.status+')','err'); }
      }).catch(function(){ toast('Network error deleting folder','err'); });
  }

  // ---- folder rename ----
  function renameFolder(oldName){
    if(!oldName||oldName==='*') return;
    var nn=window.prompt('Rename folder "'+oldName+'" to:', oldName);
    if(nn==null) return;
    nn=nn.trim(); if(!nn||nn===oldName) return;
    if(chatMap[nn]||emptyFolders.indexOf(nn)>=0){ alert('A folder named "'+nn+'" already exists.'); return; }
    fetch('/rename/'+encodeURIComponent(oldName)+'/'+encodeURIComponent(nn),
      {method:'POST',credentials:'same-origin'})
      .then(function(r){
        if(r.status===200){
          toast('✓ Renamed “'+oldName+'” → “'+nn+'”','ok');
          // optimistic local update; manifest rebuild on the server re-keys items
          var ei=emptyFolders.indexOf(oldName); if(ei>=0) emptyFolders[ei]=nn;
          reloadManifest(null);
        }else if(r.status===409){ toast('A folder named “'+nn+'” already exists','err'); }
        else { toast('Rename failed (HTTP '+r.status+')','err'); }
      })
      .catch(function(){ toast('Network error during rename','err'); });

  // find the manifest item for a stem in the current folder

  function bulkMove(dest, stemsOverride){
    hideBulkMoveMenu();
    var stems=stemsOverride||Array.from(selected);
    if(!stems.length){ toast('Nothing selected to move.','err'); return; }
    if(current==null||current==='*'){ toast('Move from a folder view.','err'); return; }
    var src=current;
    progOpen('Moving '+stems.length+' item'+(stems.length>1?'s':'')+' to “'+dest+'”', stems.length);
    // ONE batched request — the server moves all of them in a single parallel
    // rclone process (vs N sequential ~2.5s round-trips). Optimistic UI updates
    // immediately; pendingMove guards the stale-manifest refetch window.
    document.getElementById('pdSub').textContent='Transferring '+stems.length+' file'+(stems.length>1?'s':'')+'…';
    stems.forEach(function(stem){ pendingMove[stem]=dest; });
    fetch('/movebatch',{method:'POST',credentials:'same-origin',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({src:src,dest:dest,stems:stems})})
      .then(function(r){ return r.json().then(function(j){ return {status:r.status,j:j}; }); })
      .then(function(res){
        var ok=(res.status===200), moved=ok?(res.j.moved||stems.length):0;
        // optimistically drop them from the current view
        if(ok){ stems.forEach(function(stem){ var it=itemByStem(stem); if(it) removeFromData(it); }); }
        else { stems.forEach(function(stem){ delete pendingMove[stem]; }); }
        clearSelection(); rerenderCurrent();
        // animate the bar to done
        _pd.done=_pd.total; progStep('');
        progFinish(ok? ('✓ Moved '+moved+' to “'+dest+'”') : ('Move failed (HTTP '+res.status+')'), !ok);
        if(ok) setTimeout(progClose, 700);
        reloadManifest(current);
      })
      .catch(function(){
        stems.forEach(function(stem){ delete pendingMove[stem]; });
        progFinish('Network error during move', true);
      });
  }

    var stems=Array.from(selected);
    var done=0, fail=0, gone=[];
    progOpen('Deleting '+stems.length+' item'+(stems.length>1?'s':''), stems.length);
    var chain=Promise.resolve();
    stems.forEach(function(stem,idx){

        progStep('Item '+(idx+1)+' of '+stems.length);
        return fetch('/trash/'+encodeURIComponent(current)+'/'+encodeURIComponent(stem),
          {method:'POST',credentials:'same-origin'})
          .then(function(r){ if(r.status===200){ done++; gone.push(stem); pendingDel[stem]=true; } else fail++; },function(){ fail++; });
      });
    });
    chain.then(function(){
      gone.forEach(function(stem){ var it=itemByStem(stem); if(it) removeFromData(it); });
      clearSelection(); rerenderCurrent();
      progFinish(fail? ('Deleted '+done+', '+fail+' failed') : ('✓ Deleted '+done), fail>0);

    var n=selected.size;
    elCtx.innerHTML='';
    function mi(label,fn,danger){ var b=document.createElement('button'); if(danger)b.className='danger';
      b.innerHTML=label; b.addEventListener('click',function(ev){ ev.stopPropagation(); hideCtx(); fn(); }); elCtx.appendChild(b); }
    function sep(){ var s=document.createElement('div'); s.className='ctx-sep'; elCtx.appendChild(s); }
    var sub=document.createElement('div'); sub.className='ctx-sub'; sub.textContent=n+' selected'; elCtx.appendChild(sub);
    if(n===1){ mi('Open', function(){ openLb(i); }); }
    mi('Move to…', function(){ openCtxMoveMenu(); });
    if(n===1){ mi('Rename…', function(){ renameFilePrompt(it); }); }
    if(n===1){ mi('Download', function(){ downloadItem(it); }); }
    if(n===1){ mi('Properties', function(){ showProperties(it); }); }
    sep();
    mi('🗑 Delete'+(n>1?(' ('+n+')'):''), function(){ document.getElementById('bulkDelete').click(); }, true);
    elCtx.style.left=Math.min(e.clientX, window.innerWidth-200)+'px';
    elCtx.style.top=Math.min(e.clientY, window.innerHeight-260)+'px';
    elCtx.classList.add('show');
  }
  // context "Move to…" reuses the bulk move menu logic by clicking the bulk button
  function openCtxMoveMenu(){ document.getElementById('bulkMove').click(); }
  document.addEventListener('click',function(e){ if(!e.target.closest('#ctxMenu')) hideCtx(); });
  document.addEventListener('scroll',hideCtx,true);

  // ---------- PROPERTIES ----------
  var elPropScrim=document.getElementById('propScrim');
  function showProperties(it){
    var ext=(it.file||'').split('.').pop().toUpperCase();
    var rows=[
      ['Name', it.stem+'.'+(ext.toLowerCase())],
      ['Folder', it.chat||'(none)'],
      ['Type', (it.type||'')+' ('+ext+')'],
      ['Size', it.size?fmtBytes(it.size):'—'],
      ['Date', it.date?new Date(it.date).toLocaleString():'—'],
      ['Path', it.file||'']
    ];
    document.getElementById('propTitle').textContent='Properties';
    document.getElementById('propBody').innerHTML=rows.map(function(r){
      return '<div class="prow"><span class="k">'+r[0]+'</span><span class="v">'+
        String(r[1]).replace(/</g,'&lt;')+'</span></div>'; }).join('');
    elPropScrim.classList.add('show');
  }
  document.getElementById('propClose').addEventListener('click',function(){ elPropScrim.classList.remove('show'); });
  elPropScrim.addEventListener('click',function(e){ if(e.target===elPropScrim) elPropScrim.classList.remove('show'); });

  // ---------- RENAME FILE ----------
  function renameFilePrompt(it){
    var ext=(it.file||'').split('.').pop();
    var nn=window.prompt('Rename file to (without extension):', it.stem);
    if(nn==null) return; nn=nn.trim(); if(!nn||nn===it.stem) return;
    toast('Renaming…','work',true);
    fetch('/renamefile/'+encodeURIComponent(it.chat)+'/'+encodeURIComponent(it.stem)+'/'+encodeURIComponent(nn),
      {method:'POST',credentials:'same-origin'})
      .then(function(r){
        if(r.status===200){ toast('✓ Renamed','ok'); reloadManifest(current); }
        else if(r.status===409){ toast('A file with that name exists','err'); }
        else { toast('Rename failed (HTTP '+r.status+')','err'); }
      }).catch(function(){ toast('Network error during rename','err'); });
  }

  // ---------- DOWNLOAD ----------
  function downloadItem(it){
    // the original is served at /<it.file> behind SSO; trigger a browser download
    var a=document.createElement('a');
    a.href='/'+it.file; a.download=(it.stem||'download')+'.'+((it.file||'').split('.').pop());
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast('Downloading '+a.download,'ok');
  }

  // ---------- KEYBOARD CONTROL ----------
  var kbFocus=-1;
  function setKbFocus(idx){
    var prev=elPhoto.querySelector('.tile.kbfocus'); if(prev) prev.classList.remove('kbfocus');
    kbFocus=idx;
    if(idx<0) return;
    var t=elPhoto.querySelector('.tile[data-i="'+idx+'"]');
    if(t){ t.classList.add('kbfocus'); t.scrollIntoView({block:'nearest'}); }
  }
  function cols(){
    // estimate columns from first two tiles' positions
    var ts=elPhoto.querySelectorAll('.tile'); if(ts.length<2||listView) return listView?1:1;
    var y0=ts[0].getBoundingClientRect().top, c=0;
    for(var i=0;i<ts.length;i++){ if(Math.abs(ts[i].getBoundingClientRect().top-y0)<5) c++; else break; }
    return Math.max(1,c);
  }
  document.addEventListener('keydown',function(e){
    // lightbox keys
    if(lb.classList.contains('open')){
      if(e.key==='Escape') closeLb();
      else if(e.key==='ArrowLeft'){hideLbConfirm();hideMoveMenu();navLb(-1);}
      else if(e.key==='ArrowRight'){hideLbConfirm();hideMoveMenu();navLb(1);}
      else if(e.key==='Delete'||e.key==='Backspace'){ deleteCurrent(); }
      return;
    }
    if(current==null||current==='__landing__') return;       // only in a folder
    if(document.activeElement===elSearch) return;            // typing in search
    var tag=(document.activeElement&&document.activeElement.tagName)||'';
    if(tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA') return;
    var mod=e.ctrlKey||e.metaKey;
    if(mod && (e.key==='a'||e.key==='A')){ e.preventDefault(); selectAllShown(); return; }
    if(e.key==='Escape'){ clearSelection(); hideCtx(); setKbFocus(-1); return; }
    if(e.key==='Delete'||e.key==='Backspace'){ if(selected.size){ e.preventDefault(); document.getElementById('bulkDelete').click(); } return; }
    if(e.key==='/'){ e.preventDefault(); elSearch.focus(); return; }
    var n=shown.length; if(!n) return;
    var c=cols();
    if(['ArrowRight','ArrowLeft','ArrowDown','ArrowUp','Enter',' '].indexOf(e.key)>=0){
      e.preventDefault();
      var f=kbFocus<0?0:kbFocus;
      if(e.key==='ArrowRight') f=Math.min(n-1,f+1);
      else if(e.key==='ArrowLeft') f=Math.max(0,f-1);
      else if(e.key==='ArrowDown') f=Math.min(n-1,f+c);
      else if(e.key==='ArrowUp') f=Math.max(0,f-c);
      else if(e.key==='Enter'){ openLb(f); return; }
      else if(e.key===' '){ var tl=elPhoto.querySelector('.tile[data-i="'+f+'"]'); if(tl) toggleSelect(f,tl,e); return; }
      setKbFocus(f);
    }
  });

  // ---------- BOOT ----------
  fetch('/gallery/manifest.json')
    .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();})
    .then(function(data){
      manifest=Array.isArray(data)?data:[];
      buildChats();
      renderFolders();   // always render landing (so "+ New folder" is available)
    })
    .catch(function(err){
      elState.textContent='Failed to load gallery: '+err.message;
    });
})();
</script>
</body>
</html>
