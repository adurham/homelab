---
# Installs the upstream source media collector inside the media-gallery-01 LXC.
# Runs against the CT directly (after media_gallery_host provisions it).
# Pattern: apt deps -> tailscale -> service user -> venv + telethon ->
# rclone -> deploy code/units -> conditional start (only once the source client
# session is authorized via the one-time login.py).

- name: Install Base OS Packages
  ansible.builtin.apt:
    name:
      - python3
      - python3-venv
      - python3-dev
      - python3-pip
      - build-essential
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
    cache_valid_time: 3600

# ─── Tailscale (admin reach + cert/MagicDNS for any future direct serve) ───
# The CT joined the tailnet to support the web gallery work. It is reached
# directly at media-gallery-01.tail19c543.ts.net for admin (the private_subnet
# ProxyCommand path becomes unreliable once the CT peers directly — same quirk
# as hermes-gw-01). Requires TUN passthrough in /etc/pve/lxc/115.conf
# (media_gallery_host role / manual: lxc.cgroup2.devices.allow c 10:200 rwm +
# /dev/net/tun mount).
#
# CRITICAL: --accept-routes MUST be false. tailscale-gw advertises
# 172.16.0.0/24; if this CT (itself ON 172.16.0.0/24) accepts that route, its
# return traffic to other subnet hosts (e.g. lb-01 172.16.0.30) egresses via
# the tailscale interface instead of eth0 → asymmetric routing → lb-01's
# reverse-proxy to the gallery times out (504). Keep accept-routes off so the
# CT routes its own subnet locally.
- name: Install Tailscale
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL https://tailscale.com/install.sh | sh
  args:
    creates: /usr/bin/tailscale
    executable: /bin/bash

- name: Enable tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Bring CT onto Tailnet (accept-routes OFF — see note above)
  ansible.builtin.command:
    cmd: tailscale up --hostname media-gallery-01 --accept-routes=false --authkey {{ vault_media_gallery_tailscale_authkey | default('') }}
  args:
    creates: /var/lib/tailscale/tailscaled.state
  when: vault_media_gallery_tailscale_authkey is defined and vault_media_gallery_tailscale_authkey | length > 0
  no_log: true

- name: Ensure accept-routes stays disabled (idempotent, survives re-runs)
  ansible.builtin.command:
    cmd: tailscale set --accept-routes=false
  changed_when: false

# ─── rclone (encrypted upload to Google Drive) ─────────────────────────────
- name: Install rclone
  ansible.builtin.apt:
    name: rclone
    state: present

# ─── Service account + directories ─────────────────────────────────────────
- name: Create Collector System User
  ansible.builtin.user:
    name: "{{ media_gallery_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: "/home/{{ media_gallery_user }}"
    create_home: true
    state: present

- name: Ensure Install + State + Log Directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ media_gallery_user }}"
    group: "{{ media_gallery_user }}"
    mode: '0750'
  loop:
    - "{{ media_gallery_dir }}"
    - "{{ media_gallery_state }}"
    - "{{ media_gallery_state }}/captures"
    - "{{ media_gallery_log_dir }}"
    - "/home/{{ media_gallery_user }}/.config"
    - "/home/{{ media_gallery_user }}/.config/rclone"

# ─── Hardening: tmpfs for decrypted-media caches ───────────────────────────
# thumbcache + captures hold DECRYPTED media. Back them with tmpfs so nothing
# viewable ever persists to disk — a stolen disk / Proxmox backup / snapshot
# contains only the encrypted Drive cache, not plaintext images. (Cannot defend
# against a live root shell — that's irreducible for an auto-decrypting service
# without a TPM — but this closes the offline-disk and backup-leak vectors.)
# Unit filenames are systemd-escaped paths.
- name: Compute systemd-escaped mount unit names
  ansible.builtin.command: "systemd-escape -p --suffix=mount {{ item }}"
  register: tg_mount_units
  changed_when: false
  loop:
    - "{{ media_gallery_state }}/thumbcache"

- name: Render thumbcache tmpfs mount unit
  ansible.builtin.template:
    src: thumbcache.mount.j2
    dest: "/etc/systemd/system/{{ tg_mount_units.results[0].stdout }}"
    owner: root
    group: root
    mode: '0644'
  notify: Reload Systemd

- name: Enable & Start thumbcache tmpfs mount (decrypted posters RAM-only)
  ansible.builtin.systemd:
    name: "{{ tg_mount_units.results[0].stdout }}"
    enabled: true
    state: started
    daemon_reload: true

# ─── Python venv + source ────────────────────────────────────────────────
- name: Create Collector Virtualenv
  ansible.builtin.command: python3 -m venv {{ media_gallery_dir }}/venv
  args:
    creates: "{{ media_gallery_dir }}/venv/bin/python"
  become: true
  become_user: "{{ media_gallery_user }}"

- name: Upgrade pip/setuptools/wheel
  ansible.builtin.pip:
    name:
      - pip
      - setuptools
      - wheel
    state: latest  # noqa: package-latest
    virtualenv: "{{ media_gallery_dir }}/venv"
  become: true
  become_user: "{{ media_gallery_user }}"

- name: Install source (pinned)
  ansible.builtin.pip:
    name: "telethon=={{ media_gallery_telethon_version }}"
    virtualenv: "{{ media_gallery_dir }}/venv"
  become: true
  become_user: "{{ media_gallery_user }}"

# ─── Deploy manifest + dedup tooling ───────────────────────────────────────
# Post-split, the gallery box does NOT run the collector (that moved to the
# media_ingest role / CT). This box runs: gallery (SPA + rclone serve), thumb,
# trash, upload services, plus the manifest builder and the tier-1 dedup scan.
- name: Deploy Manifest Builder
  ansible.builtin.copy:
    src: build_manifest.py
    dest: "{{ media_gallery_dir }}/build_manifest.py"
    owner: "{{ media_gallery_user }}"
    group: "{{ media_gallery_user }}"
    mode: '0750'

- name: Deploy Duplicate Scanner (tier-1 perceptual hash)
  ansible.builtin.copy:
    src: dedup_scan.py
    dest: "{{ media_gallery_dir }}/dedup_scan.py"
    owner: "{{ media_gallery_user }}"
    group: "{{ media_gallery_user }}"
    mode: '0750'

# ─── rclone config (crypt over gdrive) ─────────────────────────────────────
# The OAuth token + crypt passwords come from vault (generated one-time via
# the authorize flow on the Mac; see README). force:false so a token the
# service refreshes itself isn't clobbered on re-apply.
- name: Drop rclone Config
  ansible.builtin.template:
    src: rclone.conf.j2
    dest: "/home/{{ media_gallery_user }}/.config/rclone/rclone.conf"
    owner: "{{ media_gallery_user }}"
    group: "{{ media_gallery_user }}"
    mode: '0600'
    force: false
  no_log: true

# ─── On-the-fly thumbnail service ──────────────────────────────────────────
# GET /thumb/<chat>/<stem>.jpg → ~400px poster, generated + cached on first hit
# (Pillow for images, ffmpeg for videos), persisted to gcrypt:thumbs/. Routed by
# lb-01 /thumb/ behind Authentik. Needs ffmpeg for video posters. The thumbcache
# tmpfs (RAM-only) must be large enough to hold the biggest original transiently
# during video thumbnailing (sized via media_gallery_thumbcache_tmpfs_size).
- name: Install ffmpeg (video thumbnail posters)
  ansible.builtin.apt:
    name: ffmpeg
    state: present
    update_cache: true
  retries: 3
  delay: 10
  register: ffmpeg_install
  until: ffmpeg_install is succeeded

- name: Deploy Thumbnail Service
  ansible.builtin.copy:
    src: thumb_service.py
    dest: "{{ media_gallery_dir }}/thumb_service.py"
    owner: "{{ media_gallery_user }}"
    group: "{{ media_gallery_user }}"
    mode: '0750'
  notify: Restart Thumb

- name: Render Thumbnail Service Unit
  ansible.builtin.template:
    src: thumb.service.j2
    dest: /etc/systemd/system/media-gallery-thumb.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload Systemd
    - Restart Thumb

- name: Enable & Start Thumbnail Service
  ansible.builtin.systemd:
    name: media-gallery-thumb.service
    enabled: true
    state: started
    daemon_reload: true

# ─── Web gallery (browser viewer, gated by Authentik at lb-01) ─────────────
# rclone serve http with a custom thumbnail-grid template. No built-in auth:
# access is via https://gallery.chi.lab.amd-e.com → lb-01 nginx forward-auth
# → proxy_pass to this CT at {{ ip_media_gallery }}:{{ media_gallery_gallery_port }}.
- name: Deploy Gallery HTML Template (rclone dir-listing fallback)
  ansible.builtin.copy:
    src: gallery.html.tmpl
    dest: "{{ media_gallery_dir }}/gallery.html.tmpl"
    owner: "{{ media_gallery_user }}"
    group: "{{ media_gallery_user }}"
    mode: '0644'
  notify: Restart Gallery

# The single-page app served at / (lb-01 rewrites / -> /gallery/index.html).
# It lives locally AND is published into the encrypted store so rclone serve
# returns it at /gallery/index.html.
- name: Deploy Gallery SPA (local copy)
  ansible.builtin.copy:
    src: gallery_index.html
    dest: "{{ media_gallery_dir }}/gallery_index.html"
    owner: "{{ media_gallery_user }}"
    group: "{{ media_gallery_user }}"
    mode: '0644'
  register: spa_copy

- name: Publish Gallery SPA into the encrypted store (gcrypt:gallery/index.html)
  ansible.builtin.command:
    cmd: >-
      rclone
      --config /home/{{ media_gallery_user }}/.config/rclone/rclone.conf
      copyto {{ media_gallery_dir }}/gallery_index.html
      {{ media_gallery_rclone_remote | default('gcrypt:') }}gallery/index.html
  become: true
  become_user: "{{ media_gallery_user }}"
  when: spa_copy is changed
  changed_when: true

- name: Render Gallery Service Unit
  ansible.builtin.template:
    src: gallery.service.j2
    dest: /etc/systemd/system/media-gallery-gallery.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload Systemd
    - Restart Gallery

- name: Enable & Start Gallery
  ansible.builtin.systemd:
    name: media-gallery-gallery.service
    enabled: true
    state: started
    daemon_reload: true

# ─── Trash service (delete media + exclusion ledger) ───────────────────────
# Write-capable: POST /trash/<chat>/<stem> deletes original+thumb from Drive
# and appends the stem to the exclusion ledger so backfill/manifest/collector
# never re-download it. Bound to the private IP; gated by Authentik at lb-01.
- name: Deploy Trash Service
  ansible.builtin.copy:
    src: trash_service.py
    dest: "{{ media_gallery_dir }}/trash_service.py"
    owner: "{{ media_gallery_user }}"
    group: "{{ media_gallery_user }}"
    mode: '0750'
  notify: Restart Trash

- name: Render Trash Service Unit
  ansible.builtin.template:
    src: trash.service.j2
    dest: /etc/systemd/system/media-gallery-trash.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload Systemd
    - Restart Trash

- name: Enable & Start Trash Service
  ansible.builtin.systemd:
    name: media-gallery-trash.service
    enabled: true
    state: started
    daemon_reload: true

# ─── Upload service (add pics + create folders) ────────────────────────────
# Write-capable: POST /upload/<folder> (multipart, batched, EXIF date) +
# /mkdir/<folder>. Built for thousands: batch staging + one rclone copy per
# batch + coalesced manifest rebuild. Bound to the private IP; gated by
# Authentik at lb-01; firewalled to lb-01 only. bulk_ingest.py is the fast lane
# for the initial thousands (rclone direct from a workstation).
- name: Deploy Upload Service
  ansible.builtin.copy:
    src: upload_service.py
    dest: "{{ media_gallery_dir }}/upload_service.py"
    owner: "{{ media_gallery_user }}"
    group: "{{ media_gallery_user }}"
    mode: '0750'
  notify: Restart Upload

- name: Deploy Bulk Ingest Helper
  ansible.builtin.copy:
    src: bulk_ingest.py
    dest: "{{ media_gallery_dir }}/bulk_ingest.py"
    owner: "{{ media_gallery_user }}"
    group: "{{ media_gallery_user }}"
    mode: '0750'

- name: Ensure Upload Staging Dir
  ansible.builtin.file:
    path: "{{ media_gallery_state }}/upload_staging"
    state: directory
    owner: "{{ media_gallery_user }}"
    group: "{{ media_gallery_user }}"
    mode: '0750'

- name: Render Upload Service Unit
  ansible.builtin.template:
    src: upload.service.j2
    dest: /etc/systemd/system/media-gallery-upload.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload Systemd
    - Restart Upload

- name: Enable & Start Upload Service
  ansible.builtin.systemd:
    name: media-gallery-upload.service
    enabled: true
    state: started
    daemon_reload: true

# ─── Gallery auto-refresh (manifest rebuild + thumb prewarm) ───────────────
# Keeps the gallery current as the live collector captures new media. The
# manifest rebuild is seconds; prewarm skips already-cached thumbs. NOT a hard
# dependency of the gallery — purely keeps it fresh.
- name: Deploy Gallery Refresh Script
  ansible.builtin.copy:
    src: refresh_gallery.sh
    dest: "{{ media_gallery_dir }}/refresh_gallery.sh"
    owner: "{{ media_gallery_user }}"
    group: "{{ media_gallery_user }}"
    mode: '0750'

- name: Deploy Thumbnail Prewarm Script (called by refresh)
  ansible.builtin.copy:
    src: prewarm_thumbs.sh
    dest: "{{ media_gallery_dir }}/prewarm_thumbs.sh"
    owner: "{{ media_gallery_user }}"
    group: "{{ media_gallery_user }}"
    mode: '0750'

- name: Render Gallery Refresh Service Unit
  ansible.builtin.template:
    src: refresh.service.j2
    dest: /etc/systemd/system/media-gallery-refresh.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload Systemd

- name: Render Gallery Refresh Timer Unit
  ansible.builtin.template:
    src: refresh.timer.j2
    dest: /etc/systemd/system/media-gallery-refresh.timer
    owner: root
    group: root
    mode: '0644'
  notify: Reload Systemd

- name: Enable & Start Gallery Refresh Timer
  ansible.builtin.systemd:
    name: media-gallery-refresh.timer
    enabled: true
    state: started
    daemon_reload: true

# ─── Security hardening ────────────────────────────────────────────────────
# The gallery/thumb/trash services bind the private IP with NO auth of their own
# (auth is enforced by Authentik at lb-01). Without a firewall, ANY host on the
# private subnet or tailnet could hit them directly and bypass SSO entirely —
# pulling decrypted originals with a plain GET. Lock the service ports to lb-01
# (the Authentik front door) + loopback only. Mirrors the hermes_gateway
# api_server lockdown. Default INPUT policy stays ACCEPT (don't break SSH/ping);
# we DROP only the specific service ports for non-allowed sources.
- name: Install iptables persistence
  ansible.builtin.apt:
    name:
      - iptables
      - iptables-persistent
      - netfilter-persistent
    state: present
  notify: Save tg iptables

- name: "iptables: allow loopback to service ports"
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: lo
    protocol: tcp
    destination_port: "{{ item }}"
    jump: ACCEPT
    comment: "media-gallery: loopback {{ item }}"
    state: present
  loop:
    - "{{ media_gallery_gallery_port }}"
    - "{{ media_gallery_thumb_port }}"
    - "{{ media_gallery_trash_port }}"
    - "{{ media_gallery_upload_port }}"
  notify: Save tg iptables

- name: "iptables: allow lb-01 (Authentik front door) to service ports"
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    source: "{{ ip_loadbalancer }}"
    destination_port: "{{ item }}"
    jump: ACCEPT
    comment: "media-gallery: lb-01 {{ item }}"
    state: present
  loop:
    - "{{ media_gallery_gallery_port }}"
    - "{{ media_gallery_thumb_port }}"
    - "{{ media_gallery_trash_port }}"
    - "{{ media_gallery_upload_port }}"
  notify: Save tg iptables

- name: "iptables: drop all other access to service ports"
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ item }}"
    jump: DROP
    comment: "media-gallery: deny {{ item }}"
    state: present
  loop:
    - "{{ media_gallery_gallery_port }}"
    - "{{ media_gallery_thumb_port }}"
    - "{{ media_gallery_trash_port }}"
    - "{{ media_gallery_upload_port }}"
  notify: Save tg iptables

# SSH: key-only. mediagallery is nologin; admin is root-via-key. No password auth.
- name: Harden SSH (key-only, no passwords)
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-harden.conf
    content: |
      # Managed by Ansible (roles/media_gallery). Key-only auth.
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PermitRootLogin prohibit-password
    owner: root
    group: root
    mode: '0644'
  notify: Reload SSH
