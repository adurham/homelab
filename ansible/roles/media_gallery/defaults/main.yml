---
# Service account + install layout for the upstream source media collector.
media_gallery_user: mediagallery
media_gallery_dir: /opt/media-gallery        # code + venv
media_gallery_state: /var/lib/media-gallery  # session, captures (ReadWrite)
media_gallery_log_dir: /var/log/media-gallery

# Storage / sync.
# gcrypt: = the rclone crypt remote (client-side encryption) wrapping
# gdrive:media-gallery. Configured one-time via the authorize flow; see README.
media_gallery_rclone_remote: "gcrypt:"
media_gallery_cache_days: 7          # keep this many days of captures locally
media_gallery_sync_interval: "15min" # how often to encrypt+upload+prune

# Pin source; bump deliberately.
media_gallery_telethon_version: "1.43.2"

# Web gallery: rclone serve http port (bound on ip_media_gallery, fronted by
# lb-01 nginx + Authentik forward-auth at https://gallery.chi.lab.amd-e.com).
media_gallery_gallery_port: 8089

# How often to auto-refresh the gallery (rebuild manifest + warm new thumbs)
# so it stays current as the live collector captures new media.
media_gallery_refresh_interval: "1h"

# On-the-fly thumbnail service port (bound on ip_media_gallery, routed by lb-01
# nginx /thumb/ behind Authentik). Generates + caches ~400px posters on demand.
media_gallery_thumb_port: 8090

# Trash service port (delete media + exclusion ledger; bound on ip_media_gallery,
# routed by lb-01 nginx /trash/ behind Authentik).
media_gallery_trash_port: 8091

# Upload service port (add pics + create folders; routed by lb-01 /upload /mkdir
# /status behind Authentik). Built to handle thousands (batched, coalesced).
media_gallery_upload_port: 8092
media_gallery_upload_max_mb: 4096

# Thumbnail cache tmpfs size (RAM-backed; decrypted thumbs + the transient
# full-original download used to make a VIDEO poster live here, never on disk).
# Must exceed the LARGEST original so big-video posters can be generated — at
# 512M (the old value) any video >~485 MiB failed with "no space left on device".
# Sized to comfortably hold the largest video (~3.4 GiB) plus working room. The
# CT RAM (media_gallery_ct_memory_mb, 8 GiB) must stay above this peak.
media_gallery_thumbcache_tmpfs_size: "6G"

# Free-space safety margin (MiB) the thumb service keeps in the thumbcache tmpfs
# when admitting an original download for a video poster. The service reserves
# (file_size + this margin) before downloading, so concurrent video requests
# can't collectively overflow the RAM tmpfs (the real constraint is BYTES, not a
# request count — two 3 GB videos would blow a count-based cap). Read by
# thumb_service.py as THUMB_SPACE_MARGIN_MB.
media_gallery_thumb_space_margin_mb: 256
