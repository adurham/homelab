---
# Provisions the LXC for the secondary source gallery collector. Runs against the
# proxmox node hosting the CT (pve02). Mirrors the media_ingest_host role:
# pveam template fetch -> cluster-wide existence check -> pct create -> inject SSH
# key -> add to in-memory inventory. vmid 117, ip_media_ingest_02 (172.16.0.48),
# hostname media-ingest-02. Uses the Ubuntu 24.04 template (Python 3.12) since the
# scraper requires Python >=3.11.

- name: Update Template Database
  ansible.builtin.command: pveam update
  changed_when: false

- name: Download Ubuntu 24.04 Template
  ansible.builtin.command: pveam download local ubuntu-24.04-standard_24.04-2_amd64.tar.zst
  args:
    creates: /var/lib/vz/template/cache/ubuntu-24.04-standard_24.04-2_amd64.tar.zst

# Cluster-wide existence check (HA can migrate the CT, so query pmxcfs for
# the full resource list rather than node-local `pct config`).
- name: Check if Media Ingest 02 Container Exists in cluster
  ansible.builtin.shell: |
    set -o pipefail
    pvesh get /cluster/resources --type vm --output-format json |
      python3 -c 'import json,sys; sys.exit(0 if any(r["vmid"]==117 for r in json.load(sys.stdin)) else 1)'
  register: pct_check
  failed_when: false
  changed_when: false

- name: Create Media Ingest 02 Container
  ansible.builtin.command: >
    pct create 117 /var/lib/vz/template/cache/ubuntu-24.04-standard_24.04-2_amd64.tar.zst
    --hostname media-ingest-02
    --cores 2 --memory 2048 --swap 512
    --rootfs nvme-data:8
    --net0 name=eth0,bridge={{ net_private_bridge }},ip={{ ip_media_ingest_02 }}/24,gw={{ net_private_gw }},mtu={{ net_private_mtu }}
    --unprivileged 1
    --features nesting=1
    --nameserver {{ ip_dns_primary }}
    --searchdomain chi.lab.amd-e.com
    --password "{{ vault_media_ingest_02_root_pass }}"
    --start 1
    --onboot 1
  no_log: true
  when: pct_check.rc != 0

- name: Ensure Media Ingest 02 Container is Running
  ansible.builtin.command: pct start 117
  register: m02_start
  failed_when: m02_start.rc != 0 and ("already running" not in m02_start.stderr and "already running" not in m02_start.stdout)
  changed_when: m02_start.rc == 0

- name: Wait for Media Ingest 02 Container IP
  ansible.builtin.shell: |
    set -o pipefail
    pct exec 117 -- ip a show eth0 | grep "inet " | grep -v "127.0.0.1"
  register: ip_check
  until: ip_check.rc == 0
  retries: 20
  delay: 3
  changed_when: false

- name: Update Apt Cache in Media Ingest 02 Container
  ansible.builtin.command: pct exec 117 -- apt-get update
  when: pct_check.rc != 0
  changed_when: true

- name: Install Python3 in Media Ingest 02 Container
  ansible.builtin.command: pct exec 117 -- apt-get install -y python3
  when: pct_check.rc != 0
  changed_when: true

- name: Inject SSH Key into Media Ingest 02 Container (via pipe)
  ansible.builtin.shell: |
    set -o pipefail
    pct exec 117 -- mkdir -p /root/.ssh
    cat /root/.ssh/authorized_keys | pct exec 117 -- sh -c "cat > /root/.ssh/authorized_keys"
    pct exec 117 -- chmod 700 /root/.ssh
    pct exec 117 -- chmod 600 /root/.ssh/authorized_keys
  when: pct_check.rc != 0
  changed_when: true

- name: Ensure SSH is enabled and running
  ansible.builtin.command: pct exec 117 -- systemctl enable --now ssh
  changed_when: false

- name: Add Media Ingest 02 Host to In-Memory Inventory
  # Reached over the private_subnet ProxyCommand (jump host = personal
  # MacBook) at ip_media_ingest_02. The group_vars/private_subnet.yml
  # ansible_ssh_common_args applies via the static inventory group; the
  # in-memory entry below inherits it through the media_ingest_02 group.
  ansible.builtin.add_host:
    name: media-ingest-02
    ansible_host: "{{ ip_media_ingest_02 }}"
    ansible_user: root
    groups: media_ingest_02
