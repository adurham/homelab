---
# Frigate NVR LXC defaults.
#
# This role mirrors roles/monitoring_host for LXC creation (pveam fetch ->
# cluster-wide existence check -> pct create), then installs Docker inside the
# CT and runs Frigate via docker compose. Docker requires an unprivileged CT
# with nesting=1 (already in the create flags).

# Proxmox placement. VMID 170 sits outside the populated 100-114 core-service
# block (full: gaps at 109-112 are treated as reserved) — see the VMID note
# in defaults below and docs/ipam.md. Override per-host in inventory if needed.
vmid: 170
target_node: pve01
template: debian-12-standard_12.12-1_amd64.tar.zst

# Resources. CPU object detection is the workload; no Coral/iGPU passthrough
# yet, so size CPU/RAM generously and give the rootfs room for recordings.
# 8 cores: software H264 decode of 7x 1080p Nest streams + CPU object
# detection is heavy; 4 cores ran oversubscribed (load ~5.9). pve01 has 16.
vm_cores: 8
vm_memory: 8192
vm_swap: 512
vm_disk: 60  # GiB rootfs on nvme-data (--rootfs nvme-data:{{ vm_disk }})

# Private-subnet address (eth1 on the `private` bridge). eth0 stays on vmbr0
# via DHCP so Frigate can reach the go2rtc RTSP source and HA's MQTT on the
# LAN (both live at ip_homeassistant / 192.168.86.2).
net_private_ip: "{{ ip_frigate }}/24"

# Containers (both run in the LXC; go2rtc bridges Nest, Frigate consumes it).
frigate_image: "ghcr.io/blakeblackshear/frigate:stable"
go2rtc_image: "alexxit/go2rtc:latest"
# 7 cameras at 1080p need more shared memory than the 256mb default — Frigate
# warns "/dev/shm (256 MB) should be increased to at least 498 MB". 512mb gives
# headroom and avoids shm-pressure frame drops.
frigate_shm_size: "512mb"
frigate_web_port: 5000   # legacy/unauthenticated UI + API
frigate_auth_port: 8971  # authenticated UI (Frigate >= 0.14)
frigate_base_dir: /opt/frigate

# Camera / detection.
# go2rtc runs IN the LXC as a host-network container. Frigate is on a docker
# bridge, so it reaches go2rtc via the bridge GATEWAY IP (docker0 = 172.17.0.1),
# NOT 127.0.0.1 (which would hit Frigate's own empty bundled go2rtc on 1984).
frigate_go2rtc_host: "172.17.0.1"
# Cameras: stream name -> friendly display name. The camera consumes
# MP4-over-HTTP from the LXC's go2rtc container (carries inband H264 SPS/PPS;
# do NOT add a Frigate-side go2rtc RTSP restream hop — RTSP re-drops the
# params: "decode_slice_header error / reference picture missing").
frigate_cameras:
  cat_room: "Cat Room"
  foyer: "Foyer"
  basement: "Basement"
  driveway: "Driveway"
  backyard: "Backyard"
  front_porch: "Front Porch"
  kitchen_display: "Kitchen Display"
# SDM device IDs per stream name (from GET enterprises/<project>/devices).
nest_camera_ids:
  cat_room: "AVPHwEugLnM10nHJPNtx9QPddhEtup_wvq3nZVErtRs50C29zePNzFbFQqY20_k5hhz72csTDSYhFO_8YQPel1alW9rM9w"
  foyer: "AVPHwEsGM0hB41axR-p69a60d-LYX0collMapER0UQcBCc6wXio4nIpkiuX_jl_7RVD6JLjrBJq--BHVyn-HukDsJWJfPQ"
  basement: "AVPHwEv8tTe1tp5fvy80mel9qHuE_1BblWFwmvVPC4SbtgNBjV1ZUeqPW7vYbNZdw1eEsKYteg49Tgv5irjteGtBoIkKIQ"
  driveway: "AVPHwEuxNIjGGIdwKW3buFkVWNAKIxAz5y1Z69eqY2Y63tKxpNfNiJ6tvRg9KtkntZOCE2ynMFc5SOgNBW3UjCePJJIZUg"
  backyard: "AVPHwEs59aGy1dGAhZoKHrGpun_T51Jwqu8U4-F_h0NSC-nlW5NrtKwirWfT6oq4Tr_1xJ3UO-BuygEY3IAQyP_OlPSNlQ"
  front_porch: "AVPHwEsTue5ui87_i87e52KKkA3e6jpqP0Zui3bs9hReC2xKveNywOxXALgz-HYomecDUgE_Q7scUsT5d5Y2zHydyvBnIA"
  kitchen_display: "AVPHwEuBitFl-aKPpzpyV5AZN82-gv--DUl_zYKfuWX6QndeMpU5ofZGL6Xx-xPOFp__A4QebEkCkXEyRoI_SblU2zwC1w"
# Detect resolution matches the Nest stream's native 1080p (the go2rtc SDP
# omits dimensions; the stream itself is H264 1920x1080@30).
frigate_detect_width: 1920
frigate_detect_height: 1080
# 3 fps is plenty for person/cat detection and roughly halves decode+detect
# load vs 5 — smoother, fewer synchronized fps dips on the CPU detector.
frigate_detect_fps: 3
# Per-camera fps overrides. Outdoor cameras that need to catch FAST motion
# (cars, people approaching, package drops) get 5; indoor/pet cams stay at 3.
frigate_camera_fps:
  driveway: 5
  front_porch: 5
frigate_track_objects:
  - person
  - cat
# Motion-based recording (continuous OFF): records only segments with motion,
# cutting disk ~70-90% vs 24/7 continuous (2-day continuous on 7x1080p already
# filled the 60G disk to 95%). Keeps a week of the footage that actually
# matters. See frigate-config template record: block.
frigate_record_retain_days: 7

# MQTT (Home Assistant integration).
#
# ENABLED 2026-06-02: Mosquitto broker add-on (core_mosquitto) is installed and
# running on the HA host ({{ ip_homeassistant }}:1883) with a dedicated
# `frigate` broker login. The password is the vault var frigate_mqtt_password
# in inventory/group_vars/all.yml (do NOT inline plaintext). HA's own MQTT
# integration is also configured against the same broker (login `homeassistant`),
# which is what makes Frigate's events flow into HA as native entities.
# Frigate publishes object/event lifecycle on `frigate/events` — consumed by the
# pet-accident detector (see pet-accident-detector/) and by HA's Frigate
# integration.
frigate_mqtt_enabled: true
frigate_mqtt_host: "{{ ip_homeassistant }}"
frigate_mqtt_port: 1883
frigate_mqtt_user: "frigate"
# Actual secret comes from the vault var of the same name in
# inventory/group_vars/all.yml, which overrides this empty default by
# Ansible var precedence (group_vars > role defaults).
frigate_mqtt_password: ""
