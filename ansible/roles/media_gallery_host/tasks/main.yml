---
# Provisions the LXC for the upstream source media collector. Runs against the
# proxmox node hosting the CT (pve02). Mirrors the hermes_gateway_host role:
# pveam template fetch -> cluster-wide existence check -> pct create ->
# inject SSH key -> TUN passthrough for Tailscale -> add to in-memory
# inventory. vmid 115, ip_media_gallery (172.16.0.51), hostname media-gallery-01.

- name: Update Template Database
  ansible.builtin.command: pveam update
  changed_when: false

- name: Download Ubuntu 22.04 Template
  ansible.builtin.command: pveam download local ubuntu-22.04-standard_22.04-1_amd64.tar.zst
  args:
    creates: /var/lib/vz/template/cache/ubuntu-22.04-standard_22.04-1_amd64.tar.zst

# Cluster-wide existence check (HA can migrate the CT, so query pmxcfs for
# the full resource list rather than node-local `pct config`).
- name: Check if TG Collector Container Exists in cluster
  ansible.builtin.shell: |
    set -o pipefail
    pvesh get /cluster/resources --type vm --output-format json |
      python3 -c 'import json,sys; sys.exit(0 if any(r["vmid"]==115 for r in json.load(sys.stdin)) else 1)'
  register: pct_check
  failed_when: false
  changed_when: false

- name: Create TG Collector Container
  ansible.builtin.command: >
    pct create 115 /var/lib/vz/template/cache/ubuntu-22.04-standard_22.04-1_amd64.tar.zst
    --hostname media-gallery-01
    --cores {{ media_gallery_ct_cores }} --memory {{ media_gallery_ct_memory_mb }} --swap {{ media_gallery_ct_swap_mb }}
    --rootfs nvme-data:{{ media_gallery_ct_rootfs_gb }}
    --net0 name=eth0,bridge={{ net_private_bridge }},ip={{ ip_media_gallery }}/24,gw={{ net_private_gw }},mtu={{ net_private_mtu }}
    --unprivileged 1
    --features nesting=1
    --password "{{ vault_media_gallery_root_pass }}"
    --start 1
    --onboot 1
  no_log: true
  when: pct_check.rc != 0

# Ensure CPU/RAM match the codified sizing even for an already-existing CT
# (handles the live-drift case where the CT was hand-bumped). Idempotent: pct
# set is a no-op when the values already match.
- name: Ensure TG Collector CT cores/memory match codified sizing
  ansible.builtin.command: >
    pct set 115
    --cores {{ media_gallery_ct_cores }}
    --memory {{ media_gallery_ct_memory_mb }}
    --swap {{ media_gallery_ct_swap_mb }}
  register: tgh_set
  changed_when: false

# Ensure the rootfs is at least the codified size. `pct resize` only grows
# (shrinking isn't supported), and errors harmlessly if already at/above target,
# so failed_when filters the "smaller than current" / no-op cases. CRITICAL: an
# 8 GiB rootfs (the old default) fills during a multi-GB video upload and drops
# the connection — this guarantees the headroom regardless of how the CT was made.
- name: Ensure TG Collector rootfs is at least the codified size
  ansible.builtin.command: pct resize 115 rootfs {{ media_gallery_ct_rootfs_gb }}G
  register: tgh_resize
  # `pct resize` only grows. It exits non-zero when the disk is already at/above
  # the target ("disk is already at specified size") or when asked to shrink —
  # both are no-ops, not failures. Treat only OTHER non-zero exits as real errors.
  changed_when: tgh_resize.rc == 0
  failed_when:
    - tgh_resize.rc != 0
    - "'already at specified size' not in tgh_resize.stderr"
    - "'shrink' not in tgh_resize.stderr"
    - "'smaller' not in tgh_resize.stderr"

- name: Ensure TG Collector Container is Running
  ansible.builtin.command: pct start 115
  register: tgh_start
  failed_when: tgh_start.rc != 0 and ("already running" not in tgh_start.stderr and "already running" not in tgh_start.stdout)
  changed_when: tgh_start.rc == 0

- name: Wait for TG Collector Container IP
  ansible.builtin.shell: |
    set -o pipefail
    pct exec 115 -- ip a show eth0 | grep "inet " | grep -v "127.0.0.1"
  register: ip_check
  until: ip_check.rc == 0
  retries: 20
  delay: 3
  changed_when: false

- name: Update Apt Cache in TG Collector Container
  ansible.builtin.command: pct exec 115 -- apt-get update
  when: pct_check.rc != 0
  changed_when: true

- name: Install Python3 in TG Collector Container
  ansible.builtin.command: pct exec 115 -- apt-get install -y python3
  when: pct_check.rc != 0
  changed_when: true

- name: Inject SSH Key into TG Collector Container (via pipe)
  ansible.builtin.shell: |
    set -o pipefail
    pct exec 115 -- mkdir -p /root/.ssh
    cat /root/.ssh/authorized_keys | pct exec 115 -- sh -c "cat > /root/.ssh/authorized_keys"
    pct exec 115 -- chmod 700 /root/.ssh
    pct exec 115 -- chmod 600 /root/.ssh/authorized_keys
  when: pct_check.rc != 0
  changed_when: true

- name: Ensure SSH is enabled and running
  ansible.builtin.command: pct exec 115 -- systemctl enable --now ssh
  changed_when: false

# No TUN passthrough needed: this CT is outbound-only and does not run
# Tailscale (see media_gallery role note). It reaches upstream source + Google Drive
# via normal egress through the private subnet gateway.

- name: Add TG Collector Host to In-Memory Inventory
  # Reached over the private_subnet ProxyCommand (jump host = personal
  # MacBook) at ip_media_gallery. The group_vars/private_subnet.yml
  # ansible_ssh_common_args applies via the static inventory group; the
  # in-memory entry below inherits it through the media_gallery group.
  ansible.builtin.add_host:
    name: media-gallery-01
    ansible_host: "{{ ip_media_gallery }}"
    ansible_user: root
    groups: media_gallery
