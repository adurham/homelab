---
# Installs the Hermes messaging gateway inside the hermes-gw-01 LXC.
# Runs against the CT directly (after hermes_gateway_host has provisioned
# it). Pattern: apt deps -> dedicated user -> clone repo -> venv install ->
# render config + drop creds -> register hermes-gateway.service via the
# built-in `hermes gateway install --system` flow.

- name: Install Base OS Packages
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - git
      - build-essential
      - ca-certificates
      - curl
      - software-properties-common
      - gnupg
    state: present
    update_cache: true
    cache_valid_time: 3600

# Hermes requires Python ≥3.11; Ubuntu 22.04 ships only 3.10. Pull 3.11 from
# the deadsnakes PPA (the standard upstream-maintained source) rather than
# pyenv/conda, to keep the install footprint comparable to the dns/lb LXCs.
- name: Add Deadsnakes PPA for Python 3.11
  ansible.builtin.apt_repository:
    repo: ppa:deadsnakes/ppa
    state: present
    update_cache: true

- name: Install Python 3.11
  ansible.builtin.apt:
    name:
      - python3.11
      - python3.11-venv
      - python3.11-dev
    state: present

# Hermes spoofs Claude Code identity for OAuth requests, including a
# user-agent string with the locally-detected Claude Code version. Anthropic
# rejects requests whose version is too far behind the actual release —
# they return a misleading "out of extra usage" 400. Without the `claude`
# CLI on the box, hermes falls back to a hard-coded version constant which
# rapidly goes stale. Installing Claude Code via the upstream npm package
# keeps detection accurate; node is also handy for any future skill that
# wants it.
- name: Add NodeSource Apt Repository (Node 20 LTS)
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
  args:
    creates: /etc/apt/sources.list.d/nodesource.list
    executable: /bin/bash

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

- name: Install Claude Code CLI Globally
  community.general.npm:
    name: '@anthropic-ai/claude-code'
    global: true
    state: latest  # noqa: package-latest
  notify: Restart Hermes Gateway

- name: Create Hermes System User
  ansible.builtin.user:
    name: hermes
    system: true
    shell: /bin/bash
    home: /home/hermes
    create_home: true
    state: present

# Pre-create /opt/hermes-agent owned by hermes so the subsequent `git clone`
# (which runs as the hermes user, not root) can write into it. Without this
# step git fails with "could not create work tree dir: Permission denied"
# because /opt is root-only by default.
- name: Ensure /opt/hermes-agent Directory Exists
  ansible.builtin.file:
    path: /opt/hermes-agent
    state: directory
    owner: hermes
    group: hermes
    mode: '0755'

- name: Clone Hermes Agent Repository
  ansible.builtin.git:
    repo: https://github.com/adurham/hermes-agent.git
    dest: /opt/hermes-agent
    version: main
    update: true
    force: false
  become: true
  become_user: hermes
  notify: Restart Hermes Gateway

- name: Create Hermes Virtualenv (Python 3.11)
  ansible.builtin.command: python3.11 -m venv /opt/hermes-agent/venv
  args:
    creates: /opt/hermes-agent/venv/bin/python
  become: true
  become_user: hermes

- name: Install Hermes (Editable) and Pip
  ansible.builtin.pip:
    name:
      - pip
      - setuptools
      - wheel
    state: latest  # noqa: package-latest
    virtualenv: /opt/hermes-agent/venv
  become: true
  become_user: hermes

- name: Install Hermes Agent Editable (with messaging extras)
  ansible.builtin.pip:
    # Editable install of the local clone, with the [messaging] extras —
    # pulls in discord.py, python-source-bot, slack-bolt/sdk, aiohttp,
    # qrcode. Without these the gateway logs "discord.py not installed"
    # and exits 1 because no platform adapter loads.
    name: file:///opt/hermes-agent#egg=hermes-agent[messaging]
    extra_args: -e
    virtualenv: /opt/hermes-agent/venv
  become: true
  become_user: hermes
  notify: Restart Hermes Gateway

# Hermes home: /home/hermes/.hermes for env/config/auth, /home/hermes/.claude
# for the Claude Code OAuth credentials file (which the adapter reads via the
# same code path the macOS keychain uses).
- name: Ensure Hermes Home Directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: hermes
    group: hermes
    mode: '0700'
  loop:
    - /home/hermes/.hermes
    - /home/hermes/.hermes/auth
    - /home/hermes/.hermes/logs
    - /home/hermes/.claude

# Manage only a delimited block in /home/hermes/.hermes/.env so that values
# the running gateway writes itself (e.g. DISCORD_HOME_CHANNEL set via the
# `/sethome` slash command, anything `hermes setup` persists) survive
# re-applies. A previous `template:` task overwrote the entire file each
# run and silently wiped those user-set keys, which then took the in-memory
# value with them on the notify-driven gateway restart.

- name: Probe Hermes .env State
  ansible.builtin.stat:
    path: /home/hermes/.hermes/.env
  register: hermes_env_stat

- name: Detect Pre-blockinfile .env (legacy fully-managed file)
  # Run-once migration: hosts deployed before the blockinfile refactor have
  # a `.env` whose entire contents are Ansible-rendered, with no managed
  # markers. blockinfile would otherwise *append* a second copy of the
  # block on first apply, producing duplicate keys. Rip the file off so
  # blockinfile recreates it fresh; the only thing we lose is content
  # Ansible already controls anyway.
  ansible.builtin.command:
    cmd: grep -q "ANSIBLE MANAGED BLOCK — hermes_gateway role" /home/hermes/.hermes/.env
  register: hermes_env_marker_check
  changed_when: false
  failed_when: false
  when: hermes_env_stat.stat.exists

- name: Migrate Legacy Hermes .env (one-shot — pre-blockinfile)
  ansible.builtin.file:
    path: /home/hermes/.hermes/.env
    state: absent
  when:
    - hermes_env_stat.stat.exists
    - hermes_env_marker_check.rc | default(0) != 0

- name: Ensure Hermes .env Exists
  ansible.builtin.file:
    path: /home/hermes/.hermes/.env
    state: touch
    owner: hermes
    group: hermes
    mode: '0600'
    modification_time: preserve
    access_time: preserve

- name: Render Hermes .env (Ansible-managed block only)
  ansible.builtin.blockinfile:
    path: /home/hermes/.hermes/.env
    owner: hermes
    group: hermes
    mode: '0600'
    marker: "# {mark} ANSIBLE MANAGED BLOCK — hermes_gateway role (env.j2)"
    marker_begin: BEGIN
    marker_end: END
    block: "{{ lookup('ansible.builtin.template', 'env.j2') }}"
    insertbefore: BOF
  no_log: true
  notify: Restart Hermes Gateway

- name: Render Hermes config.yaml
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /home/hermes/.hermes/config.yaml
    owner: hermes
    group: hermes
    mode: '0600'
  notify: Restart Hermes Gateway

# Seed DISCORD_HOME_CHANNEL with the vaulted default ONLY if no line
# beginning with that key exists yet. The default lands OUTSIDE the
# Ansible-managed block so /sethome runtime updates (via
# hermes_cli.config.save_env_value) take precedence and survive
# subsequent ansible re-applies. On a fresh install the seed lands;
# on a re-apply with any DISCORD_HOME_CHANNEL value already present
# (vault default or /sethome update), this is a no-op.
#
# Without this, a wiped or hand-edited .env loses the home channel
# until the next /sethome, and the bot greets every new DM with the
# "no home channel set" prompt instead of just working.
- name: Probe DISCORD_HOME_CHANNEL Presence
  ansible.builtin.command:
    cmd: grep -q '^DISCORD_HOME_CHANNEL=' /home/hermes/.hermes/.env
  register: discord_home_probe
  changed_when: false
  failed_when: false

- name: Seed DISCORD_HOME_CHANNEL Default (One-Shot)
  ansible.builtin.lineinfile:
    path: /home/hermes/.hermes/.env
    line: "DISCORD_HOME_CHANNEL={{ vault_hermes_gw_discord_home_channel }}"
    insertafter: EOF
    owner: hermes
    group: hermes
    mode: '0600'
    state: present
  no_log: true
  when: discord_home_probe.rc != 0

- name: Bootstrap Anthropic Claude Code Credentials (no overwrite)
  # Source-of-truth for Anthropic creds is whatever lives in the file on the
  # CT itself — `claude setup-token` (run interactively against this CT)
  # writes there and rotates its own refresh tokens. Ansible only seeds the
  # initial value from vault so the first turn works; thereafter `force: no`
  # protects the live file from being clobbered on re-applies. The vault
  # value will go stale fast (laptop's keychain rotates), so do not rely on
  # it past the first deploy.
  ansible.builtin.copy:
    content: "{{ vault_hermes_gw_anthropic_creds_json }}"
    dest: /home/hermes/.claude/.credentials.json
    owner: hermes
    group: hermes
    mode: '0600'
    force: false
  no_log: true
  notify: Restart Hermes Gateway

- name: Drop Gemini OAuth Credentials
  ansible.builtin.copy:
    content: "{{ vault_hermes_gw_gemini_oauth_json }}"
    dest: /home/hermes/.hermes/auth/google_oauth.json
    owner: hermes
    group: hermes
    mode: '0600'
  no_log: true
  notify: Restart Hermes Gateway

# Use hermes's own systemd installer rather than templating a unit file
# ourselves — keeps us aligned with the upstream PATH/working-dir/exec
# logic, which evolves with the CLI. --run-as-user binds the unit to the
# hermes account; --system writes to /etc/systemd/system.
- name: Install Hermes Gateway Systemd Unit
  ansible.builtin.command:
    cmd: /opt/hermes-agent/venv/bin/hermes gateway install --system --run-as-user hermes --force
  args:
    creates: /etc/systemd/system/hermes-gateway.service
  notify: Restart Hermes Gateway

# Systemd drop-in to override WorkingDirectory. The unit installer
# (`hermes gateway install`) sets WorkingDirectory=/opt/hermes-agent,
# which is where the CLI source lives — not where the bot operates on
# user code. /home/hermes is the natural cwd: it owns the user's
# .hermes/, .claude/, .ssh/, and repos/, so "cd hermes-agent" from a
# bot tool call resolves to repos/hermes-agent without a discovery hop.
# A drop-in survives `hermes gateway install --force` regenerations
# (the installer overwrites the main unit but leaves overrides alone).
- name: Ensure Systemd Override Dir for Hermes Gateway
  ansible.builtin.file:
    path: /etc/systemd/system/hermes-gateway.service.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Override Hermes Gateway WorkingDirectory to /home/hermes
  ansible.builtin.copy:
    content: |
      # Managed by Ansible — do not edit by hand.
      # Source: roles/hermes_gateway/tasks/main.yml
      [Service]
      WorkingDirectory=/home/hermes
    dest: /etc/systemd/system/hermes-gateway.service.d/override.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart Hermes Gateway

- name: Enable & Start Hermes Gateway
  ansible.builtin.systemd:
    name: hermes-gateway.service
    enabled: true
    state: started
    daemon_reload: true

# Bot's working repos — cloned under /home/hermes/repos/<name> with gh
# CLI + credential helper wired up so the bot can push branches and open
# PRs via the vaulted PAT. Runs after the gateway service is up so we
# don't wait on it during cold-start; idempotent on re-apply.
- name: Provision Bot Repos & gh Auth
  ansible.builtin.import_tasks: repos.yml

# Outbound SSH config for hosts the bot is expected to reach
# (Mac Studios in the exo cluster, etc.). Sets up ~/.ssh/config and
# pre-trusts known_hosts; pubkey distribution to each target is a
# separate one-time step (see defaults/main.yml).
- name: Provision Bot SSH Targets (Mac Studios etc.)
  ansible.builtin.import_tasks: ssh_targets.yml

# Periodic usage tracker — systemd timer fires the bot's local
# scripts/hermes_usage_tracker.py every 5 minutes. Logs token spend
# (5h / 24h / total) to /home/hermes/.hermes/usage.csv.
- name: Render Hermes Usage Tracker Service Unit
  ansible.builtin.template:
    src: usage_tracker.service.j2
    dest: /etc/systemd/system/hermes-usage-tracker.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload Systemd

- name: Render Hermes Usage Tracker Timer Unit
  ansible.builtin.template:
    src: usage_tracker.timer.j2
    dest: /etc/systemd/system/hermes-usage-tracker.timer
    owner: root
    group: root
    mode: '0644'
  notify: Reload Systemd

- name: Enable & Start Hermes Usage Tracker Timer
  ansible.builtin.systemd:
    name: hermes-usage-tracker.timer
    enabled: true
    state: started
    daemon_reload: true

# Daily check on the OAuth setup-token's expiry. Surfaces via
# `systemctl --failed` when the token has <30 days remaining; without
# this the long-lived token expires silently a year after generation
# and the bot starts 401'ing on inference.
- name: Render Hermes Token Check Service Unit
  ansible.builtin.template:
    src: token_check.service.j2
    dest: /etc/systemd/system/hermes-token-check.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload Systemd

- name: Render Hermes Token Check Timer Unit
  ansible.builtin.template:
    src: token_check.timer.j2
    dest: /etc/systemd/system/hermes-token-check.timer
    owner: root
    group: root
    mode: '0644'
  notify: Reload Systemd

- name: Enable & Start Hermes Token Check Timer
  ansible.builtin.systemd:
    name: hermes-token-check.timer
    enabled: true
    state: started
    daemon_reload: true

# ─── Firewall: restrict api_server (tcp 8642) to Tailnet only ──────────────
#
# api_server.py's bind_guard already requires API_SERVER_KEY when binding
# off-localhost, so the bearer token is the auth boundary. The firewall is
# defense-in-depth: even if the key leaks, only hosts on the tailnet (or
# the LXC itself) can reach the listener at all. Removes the "anyone on
# 172.16.0.0/24 LAN can probe us" path called out in the post-deploy
# security audit.
#
# Strategy:
#   * Default INPUT policy stays ACCEPT (don't break SSH, gateway pings,
#     etc.) — we only restrict the api_server port specifically.
#   * Allow ACCEPTs first, then a single DROP on tcp 8642 catches everything
#     else. Order matters; ansible.builtin.iptables appends, so the order
#     below is the order in the chain.
#   * Sources allowed:
#       - lo (in case anything ever calls 127.0.0.1:8642)
#       - ESTABLISHED,RELATED (so existing connections survive a re-apply)
#       - 100.64.0.0/10  — Tailscale CGNAT range, transparent subnet routing
#       - {{ ip_tailscale_gw }} — fallback for the case where the subnet
#         router source-NATs (it usually doesn't, but cheap to cover)
#       - {{ ip_hermes_gateway }} — the LXC's own IP, since the in-process
#         discord adapter calls api_server via API_SERVER_HOST=this-IP
#
# IPv4 only — `ss -tlnp` confirms api_server isn't listening on ::1/::*,
# so an IPv6 bypass isn't possible without first re-binding the socket.

- name: Install netfilter-persistent for api_server firewall rules
  ansible.builtin.apt:
    name:
      - iptables
      - iptables-persistent
      - netfilter-persistent
    state: present
  notify: Save iptables rules

- name: "iptables: allow loopback to api_server (defense in depth)"
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: lo
    jump: ACCEPT
    comment: "hermes_gateway: loopback"
    state: present
  notify: Save iptables rules

- name: "iptables: keep established/related connections alive"
  ansible.builtin.iptables:
    chain: INPUT
    ctstate: ESTABLISHED,RELATED
    jump: ACCEPT
    comment: "hermes_gateway: established"
    state: present
  notify: Save iptables rules

- name: "iptables: allow Tailnet (100.64.0.0/10) to api_server tcp/8642"
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "8642"
    source: 100.64.0.0/10
    jump: ACCEPT
    comment: "hermes_gateway: tailnet -> api_server"
    state: present
  notify: Save iptables rules

- name: "iptables: allow tailscale subnet router ({{ ip_tailscale_gw }}) to api_server tcp/8642 (covers source-NAT case)"
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "8642"
    source: "{{ ip_tailscale_gw }}"
    jump: ACCEPT
    comment: "hermes_gateway: tailscale-gw -> api_server"
    state: present
  notify: Save iptables rules

- name: "iptables: allow LXC self ({{ ip_hermes_gateway }}) to api_server tcp/8642 (in-process discord adapter)"
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "8642"
    source: "{{ ip_hermes_gateway }}"
    jump: ACCEPT
    comment: "hermes_gateway: self -> api_server"
    state: present
  notify: Save iptables rules

- name: "iptables: drop all other inbound to api_server tcp/8642"
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "8642"
    jump: DROP
    comment: "hermes_gateway: deny api_server"
    state: present
  notify: Save iptables rules

# ─── Tailscale + TLS via `tailscale serve` ────────────────────────────────
#
# Run a Tailscale daemon inside the LXC so the api_server's bearer-token
# Authorization header gets TLS protection end-to-end (laptop → LXC over
# WireGuard, plus TLS on top from `tailscale serve` so the cleartext
# segment between the subnet router and the LXC also goes away).
# `tailscale cert` provisions a real Let's Encrypt cert via DNS-01 against
# tail19c543.ts.net (the user's tailnet). Auto-renews via tailscaled.
#
# api_server itself moves back to 127.0.0.1:8642 (env.j2 sets
# API_SERVER_HOST=127.0.0.1) — `tailscale serve` proxies HTTPS:443 →
# http://127.0.0.1:8642 internally. The Phase-5 iptables rules for
# tcp/8642 then match nothing in practice (cheap defense-in-depth in
# case API_SERVER_HOST ever flips back to a routable IP).
#
# Auth: tailscale up requires an interactive browser auth step the first
# time. The role detects the un-authed state and fails with a clear
# message; the user runs `pct exec 113 -- tailscale up` once on pve02,
# then re-runs the playbook to continue.

- name: Install Tailscale on Hermes Gateway
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL https://tailscale.com/install.sh | sh
  args:
    creates: /usr/bin/tailscale
    executable: /bin/bash

- name: Check Tailscale auth state on Hermes Gateway
  ansible.builtin.command: tailscale status --self --peers=false
  register: hermes_tailscale_status
  failed_when: false
  changed_when: false

- name: Fail with manual-step instructions if Tailscale is not authed
  ansible.builtin.fail:
    msg: |
      Tailscale on hermes-gw-01 is installed but not authed. Run the
      following on pve02 to authorize the CT (browser link will print):

          ssh root@pve02 'pct exec 113 -- tailscale up --hostname=hermes-gw-01'

      Then re-run this playbook. After auth, the role provisions the
      LE cert, configures `tailscale serve`, and re-binds api_server
      to 127.0.0.1.
  when: hermes_tailscale_status.rc != 0 or 'Logged out' in hermes_tailscale_status.stdout

- name: Ensure Tailscale cert directory exists
  ansible.builtin.file:
    path: /var/lib/tailscale/certs
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Provision Let's Encrypt cert for hermes-gw-01.tail19c543.ts.net
  ansible.builtin.command: tailscale cert hermes-gw-01.tail19c543.ts.net
  args:
    chdir: /var/lib/tailscale/certs
    creates: /var/lib/tailscale/certs/hermes-gw-01.tail19c543.ts.net.crt

# ─── Phase 7: per-principal auth keys file + audit log ─────────────────────

- name: Ensure /etc/hermes-gateway exists for the keys file
  ansible.builtin.file:
    path: /etc/hermes-gateway
    state: directory
    owner: hermes
    group: hermes
    mode: '0750'

- name: Render per-principal api_keys.yaml
  ansible.builtin.template:
    src: api_keys.yaml.j2
    dest: /etc/hermes-gateway/api_keys.yaml
    owner: hermes
    group: hermes
    mode: '0640'
  notify: Restart Hermes Gateway

- name: Ensure /var/log/hermes-gateway exists for the audit log
  ansible.builtin.file:
    path: /var/log/hermes-gateway
    state: directory
    owner: hermes
    group: hermes
    mode: '0750'

- name: Install logrotate config for the api_server audit log
  ansible.builtin.template:
    src: audit_logrotate.j2
    dest: /etc/logrotate.d/hermes-gateway
    owner: root
    group: root
    mode: '0644'

- name: Configure tailscale serve to front api_server on https
  ansible.builtin.shell: |
    set -o pipefail
    # Serve config is JSON-stored in tailscaled; check current state to
    # stay idempotent. `tailscale serve status --json` returns {} when
    # nothing is configured.
    current=$(tailscale serve status --json 2>/dev/null || echo '{}')
    if echo "$current" | grep -q '"http://127.0.0.1:8642"'; then
      echo "ALREADY_CONFIGURED"
      exit 0
    fi
    tailscale serve --bg --https=443 http://127.0.0.1:8642
  args:
    executable: /bin/bash
  register: hermes_tailscale_serve
  changed_when: "'ALREADY_CONFIGURED' not in hermes_tailscale_serve.stdout"
