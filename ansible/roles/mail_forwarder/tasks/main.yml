---
- name: Install Postfix
  ansible.builtin.apt:
    name:
      - postfix
      - libsasl2-modules
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Configure Mailname
  ansible.builtin.copy:
    content: "lab.amd-e.com\n"
    dest: /etc/mailname
    owner: root
    group: root
    mode: '0644'

- name: Configure SASL Password Map
  ansible.builtin.copy:
    # icloud_sasl_password comes from inventory/group_vars/all.yml (vault-encrypted)
    content: "[smtp.mail.me.com]:587 amdnative@icloud.com:{{ icloud_sasl_password }}"
    dest: /etc/postfix/sasl_passwd
    owner: root
    group: root
    mode: '0600'
  notify: Update SASL Map

- name: Configure Receiver Canonical Map
  ansible.builtin.template:
    src: sender_canonical.j2
    dest: /etc/postfix/sender_canonical
    owner: root
    group: root
    mode: '0644'
  notify: Update Canonical Map

- name: Configure Header Checks
  ansible.builtin.template:
    src: header_checks.j2
    dest: /etc/postfix/header_checks
    owner: root
    group: root
    mode: '0644'
  notify: Update Header Checks

- name: Configure SMTP Header Checks
  ansible.builtin.template:
    src: smtp_header_checks.j2
    dest: /etc/postfix/smtp_header_checks
    owner: root
    group: root
    mode: '0644'
  notify: Update SMTP Header Checks

- name: Configure Postfix Main Configuration
  ansible.builtin.template:
    src: main.cf.j2
    dest: /etc/postfix/main.cf
    owner: root
    group: root
    mode: '0644'
  notify: Restart Postfix

- name: Configure Virtual Aliases
  ansible.builtin.template:
    src: virtual.j2
    dest: /etc/postfix/virtual
    owner: root
    group: root
    mode: '0644'
  notify: Update Virtual Map
