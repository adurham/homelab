---
- name: Get Self-signed Certificate
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/crypto/certificatekeypairs/?search=authentik%20Self-signed%20Certificate"
    method: GET
    headers: "{{ headers }}"
  register: signing_cert

# -------------------------------------------------------------------------
# Proxmox Provider & Application
# -------------------------------------------------------------------------

- name: Get Existing Providers (Proxmox)
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/providers/oauth2/?search={{ provider_name | urlencode }}"
    method: GET
    headers: "{{ headers }}"
    return_content: true
  register: providers_list

- name: Create Proxmox Provider
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/providers/oauth2/"
    method: POST
    headers: "{{ headers }}"
    body_format: json
    body:
      name: "{{ provider_name }}"
      authorization_flow: "default-provider-authorization-implicit-consent"
      authentication_flow: "default-authentication-flow"
      redirect_uris: >-
        {{ proxmox_redirect_uris.split() | map('regex_replace', '^(.*)$', '{"url": "\1", "matching_mode": "strict"}') | map('from_json') | list }}
      client_type: "confidential"
      signing_key: "{{ signing_cert.json.results[0].pk }}"
    status_code: [200, 201]
  when: providers_list.json.results | length == 0
  register: new_provider

- name: Update Proxmox Provider (Ensure Redirect URIs)
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/providers/oauth2/{{ providers_list.json.results[0].pk }}/"
    method: PATCH
    headers: "{{ headers }}"
    body_format: json
    body:
      redirect_uris: >-
        {{ proxmox_redirect_uris.split() | map('regex_replace', '^(.*)$', '{"url": "\1", "matching_mode": "strict"}') | map('from_json') | list }}
      signing_key: "{{ signing_cert.json.results[0].pk }}"
    status_code: [200]
  when: providers_list.json.results | length > 0
  register: update_provider

- name: Capture Provider ID
  ansible.builtin.set_fact:
    provider_id: "{{ (new_provider.json.pk if new_provider is defined and new_provider.changed else providers_list.json.results[0].pk) }}"

- name: Get Proxmox Application (Direct)
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/core/applications/{{ app_slug }}/"
    method: GET
    headers: "{{ headers }}"
    status_code: [200, 404]
  register: get_app_direct

- name: Create Proxmox Application
  # 400 covers the TOCTOU race: GET returned 404, but between GET and POST
  # another actor created the app — Authentik (DRF) returns 400 with a
  # `{"slug": ["..."]}` body. 5xx still fails the play.
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/core/applications/"
    method: POST
    headers: "{{ headers }}"
    body_format: json
    body:
      name: "{{ app_name }}"
      slug: "{{ app_slug }}"
      provider: "{{ provider_id }}"
      meta_icon: "https://avatars.githubusercontent.com/u/4362756?s=200&v=4"
    status_code: [200, 201, 400]
  when: get_app_direct.status == 404
  register: create_app

- name: Update Proxmox Application (Ensure URL)
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/core/applications/{{ app_slug }}/"
    method: PATCH
    headers: "{{ headers }}"
    body_format: json
    body:
      launch_url: "https://proxmox.chi.lab.amd-e.com/redirect_oidc.html"
      open_in_new_tab: true
      meta_icon: "https://avatars.githubusercontent.com/u/4362756?s=200&v=4"
    status_code: [200]
  when: get_app_direct.status == 200 or (create_app is defined and not create_app.failed)

- name: Capture Proxmox App ID
  ansible.builtin.set_fact:
    proxmox_app_id: "{{ (get_app_direct.json.pk if get_app_direct.status == 200 else create_app.json.pk) }}"

# -------------------------------------------------------------------------
# Restrict Proxmox app access to the 'Proxmox Admins' / 'Proxmox Users'
# Authentik groups. Without these bindings, ANY user passing the Require-MFA
# policy can authenticate to Proxmox (the realm auto-creates a PVE user from
# the groups claim). With group bindings, a user must ALSO be in one of these
# groups — so non-members (e.g. test.user, admin) are denied at the SSO gate.
# Group membership is the single source of truth for Proxmox access.
# -------------------------------------------------------------------------

- name: Look up Proxmox access groups
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/core/groups/?name={{ item | urlencode }}"
    method: GET
    headers: "{{ headers }}"
  register: proxmox_groups
  loop:
    - "Proxmox Admins"
    - "Proxmox Users"

- name: Get existing policy bindings on the Proxmox app
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/policies/bindings/?target={{ proxmox_app_id }}"
    method: GET
    headers: "{{ headers }}"
  register: proxmox_app_bindings

- name: Bind Proxmox access groups to the Proxmox application
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/policies/bindings/"
    method: POST
    headers: "{{ headers }}"
    body_format: json
    body:
      target: "{{ proxmox_app_id }}"
      group: "{{ item.json.results[0].pk }}"
      enabled: true
      order: 10
      negate: false
    status_code: [200, 201]
  loop: "{{ proxmox_groups.results }}"
  when:
    - item.json.results | length > 0
    - item.json.results[0].pk not in (proxmox_app_bindings.json.results | map(attribute='group') | select('string') | list)
  loop_control:
    label: "{{ item.item }}"

# -------------------------------------------------------------------------
# Tanium Integration (SAML)
# -------------------------------------------------------------------------

- name: Get Existing Tanium Provider
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/providers/saml/?search=Tanium"
