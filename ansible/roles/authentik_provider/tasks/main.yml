# -------------------------------------------------------------------------
# Grafana Provider & Application
# -------------------------------------------------------------------------

- name: Get Existing Providers (Grafana)
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/providers/oauth2/?search=Grafana"
    method: GET
    headers: "{{ headers }}"
    return_content: true
  register: grafana_providers_found
  no_log: true

- name: Get Grafana Auth Flow
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/flows/instances/?slug=default-authentication-flow"
    method: GET
    headers: "{{ headers }}"
  register: grafana_auth_flow

- name: Get Grafana Authz Flow
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/flows/instances/?slug=default-provider-authorization-implicit-consent"
    method: GET
    headers: "{{ headers }}"
  register: grafana_authz_flow

- name: Get Grafana Invalidation Flow
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/flows/instances/?slug=default-provider-invalidation-flow"
    method: GET
    headers: "{{ headers }}"
  ignore_errors: true
  register: grafana_invalid_flow

# Authentik prefers a dedicated invalidation flow but older installs lack it.
# Fall back to the auth flow so older deployments don't break. Hoisted here
# so the 3 downstream providers (oauth2 create/update + proxy create) can
# reference it as a short name instead of repeating the ternary inline.
- name: Resolve invalidation flow PK (with fallback)
  ansible.builtin.set_fact:
    grafana_invalidation_pk: >-
      {{ grafana_invalid_flow.json.results[0].pk
         if (not grafana_invalid_flow.failed and grafana_invalid_flow.json.results | length > 0)
         else grafana_auth_flow.json.results[0].pk }}

- name: Create Grafana Provider
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/providers/oauth2/"
    method: POST
    headers: "{{ headers }}"
    body_format: json
    body:
      name: "Grafana"
      client_id: "{{ grafana_client_id | default('grafana') }}"
      client_secret: "{{ grafana_client_secret | default('grafana_secret_placeholder') }}"
      authorization_flow: "{{ grafana_authz_flow.json.results[0].pk }}"
      authentication_flow: "{{ grafana_auth_flow.json.results[0].pk }}"
      invalidation_flow: "{{ grafana_invalidation_pk }}"
      redirect_uris:
        - url: "https://grafana.chi.lab.amd-e.com/login/generic_oauth"
          matching_mode: "strict"
      client_type: "confidential"
      signing_key: "{{ signing_cert.json.results[0].pk }}"
    status_code: [200, 201]
  when: grafana_providers_found.json.results | length == 0
  register: new_grafana_provider
  no_log: true

- name: Capture Grafana Provider ID (Original)
  ansible.builtin.set_fact:
    grafana_provider_id: >-
      {{ new_grafana_provider.json.pk
         if (new_grafana_provider is defined and new_grafana_provider.changed)
         else grafana_providers_found.json.results[0].pk }}

- name: Get Email Scope Mapping
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/propertymappings/all/"
    method: GET
    headers: "{{ headers }}"
  register: scope_mappings

- name: Update Grafana Provider (Sync Secret & URIs & Mappings)
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/providers/oauth2/{{ grafana_provider_id }}/"
    method: PATCH
    headers: "{{ headers }}"
    body_format: json
    body:
      client_secret: "{{ grafana_client_secret | default('grafana_secret_placeholder') }}"
      redirect_uris:
        - url: "https://grafana.chi.lab.amd-e.com/login/generic_oauth"
          matching_mode: "strict"
      client_id: "{{ grafana_client_id | default('grafana') }}"
      property_mappings: >-
        {{ scope_mappings.json.results
           | selectattr('managed', 'defined')
           | selectattr('name', 'search', 'email|profile|openid')
           | map(attribute='pk') | list }}
      authorization_flow: "{{ grafana_authz_flow.json.results[0].pk }}"
      authentication_flow: "{{ grafana_auth_flow.json.results[0].pk }}"
      invalidation_flow: "{{ grafana_invalidation_pk }}"
    status_code: [200]
  when: grafana_provider_id is defined
  no_log: true

- name: Get Grafana Application
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/core/applications/grafana/"
    method: GET
    headers: "{{ headers }}"
    status_code: [200, 404]
  register: get_grafana_app

- name: Create Grafana Application
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/core/applications/"
    method: POST
    headers: "{{ headers }}"
    body_format: json
    body:
      name: "Grafana"
      slug: "grafana"
      provider: "{{ grafana_provider_id }}"
      meta_launch_url: "https://grafana.chi.lab.amd-e.com"
    status_code: [200, 201]
  when: get_grafana_app.status == 404

# -------------------------------------------------------------------------
# VictoriaMetrics — Forward Auth Provider
#
# VM has no built-in auth; lb-01's nginx server block uses
# `auth_request /outpost.goauthentik.io/auth/nginx;` to gate the operator
# UI behind Authentik. This provisions the matching proxy provider +
# application + binds it to the embedded outpost (the same outpost that
# already serves the WhoAmI Provider). After this runs, the nginx
# forward-auth block on lb-01 starts working.
#
# Internal traffic (Grafana datasource → vm-01:8428 directly, Alloy
# remote_write → vm-01:8428 directly) bypasses lb-01 entirely, so this
# only affects browser visits to victoriametrics.chi.lab.amd-e.com.
# -------------------------------------------------------------------------

- name: Get VictoriaMetrics Proxy Providers
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/providers/proxy/?search=VictoriaMetrics"
    method: GET
    headers: "{{ headers }}"
  register: vm_providers_found

- name: Create VictoriaMetrics Proxy Provider
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/providers/proxy/"
    method: POST
    headers: "{{ headers }}"
    body_format: json
    body:
      name: "VictoriaMetrics Provider"
      mode: "forward_single"
      external_host: "https://victoriametrics.chi.lab.amd-e.com"
      internal_host: "http://{{ ip_vm }}:8428"
      internal_host_ssl_validation: false
      intercept_header_auth: true
      authorization_flow: "{{ grafana_authz_flow.json.results[0].pk }}"
      invalidation_flow: "{{ grafana_invalidation_pk }}"
    status_code: [200, 201]
  when: vm_providers_found.json.results | length == 0
  register: new_vm_provider

- name: Capture VictoriaMetrics Provider ID (just-created)
  ansible.builtin.set_fact:
    vm_provider_id: "{{ new_vm_provider.json.pk }}"
  when:
    - new_vm_provider.json is defined
    - new_vm_provider.json.pk is defined

- name: Capture VictoriaMetrics Provider ID (already-exists)
  ansible.builtin.set_fact:
    vm_provider_id: "{{ vm_providers_found.json.results[0].pk }}"
  when:
    - vm_providers_found.json.results | length > 0
    - vm_provider_id is not defined

- name: Get VictoriaMetrics Application
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/core/applications/victoriametrics/"
    method: GET
    headers: "{{ headers }}"
    status_code: [200, 404]
  register: get_vm_app

- name: Create VictoriaMetrics Application
  ansible.builtin.uri:
    url: "{{ authentik_url }}/api/v3/core/applications/"
    method: POST
    headers: "{{ headers }}"
    body_format: json
    body:
      name: "VictoriaMetrics"
      slug: "victoriametrics"
      provider: "{{ vm_provider_id }}"
      meta_launch_url: "https://victoriametrics.chi.lab.amd-e.com"
    status_code: [200, 201]
  when: get_vm_app.status == 404

