---
# Provisions the LXC for the Hermes messaging gateway. Runs against the
# proxmox node hosting the CT (pve02). Mirrors the dns_host role pattern:
# pveam template fetch -> cluster-wide existence check -> pct create ->
# inject SSH key -> add to in-memory inventory.

- name: Update Template Database
  ansible.builtin.command: pveam update
  changed_when: false

- name: Download Ubuntu 22.04 Template
  ansible.builtin.command: pveam download local ubuntu-22.04-standard_22.04-1_amd64.tar.zst
  args:
    creates: /var/lib/vz/template/cache/ubuntu-22.04-standard_22.04-1_amd64.tar.zst

# Resolve the node CT 113 lives on now (HA-aware). Sets ct_exists + ct_node;
# node-local `pct` ops below delegate to ct_node so they follow HA migrations.
- name: Resolve owning node for Hermes Gateway CT
  ansible.builtin.include_role:
    name: resolve_ct_node
  vars:
    ct_vmid: 113

- name: Create Hermes Gateway Container
  ansible.builtin.command: >
    pct create 113 /var/lib/vz/template/cache/ubuntu-22.04-standard_22.04-1_amd64.tar.zst
    --hostname hermes-gw-01
    --cores 2 --memory 2048 --swap 1024
    --rootfs nvme-data:16
    --net0 name=eth0,bridge={{ net_private_bridge }},ip={{ ip_hermes_gateway }}/24,gw={{ net_private_gw }},mtu={{ net_private_mtu }}
    --unprivileged 1
    --features nesting=1
    --password "{{ vault_hermes_gw_root_pass }}"
    --start 1
    --onboot 1
  no_log: true
  when: not ct_exists

- name: Ensure Hermes Gateway Container is Running
  ansible.builtin.command: pct start 113
  delegate_to: "{{ ct_node }}"
  register: hermes_start
  failed_when: hermes_start.rc != 0 and ("already running" not in hermes_start.stderr and "already running" not in hermes_start.stdout)
  changed_when: hermes_start.rc == 0

- name: Wait for Hermes Gateway Container IP
  ansible.builtin.shell: |
    set -o pipefail
    pct exec 113 -- ip a show eth0 | grep "inet " | grep -v "127.0.0.1"
  delegate_to: "{{ ct_node }}"
  register: ip_check
  until: ip_check.rc == 0
  retries: 20
  delay: 3
  changed_when: false

- name: Update Apt Cache in Hermes Gateway Container
  ansible.builtin.command: pct exec 113 -- apt-get update
  delegate_to: "{{ ct_node }}"
  when: not ct_exists
  changed_when: true

- name: Install Python3 in Hermes Gateway Container
  ansible.builtin.command: pct exec 113 -- apt-get install -y python3
  delegate_to: "{{ ct_node }}"
  when: not ct_exists
  changed_when: true

- name: Inject SSH Key into Hermes Gateway Container (via pipe)
  ansible.builtin.shell: |
    set -o pipefail
    pct exec 113 -- mkdir -p /root/.ssh
    cat /root/.ssh/authorized_keys | pct exec 113 -- sh -c "cat > /root/.ssh/authorized_keys"
    pct exec 113 -- chmod 700 /root/.ssh
    pct exec 113 -- chmod 600 /root/.ssh/authorized_keys
  delegate_to: "{{ ct_node }}"
  when: not ct_exists
  changed_when: true

# openssh-server ships in the Ubuntu LXC template but isn't enabled by
# default. Without this the CT is only reachable via `pct exec` from the
# proxmox host — direct SSH from ansible against the CT's IP fails.
- name: Ensure SSH is enabled and running
  ansible.builtin.command: pct exec 113 -- systemctl enable --now ssh
  delegate_to: "{{ ct_node }}"
  changed_when: false

# TUN device passthrough so Tailscale can run inside the unprivileged CT.
# Mirrors the tailscale-gw CT's config (tailscale_gw_host role). Without
# these two lines, /dev/net/tun isn't visible inside the container and
# `tailscale up` fails with "device or resource busy" / "no such device".
#
# Both edits are idempotent via lineinfile; the LXC must be restarted
# for them to take effect (handled by the `Restart Hermes Gateway Container
# for TUN access` task below, which only fires when the conf actually
# changed).

- name: Allow tun device cgroup in Hermes Gateway LXC config
  ansible.builtin.lineinfile:
    path: /etc/pve/lxc/113.conf
    line: 'lxc.cgroup2.devices.allow: c 10:200 rwm'
    state: present
    create: false
  register: hermes_tun_cgroup

- name: Mount tun device in Hermes Gateway LXC config
  ansible.builtin.lineinfile:
    path: /etc/pve/lxc/113.conf
    line: 'lxc.mount.entry: /dev/net/tun dev/net/tun none bind,create=file'
    state: present
    create: false
  register: hermes_tun_mount

- name: Restart Hermes Gateway Container for TUN access
  ansible.builtin.command: pct reboot 113
  delegate_to: "{{ ct_node }}"
  when: hermes_tun_cgroup.changed or hermes_tun_mount.changed
  changed_when: true

- name: Wait for Hermes Gateway Container SSH after TUN restart
  # The wait_for runs from the localhost (controller). After Phase 6 the
  # SSH target moved off ip_hermes_gateway (subnet-routed path is broken
  # post-tailscale-on-LXC) onto the Tailscale hostname. Use the runtime
  # `ansible_host` for the in-memory hermes-gw-01 entry so this stays
  # in sync with whatever the inventory points at.
  ansible.builtin.wait_for:
    host: "{{ hostvars['hermes-gw-01'].ansible_host | default(ip_hermes_gateway) }}"
    port: 22
    timeout: 60
  when: hermes_tun_cgroup.changed or hermes_tun_mount.changed
  delegate_to: localhost

- name: Add Hermes Gateway Host to In-Memory Inventory
  # Reach via Tailscale (see inventory/proxmox.yml comment for hermes-gw-01).
  # Pre-Phase-6 this used ip_hermes_gateway (172.16.0.50); the subnet-routed
  # path stopped working when the LXC joined Tailnet directly.
  ansible.builtin.add_host:
    name: hermes-gw-01
    ansible_host: hermes-gw-01.tail19c543.ts.net
    ansible_user: root
    groups: hermes_gateway
