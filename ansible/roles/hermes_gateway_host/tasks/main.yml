---
# Provisions the LXC for the Hermes messaging gateway. Runs against the
# proxmox node hosting the CT (pve02). Mirrors the dns_host role pattern:
# pveam template fetch -> cluster-wide existence check -> pct create ->
# inject SSH key -> add to in-memory inventory.

- name: Update Template Database
  ansible.builtin.command: pveam update
  changed_when: false

- name: Download Ubuntu 22.04 Template
  ansible.builtin.command: pveam download local ubuntu-22.04-standard_22.04-1_amd64.tar.zst
  args:
    creates: /var/lib/vz/template/cache/ubuntu-22.04-standard_22.04-1_amd64.tar.zst

# Cluster-wide existence check. `pct config` is node-local; HA can migrate
# the CT, so query pmxcfs for the full resource list. rc=0 means the CT
# already exists somewhere in the cluster.
- name: Check if Hermes Gateway Container Exists in cluster
  ansible.builtin.shell: |
    set -o pipefail
    pvesh get /cluster/resources --type vm --output-format json |
      python3 -c 'import json,sys; sys.exit(0 if any(r["vmid"]==113 for r in json.load(sys.stdin)) else 1)'
  register: pct_check
  failed_when: false
  changed_when: false

- name: Create Hermes Gateway Container
  ansible.builtin.command: >
    pct create 113 /var/lib/vz/template/cache/ubuntu-22.04-standard_22.04-1_amd64.tar.zst
    --hostname hermes-gw-01
    --cores 2 --memory 2048 --swap 1024
    --rootfs nvme-data:16
    --net0 name=eth0,bridge={{ net_private_bridge }},ip={{ ip_hermes_gateway }}/24,gw={{ net_private_gw }},mtu={{ net_private_mtu }}
    --unprivileged 1
    --features nesting=1
    --password "{{ vault_hermes_gw_root_pass }}"
    --start 1
    --onboot 1
  no_log: true
  when: pct_check.rc != 0

- name: Ensure Hermes Gateway Container is Running
  ansible.builtin.command: pct start 113
  register: hermes_start
  failed_when: hermes_start.rc != 0 and ("already running" not in hermes_start.stderr and "already running" not in hermes_start.stdout)
  changed_when: hermes_start.rc == 0

- name: Wait for Hermes Gateway Container IP
  ansible.builtin.shell: |
    set -o pipefail
    pct exec 113 -- ip a show eth0 | grep "inet " | grep -v "127.0.0.1"
  register: ip_check
  until: ip_check.rc == 0
  retries: 20
  delay: 3
  changed_when: false

- name: Update Apt Cache in Hermes Gateway Container
  ansible.builtin.command: pct exec 113 -- apt-get update
  when: pct_check.rc != 0
  changed_when: true

- name: Install Python3 in Hermes Gateway Container
  ansible.builtin.command: pct exec 113 -- apt-get install -y python3
  when: pct_check.rc != 0
  changed_when: true

- name: Inject SSH Key into Hermes Gateway Container (via pipe)
  ansible.builtin.shell: |
    set -o pipefail
    pct exec 113 -- mkdir -p /root/.ssh
    cat /root/.ssh/authorized_keys | pct exec 113 -- sh -c "cat > /root/.ssh/authorized_keys"
    pct exec 113 -- chmod 700 /root/.ssh
    pct exec 113 -- chmod 600 /root/.ssh/authorized_keys
  when: pct_check.rc != 0
  changed_when: true

# openssh-server ships in the Ubuntu LXC template but isn't enabled by
# default. Without this the CT is only reachable via `pct exec` from the
# proxmox host — direct SSH from ansible against the CT's IP fails.
- name: Ensure SSH is enabled and running
  ansible.builtin.command: pct exec 113 -- systemctl enable --now ssh
  changed_when: false

- name: Add Hermes Gateway Host to In-Memory Inventory
  ansible.builtin.add_host:
    name: hermes-gw-01
    ansible_host: "{{ ip_hermes_gateway }}"
    ansible_user: root
    groups: hermes_gateway
