---
# Cluster-wide existence check. `pct list` is node-local; HA can migrate
# the CT to any node, so we ask pmxcfs for the full cluster resource list.
# rc=0 means the CT exists somewhere in the cluster.
- name: Check if Load Balancer LXC exists in cluster
  delegate_to: "{{ target_node }}"
  ansible.builtin.shell: |
    set -o pipefail
    pvesh get /cluster/resources --type vm --output-format json |
      python3 -c 'import json,sys; sys.exit(0 if any(r["vmid"]=={{ lxc_id }} for r in json.load(sys.stdin)) else 1)'
  register: lxc_check
  failed_when: false
  changed_when: false

- name: Download Template
  delegate_to: "{{ target_node }}"
  ansible.builtin.command: "pveam download {{ lxc_template_storage }} {{ lxc_template_file }}"
  register: template_dl
  args:
    creates: "/var/lib/vz/template/cache/{{ lxc_template_file }}"

- name: Create Load Balancer LXC
  delegate_to: "{{ target_node }}"
  ansible.builtin.shell: >
    pct create {{ lxc_id }} {{ lxc_template_storage }}:vztmpl/{{ lxc_template_file }}
    --hostname {{ lxc_hostname }}
    --cores {{ lxc_cores }}
    --memory {{ lxc_memory }}
    --swap {{ lxc_swap }}
    --net0 name=eth0,bridge=private,ip={{ lxc_net_ip }},firewall=1
    --net1 name=eth1,bridge=vmbr0,ip=dhcp,firewall=1
    --password {{ lb_01_root_pass }}
    --features nesting=1
    --ostype debian
    --unprivileged 1
    --ssh-public-keys /root/.ssh/authorized_keys
  no_log: true
  when: lxc_check.rc != 0
  register: lxc_create

- name: Start Load Balancer LXC
  # Only start right after creation (matches the lxc_create gate). After
  # that, HA (or the operator) owns the running-state. The "already
  # running" tolerance is defensive for the edge where create reports
  # changed but something else started the CT first.
  delegate_to: "{{ target_node }}"
  ansible.builtin.command: "pct start {{ lxc_id }}"
  register: lxc_start
  failed_when: lxc_start.rc != 0 and "already running" not in lxc_start.stderr
  changed_when: lxc_start.rc == 0
  when: lxc_check.rc != 0

- name: Check if Net1 exists
  delegate_to: "{{ target_node }}"
  ansible.builtin.shell: |
    set -o pipefail
    pct config {{ lxc_id }} | grep net1
  register: net1_check
  failed_when: false
  changed_when: false

- name: Add Net1 Interface (LAN - DHCP)
  delegate_to: "{{ target_node }}"
  ansible.builtin.shell: "pct set {{ lxc_id }} -net1 name=eth1,bridge=vmbr0,ip=dhcp,firewall=1"
  when: lxc_check.rc == 0 and net1_check.rc != 0

- name: Ensure SSH Service is Running
  delegate_to: "{{ target_node }}"
  ansible.builtin.shell: "pct exec {{ lxc_id }} -- systemctl enable --now ssh"
  changed_when: false
  ignore_errors: true

- name: Wait for Load Balancer to be ready
  ansible.builtin.wait_for_connection:
    delay: 10
    timeout: 300
