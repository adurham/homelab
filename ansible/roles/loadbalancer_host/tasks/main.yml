---
# Cluster-wide locate. `pct` is node-local, but Proxmox HA can migrate the
# CT to any node at any time, so a static target_node pin goes stale the
# moment HA moves it (symptom: `pct set` fails with "Configuration file
# 'nodes/<pinned>/lxc/<id>.conf' does not exist"). We ask pmxcfs for the
# cluster resource list and record the node the CT *actually* lives on,
# then delegate every node-local pct operation to that node (lb_node).
# target_node is used only as (a) the cluster-query entry point and (b) the
# placement node when the CT doesn't exist yet and must be created.
- name: Locate Load Balancer LXC in cluster
  delegate_to: "{{ target_node }}"
  ansible.builtin.shell: |
    set -o pipefail
    pvesh get /cluster/resources --type vm --output-format json |
      python3 -c 'import json,sys; r=[x for x in json.load(sys.stdin) if x["vmid"]=={{ lxc_id }}]; print(r[0]["node"] if r else "")'
  register: lxc_locate
  failed_when: false
  changed_when: false

# lb_exists drives the create/start gates; lb_node is where the CT lives now
# (falls back to target_node for the not-yet-created case, which is also the
# placement target — so post-create operations correctly target that node).
- name: Resolve CT existence and current node
  ansible.builtin.set_fact:
    lb_exists: "{{ (lxc_locate.stdout | default('') | trim) | length > 0 }}"
    lb_node: "{{ (lxc_locate.stdout | default('') | trim) or target_node }}"

- name: Download Template
  delegate_to: "{{ target_node }}"
  ansible.builtin.command: "pveam download {{ lxc_template_storage }} {{ lxc_template_file }}"
  register: template_dl
  args:
    creates: "/var/lib/vz/template/cache/{{ lxc_template_file }}"

- name: Create Load Balancer LXC
  delegate_to: "{{ target_node }}"
  ansible.builtin.shell: >
    pct create {{ lxc_id }} {{ lxc_template_storage }}:vztmpl/{{ lxc_template_file }}
    --hostname {{ lxc_hostname }}
    --cores {{ lxc_cores }}
    --memory {{ lxc_memory }}
    --swap {{ lxc_swap }}
    --net0 name=eth0,bridge=private,ip={{ lxc_net_ip }},gw={{ net_private_gw }},firewall=1
    --password {{ lb_01_root_pass }}
    --features nesting=1
    --ostype debian
    --unprivileged 1
    --ssh-public-keys /root/.ssh/authorized_keys
  no_log: true
  when: not lb_exists
  register: lxc_create

- name: Start Load Balancer LXC
  # Only start right after creation (matches the lxc_create gate). After
  # that, HA (or the operator) owns the running-state. The "already
  # running" tolerance is defensive for the edge where create reports
  # changed but something else started the CT first.
  delegate_to: "{{ target_node }}"
  ansible.builtin.command: "pct start {{ lxc_id }}"
  register: lxc_start
  failed_when: lxc_start.rc != 0 and "already running" not in lxc_start.stderr
  changed_when: lxc_start.rc == 0
  when: not lb_exists

# lb-01 is DUAL-HOMED: net0 = private SDN (backends), net1 = LAN ingress.
# It IS the internet ingress — Google Home forwards :80/:443 to its LAN IP, and
# it runs the No-IP DDNS updater. The backends (gallery/vm/graf) are private-
# only, but the load balancer itself must straddle LAN+SDN or external access
# (auth.chi, tanium.chi, etc.) breaks. net1 uses a STATIC LAN IP — AdGuard (in
# Home Assistant) does DHCP but systemd-networkd won't reliably hold a lease on
# this CT, and a static ingress IP is the right call for infra anyway. The
# in-CT eth1.network deliberately sets NO gateway so default egress stays via
# the private SDN gateway (no asymmetric-routing 502s).
- name: Check if Net1 (LAN ingress) exists
  delegate_to: "{{ lb_node }}"
  ansible.builtin.shell: |
    set -o pipefail
    pct config {{ lxc_id }} | grep -q '^net1'
  register: net1_check
  failed_when: false
  changed_when: false

- name: Ensure LAN ingress interface (net1 on vmbr0)
  delegate_to: "{{ lb_node }}"
  ansible.builtin.command: "pct set {{ lxc_id }} --net1 name=eth1,bridge=vmbr0,ip=dhcp,firewall=1"
  when: lb_exists and net1_check.rc != 0
  changed_when: true

- name: Ensure private gateway on net0
  delegate_to: "{{ lb_node }}"
  ansible.builtin.shell: |
    set -o pipefail
    pct config {{ lxc_id }} | grep -q '^net0:.*gw={{ net_private_gw }}'
  register: lb_gw_check
  failed_when: false
  changed_when: false

- name: Set private gateway on net0 if missing
  delegate_to: "{{ lb_node }}"
  ansible.builtin.command: >
    pct set {{ lxc_id }} --net0 name=eth0,bridge=private,ip={{ lxc_net_ip }},gw={{ net_private_gw }},firewall=1
  when: lb_exists and lb_gw_check.rc != 0
  changed_when: true

- name: Ensure SSH Service is Running
  delegate_to: "{{ lb_node }}"
  ansible.builtin.shell: "pct exec {{ lxc_id }} -- systemctl enable --now ssh"
  changed_when: false
  ignore_errors: true

- name: Wait for Load Balancer to be ready
  ansible.builtin.wait_for_connection:
    delay: 10
    timeout: 300
