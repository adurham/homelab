---
- name: Enable IPv4 Forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: true
    state: present
    reload: true

- name: Install Dependencies
  ansible.builtin.apt:
    name:
      - curl
      - iptables-persistent
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install Tailscale
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL https://tailscale.com/install.sh | sh
  args:
    creates: /usr/bin/tailscale

- name: Configure NAT (Masquerade for Private Network)
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    source: "{{ net_private_range }}"
    out_interface: eth0
    jump: MASQUERADE
    action: append
  notify: Save IPTables

# BWT lab traffic egresses the tailnet → CT 101 eth2 (10.99.0.3) → in to
# 10.99/24. Replies need to be SNATed if any 10.99 host happens to reply
# direct to the work Mac's 100.x tailscale IP rather than 10.99.0.3. We
# mirror the 172.16 pattern (MASQUERADE eth0). Inbound from the tailnet
# already routes correctly through eth2 because the route is on-link.
- name: Configure NAT (Masquerade for BWT Lab Network)
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    source: "{{ net_bwt_range }}"
    out_interface: eth0
    jump: MASQUERADE
    action: append
  notify: Save IPTables

- name: Save IPTables
  ansible.builtin.command: netfilter-persistent save
  changed_when: false

# Disable subnet-route SNAT so hosts on 172.16.0.0/24 see the original
# Tailnet source IPs (100.x) instead of this router's IP (172.16.0.1).
# With SNAT on (Tailscale's default), anything routed in from Tailnet
# looks like local-gateway traffic at the destination — which means
# iptables/audit on each host can't distinguish Tailnet from any other
# off-subnet origin. Disabling it makes per-host firewalls honest:
# hermes-gw can ACCEPT 100.64.0.0/10, drop everything else, and that's
# actually what happens at the wire.
#
# Return path is unaffected: hosts on 172.16.0.0/24 route 100.x via
# their default gateway (172.16.0.1 = this host), which knows the
# Tailscale interface — same path as before, just no source rewrite
# on the way in.

- name: Check current Tailscale SNAT setting
  ansible.builtin.shell: |
    set -o pipefail
    tailscale debug prefs | python3 -c 'import json,sys; print(json.load(sys.stdin).get("NoSNAT", False))'
  register: tailscale_snat_check
  changed_when: false

- name: Disable Tailscale subnet-route SNAT (preserve Tailnet source IPs)
  ansible.builtin.command: tailscale set --snat-subnet-routes=false
  when: tailscale_snat_check.stdout.strip() != "True"

# Tailscale subnet advertisement. `tailscale set` is idempotent and does
# NOT require re-authentication (unlike `tailscale up`), so we drive it
# from a single source of truth in group_vars/all/vars.yml. New routes
# must still be approved manually in the Tailscale admin UI the first
# time they appear — this task just declares the gateway's intent.
- name: Advertise tailnet subnet routes
  ansible.builtin.command: >
    tailscale set --advertise-routes={{ tailscale_advertised_routes | join(',') }}
  register: ts_set
  changed_when: ts_set.rc == 0
  failed_when: ts_set.rc != 0
  # Skip when tailscale isn't enrolled yet (initial install needs manual
  # `tailscale up` with auth key; routes are configured on first
  # enrollment too).
  when: tailscale_advertised_routes is defined
