---
# Installs the upstream source gallery collector inside the media-ingest-01 LXC.
# Runs against the CT directly (after media_ingest_host provisions it).
# Pattern: apt deps -> service user -> tmpfs staging -> venv + telethon ->
# deploy code/units -> conditional start (only once the source client session is
# authorized — copied over from a one-time interactive login).

- name: Install Base OS Packages
  ansible.builtin.apt:
    name:
      - python3
      - python3-venv
      - python3-dev
      - build-essential
      - ca-certificates
      - curl
      - iptables
      - iptables-persistent
      - netfilter-persistent
    state: present
    update_cache: true
    cache_valid_time: 3600

# ─── Service account + directories ─────────────────────────────────────────
- name: Create Collector System User
  ansible.builtin.user:
    name: "{{ media_ingest_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: "/home/{{ media_ingest_user }}"
    create_home: true
    state: present

- name: Ensure Install + State + Log Directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ media_ingest_user }}"
    group: "{{ media_ingest_user }}"
    mode: '0750'
  loop:
    - "{{ media_ingest_dir }}"
    - "{{ media_ingest_state }}"
    - "{{ media_ingest_log_dir }}"

# ─── Hardening: tmpfs for decrypted-media staging ──────────────────────────
# The staging dir holds DECRYPTED media in flight to the gallery. Back it with
# tmpfs so nothing viewable ever persists to disk — a stolen disk / Proxmox
# backup / snapshot contains no plaintext. Unit filename is a systemd-escaped
# path.
- name: Compute systemd-escaped mount unit name
  ansible.builtin.command: "systemd-escape -p --suffix=mount {{ media_ingest_state }}/staging"
  register: media_ingest_mount_unit
  changed_when: false

- name: Render staging tmpfs mount unit
  ansible.builtin.template:
    src: staging.mount.j2
    dest: "/etc/systemd/system/{{ media_ingest_mount_unit.stdout }}"
    owner: root
    group: root
    mode: '0644'
  notify: Reload Systemd

- name: Enable & Start staging tmpfs mount (decrypted media RAM-only)
  ansible.builtin.systemd:
    name: "{{ media_ingest_mount_unit.stdout }}"
    enabled: true
    state: started
    daemon_reload: true

# ─── Python venv + source ────────────────────────────────────────────────
- name: Create Collector Virtualenv
  ansible.builtin.command: python3 -m venv {{ media_ingest_dir }}/venv
  args:
    creates: "{{ media_ingest_dir }}/venv/bin/python"
  become: true
  become_user: "{{ media_ingest_user }}"

- name: Upgrade pip/setuptools/wheel
  ansible.builtin.pip:
    name:
      - pip
      - setuptools
      - wheel
    state: latest  # noqa: package-latest
    virtualenv: "{{ media_ingest_dir }}/venv"
  become: true
  become_user: "{{ media_ingest_user }}"

- name: Install source (pinned) + requests
  ansible.builtin.pip:
    name:
      - "telethon=={{ media_ingest_telethon_version }}"
      - requests
    virtualenv: "{{ media_ingest_dir }}/venv"
  become: true
  become_user: "{{ media_ingest_user }}"

# ─── Deploy code ───────────────────────────────────────────────────────────
- name: Deploy Gallery Client
  ansible.builtin.copy:
    src: store_client.py
    dest: "{{ media_ingest_dir }}/store_client.py"
    owner: "{{ media_ingest_user }}"
    group: "{{ media_ingest_user }}"
    mode: '0750'
  notify: Restart Collector Collector

- name: Deploy Collector Collector
  ansible.builtin.copy:
    src: collector.py
    dest: "{{ media_ingest_dir }}/collector.py"
    owner: "{{ media_ingest_user }}"
    group: "{{ media_ingest_user }}"
    mode: '0750'
  notify: Restart Collector Collector

- name: Deploy Backfill Script
  ansible.builtin.copy:
    src: backfill.py
    dest: "{{ media_ingest_dir }}/backfill.py"
    owner: "{{ media_ingest_user }}"
    group: "{{ media_ingest_user }}"
    mode: '0750'
  notify: Restart Collector Collector

# ─── Env file (secrets from vault) ─────────────────────────────────────────
- name: Render Collector Env File
  ansible.builtin.template:
    src: collector.env.j2
    dest: "{{ media_ingest_dir }}/collector.env"
    owner: "{{ media_ingest_user }}"
    group: "{{ media_ingest_user }}"
    mode: '0600'
  no_log: true
  notify: Restart Collector Collector

# ─── Detect whether the source client session is already authorized ──────────────
# The collector unit crash-loops if the .session isn't authorized yet. Gate the
# enable/start (and the Restart handler) on this so a fresh deploy doesn't
# crash-loop before the one-time login session has been copied over.
- name: Check for Authorized Session File
  ansible.builtin.stat:
    path: "{{ media_ingest_state }}/collector.session"
  register: session_stat

- name: Set Session Authorized Fact
  ansible.builtin.set_fact:
    collector_session_authorized: "{{ session_stat.stat.exists and session_stat.stat.size | default(0) > 0 }}"

# ─── systemd unit ──────────────────────────────────────────────────────────
- name: Render Collector Collector Service Unit
  ansible.builtin.template:
    src: media-ingest-collector.service.j2
    dest: /etc/systemd/system/media-ingest-collector.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload Systemd
    - Restart Collector Collector

- name: Enable & Start Collector Collector (only if session authorized)
  ansible.builtin.systemd:
    name: media-ingest-collector.service
    enabled: true
    state: started
    daemon_reload: true
  when: collector_session_authorized

- name: Enable Collector Collector Unit (session not yet authorized)
  ansible.builtin.systemd:
    name: media-ingest-collector.service
    enabled: true
    daemon_reload: true
  when: not collector_session_authorized

- name: One-Time Login Reminder
  ansible.builtin.debug:
    msg: >-
      Session not yet authorized. Copy an authorized source session to
      {{ media_ingest_state }}/collector.session (owned by {{ media_ingest_user }}),
      then: systemctl start media-ingest-collector.service
  when: not collector_session_authorized

# ─── Security hardening ────────────────────────────────────────────────────
# NOTE: this box makes only OUTBOUND connections (to upstream source + lb-01 for the
# gallery API). It exposes NO inbound services, so there are no service ports
# to lock down — the port-DROP rules used by media_gallery are intentionally
# omitted here. We still harden SSH to key-only auth.

# SSH: key-only. mediaingest is nologin; admin is root-via-key. No password auth.
- name: Harden SSH (key-only, no passwords)
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-harden.conf
    content: |
      # Managed by Ansible (roles/media_ingest). Key-only auth.
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PermitRootLogin prohibit-password
    owner: root
    group: root
    mode: '0644'
  notify: Reload SSH
