---
- name: Update Template Database
  ansible.builtin.command: pveam update
  changed_when: false

# Resolve the node CT 101 lives on now (HA-aware). Sets ct_exists + ct_node;
# node-local `pct` ops below delegate to ct_node so they follow HA migrations.
- name: Resolve owning node for Tailscale GW CT
  ansible.builtin.include_role:
    name: resolve_ct_node
  vars:
    ct_vmid: 101

- name: Create Tailscale Gateway Container
  ansible.builtin.command: >
    pct create 101 /var/lib/vz/template/cache/ubuntu-22.04-standard_22.04-1_amd64.tar.zst
    --hostname tailscale-gw
    --cores 1 --memory 512 --swap 512
    --net0 name=eth0,bridge=vmbr0,ip=dhcp
    --net1 name=eth1,bridge=private,ip={{ net_private_gw }}/24
    --net2 name=eth2,bridge={{ net_bwt_bridge }},ip={{ ip_tailscale_gw_bwt }}/24,mtu={{ net_bwt_mtu }}
    --storage nvme-data
    --unprivileged 0
    --features nesting=1
    --password "{{ tailscale_gw_root_pass }}"
  no_log: true
  when: not ct_exists

# CT may have been created before the BWT VNet existed (originally only had
# net0+net1). Ensure a net2 on the `bwt` bridge is present. `pvesh` is
# cluster-aware so these run from any node, addressing the CT via its current
# owning node (ct_node) — `pct set` would fail if the CT migrated. Idempotent:
# `pvesh set ... -netN` no-ops when the value matches.
- name: Read current CT 101 net2 config (cluster-API, node-agnostic)
  ansible.builtin.shell: |
    set -o pipefail
    pvesh get /nodes/{{ ct_node }}/lxc/101/config --output-format json |
      python3 -c 'import json,sys; print(json.load(sys.stdin).get("net2",""))'
  register: gw_net2
  changed_when: false
  when: ct_exists

- name: Ensure CT 101 has net2 on the BWT bridge
  # `pvesh set ... -netN` issues a hotplug — no restart required. The
  # existing `Restart Gateway` handler is also node-local (uses `pct`) and
  # would fail when CT 101 lives on a non-controller node, so we explicitly
  # do not notify it here.
  ansible.builtin.command: >
    pvesh set /nodes/{{ ct_node }}/lxc/101/config
    -net2 name=eth2,bridge={{ net_bwt_bridge }},ip={{ ip_tailscale_gw_bwt }}/24,mtu={{ net_bwt_mtu }},type=veth
  when:
    - ct_exists
    - "'bridge=' + net_bwt_bridge not in gw_net2.stdout"
- name: Check LXC Config for Tun Access
  ansible.builtin.command: 'grep -q "lxc.mount.entry: /dev/net/tun" /etc/pve/lxc/101.conf'
  register: tun_check
  failed_when: false
  changed_when: false
  when: not ct_exists # Only check if container exists or was just created

- name: Enable Tun Access in LXC Config
  ansible.builtin.shell: |
    echo 'lxc.cgroup2.devices.allow: c 10:200 rwm' >> /etc/pve/lxc/101.conf
    echo 'lxc.mount.entry: /dev/net/tun dev/net/tun none bind,create=file' >> /etc/pve/lxc/101.conf
  when: (not ct_exists) and (tun_check.rc != 0)
  notify: Restart Gateway

- name: Ensure Gateway is Running
  ansible.builtin.command: pct start 101
  delegate_to: "{{ ct_node }}"
  register: gw_start
  failed_when: gw_start.rc != 0 and ("already running" not in gw_start.stderr and "already running" not in gw_start.stdout)
  changed_when: gw_start.rc == 0

# Since it uses DHCP on eth0, we must query it.
- name: Get Gateway IP
  ansible.builtin.shell: |
    set -o pipefail
    pct exec 101 -- ip -4 addr show eth0 | grep -oP '(?<=inet\s)\d+(\.\d+){3}'
  delegate_to: "{{ ct_node }}"
  register: gw_ip
  changed_when: false
  until: gw_ip.stdout != ""
  retries: 20
  delay: 5

- name: Add Gateway to Inventory
  ansible.builtin.add_host:
    name: "tailscale_gw"
    ansible_host: "{{ gw_ip.stdout }}"
    ansible_user: "root"
    groups: "tailscale_gateways"

# openssh-server ships with the Ubuntu LXC template but is not enabled by
# default. Without this the CT is only reachable via `pct exec` from the
# proxmox host — direct SSH from ansible against the CT's IP fails.
- name: Ensure SSH is enabled and running
  ansible.builtin.command: pct exec 101 -- systemctl enable --now ssh
  delegate_to: "{{ ct_node }}"
  changed_when: false
