---
# Cluster-wide existence check. `pct list` is node-local; HA can migrate
# the CT to any node, so we ask pmxcfs for the full cluster resource list.
# rc=0 means the CT exists somewhere in the cluster.
- name: Check if Mail Container Exists in cluster
  ansible.builtin.shell: |
    set -o pipefail
    pvesh get /cluster/resources --type vm --output-format json |
      python3 -c 'import json,sys; sys.exit(0 if any(r["vmid"]==104 for r in json.load(sys.stdin)) else 1)'
  register: pct_check
  failed_when: false
  changed_when: false

- name: Create Mail Container
  ansible.builtin.command: >
    pct create 104 /var/lib/vz/template/cache/ubuntu-22.04-standard_22.04-1_amd64.tar.zst
    --hostname mail-01
    --cores 1 --memory 512 --swap 512
    --net0 name=eth0,bridge=private,ip={{ ip_mail_server }}/24,gw={{ net_private_gw }}
    --storage nvme-data
    --unprivileged 1
    --features nesting=1
    --password "{{ mail_01_root_pass }}"
    --start 1
    --onboot 1
  when: pct_check.rc != 0

- name: Wait for Mail Container IP
  ansible.builtin.shell: |
    set -o pipefail
    pct exec 104 -- ip a show eth0 | grep "inet " | grep -v "127.0.0.1"
  register: ip_check
  until: ip_check.rc == 0
  retries: 20
  delay: 3
  changed_when: false

- name: Update Apt Cache in Mail Container
  ansible.builtin.command: pct exec 104 -- apt-get update
  when: pct_check.rc != 0
  changed_when: true

- name: Install Python3 in Mail Container
  ansible.builtin.command: pct exec 104 -- apt-get install -y python3
  when: pct_check.rc != 0
  changed_when: true

- name: Inject SSH Key into Mail Container
  ansible.builtin.shell: |
    set -o pipefail
    pct exec 104 -- mkdir -p /root/.ssh
    cat /root/.ssh/authorized_keys | pct exec 104 -- sh -c "cat > /root/.ssh/authorized_keys"
    pct exec 104 -- chmod 700 /root/.ssh
    pct exec 104 -- chmod 600 /root/.ssh/authorized_keys
  when: pct_check.rc != 0

# openssh-server ships with the Ubuntu LXC template but is not enabled by
# default. Without this the CT is only reachable via `pct exec` from the
# proxmox host — direct SSH from ansible against the CT's IP fails.
- name: Ensure SSH is enabled and running
  ansible.builtin.command: pct exec 104 -- systemctl enable --now ssh
  changed_when: false
