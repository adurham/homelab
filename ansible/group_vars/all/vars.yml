---
# Global Network Configuration
# Centralized here to avoid hardcoded IPs in roles

# Private Network (VXLAN)
net_private_range: "172.16.0.0/24"
net_private_gw: "172.16.0.1"
net_private_bridge: "private"
net_private_mtu: 1450 # VXLAN Overhead (1500 - 50)

# LAN (vmbr0). Static config on every host (DHCP reservations on the
# router); single source of truth for nginx ACLs, DNS trusted-ACL, and
# pve interfaces.j2.
net_lan_range: "192.168.86.0/24"
net_lan_gateway: "192.168.86.1"

# Home Assistant lives on the LAN, not the SDN — it's the iOS push relay
# for Grafana alerts (see homeassistant/automations/grafana_alert_webhook.yaml).
ip_homeassistant: "192.168.86.2"


# Service IP Addresses (Static)
# Single source of truth for service IPs. Inventory's `ansible_host:` should
# match — when they diverge, ARP races silently send traffic to the wrong CT
# (see docs/ipam.md).
ip_dns_primary: "172.16.0.10"
ip_ntp_server: "172.16.0.11"
ip_proxy: "172.16.0.12"
ip_authentik: "172.16.0.20"
ip_loadbalancer: "172.16.0.30"
ip_mail_server: "172.16.0.40"
ip_grafana: "172.16.0.41"
ip_vm: "172.16.0.42"
ip_tailscale_gw: "172.16.0.101"

# Email destination for the Grafana fallback contact point. Routes through
# mail-01's postfix relay -> iCloud SMTP. Used as a backup channel when the
# HA webhook is broken.
alert_email_to: "amdnative@icloud.com"

# Cluster Nodes (Physical LAN)
# Used for SDN Peering and Corosync
proxmox_cluster_peers: "192.168.86.11,192.168.86.12,192.168.86.13"
