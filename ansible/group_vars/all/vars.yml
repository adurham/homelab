---
# Global Network Configuration
# Centralized here to avoid hardcoded IPs in roles

# Private Network (VXLAN)
net_private_range: "172.16.0.0/24"
net_private_gw: "172.16.0.1"
net_private_bridge: "private"
net_private_mtu: 1450 # VXLAN Overhead (1500 - 50)

# LAN (vmbr0). Static config on every host (DHCP reservations on the
# router); single source of truth for nginx ACLs, DNS trusted-ACL, and
# pve interfaces.j2.
net_lan_range: "192.168.86.0/24"
net_lan_gateway: "192.168.86.1"

# Home Assistant lives on the LAN, not the SDN — it's the iOS push relay
# for Grafana alerts (see homeassistant/automations/grafana_alert_webhook.yaml).
ip_homeassistant: "192.168.86.2"


# Service IP Addresses (Static)
# Single source of truth for service IPs. Inventory's `ansible_host:` should
# match — when they diverge, ARP races silently send traffic to the wrong CT
# (see docs/ipam.md).
ip_dns_primary: "172.16.0.10"
ip_ntp_server: "172.16.0.11"
ip_proxy: "172.16.0.12"
ip_authentik: "172.16.0.20"
# Authentik public base URL (no trailing slash). Used by any role that needs to
# build OIDC/JWKS endpoints — e.g. the media_gallery upload service validates the
# collector's Bearer JWT against {{ authentik_url }}/application/o/media-ingest-collector/jwks/.
# Previously this was a play-local var only in configure_sso.yml / manage_authentik.yml,
# so deploy_media_gallery.yml failed with 'authentik_url is undefined'. Define it
# globally so every role/playbook resolves it.
authentik_url: "https://auth.chi.lab.amd-e.com"
ip_loadbalancer: "172.16.0.30"
ip_mail_server: "172.16.0.40"
ip_grafana: "172.16.0.41"
ip_vm: "172.16.0.42"
# tailscale-gw is the SDN VNet gateway itself — there is no separate
# 172.16.0.101 device. Kept as ip_tailscale_gw for callers; equals
# net_private_gw.
ip_tailscale_gw: "172.16.0.1"
ip_tailscale_gw_bwt: "10.99.0.3"  # tailscale-gw eth2 on `bwt` SDN bridge — subnet router into 10.99.0.0/24
ip_hermes_gateway: "172.16.0.50"
ip_media_gallery: "172.16.0.46"
ip_media_ingest: "172.16.0.47"
# Frigate NVR (CT 170, pve01). Private-subnet IP for the eth1 interface; eth0
# is DHCP on the LAN so Frigate can reach the go2rtc RTSP source + HA MQTT.
ip_frigate: "172.16.0.45"

# Subnets the tailscale-gw advertises to the tailnet. Both 172.16/24 (private
# SDN) and 10.99/24 (BWT lab) flow through CT 101. The same CT carries an IP
# on each bridge (eth1=private 172.16.0.1, eth2=bwt 10.99.0.3) plus
# MASQUERADE for outbound egress on eth0.
tailscale_advertised_routes:
  - "{{ net_private_range }}"
  - "{{ net_bwt_range }}"

# Email destination for the Grafana fallback contact point. Routes through
# mail-01's postfix relay -> iCloud SMTP. Used as a backup channel when the
# HA webhook is broken.
alert_email_to: "amdnative@icloud.com"

# Cluster Nodes (Physical LAN)
# Used for SDN Peering and Corosync
proxmox_cluster_peers: "192.168.86.11,192.168.86.12,192.168.86.13"

# BWT Lab (Bandwidth Throttle reproduction lab) — isolated SDN VNet
# for reproducing Tanium platform bandwidth-throttle enforcement issues
# (NEC 00271560 and similar). Disjoint from `private` so the main lab is
# undisturbed by load tests. See docs/ipam.md and ansible/roles/proxmox_sdn/.
net_bwt_range: "10.99.0.0/24"
net_bwt_gw: "10.99.0.1"
net_bwt_bridge: "bwt"
net_bwt_vlan_tag: 200
net_bwt_mtu: 1450  # VXLAN overhead, same as `private`
lb_lan_ingress_ip: "192.168.86.86"  # lb-01 LAN ingress (AdGuard static lease "lb-01-ingress", Google Home forwards :80/:443 here)
