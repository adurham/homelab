# ansible.cfg

[defaults]
inventory = ./inventory/proxmox.yml
forks = 10
# Logging to disk is disabled — ansible-inventory --host and any debug task
# dump full hostvars (including vault-decrypted secrets) into log_path. Keep
# this commented out unless you have a sanitization pipeline for the log.
# log_path = ./ansible.log
host_key_checking = True
fact_caching = jsonfile
fact_caching_connection = ./facts_cache
fact_caching_timeout = 7200
vault_password_file = .vault_pass

[inventory]
enable_plugins = yaml, ini

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
