---
# Renders homeassistant/go2rtc.yaml.j2 with Nest OAuth credentials pulled
# live from HA's own storage (core.config_entries + application_credentials),
# then pushes it to /config/go2rtc.yaml on the HA host and restarts the
# go2rtc add-on so it reloads.
#
# WHY pull creds at deploy time instead of vaulting them: the Nest refresh
# token is already maintained by HA's Nest integration. Sourcing it live
# means there is exactly ONE authoritative copy (HA's) and the rendered
# go2rtc.yaml is never committed with secrets. The repo only holds the
# template with {{ jinja }} placeholders.
#
# HAOS has no python interpreter -> gather_facts: false, raw + local scp only.
#
# Usage:
#   cd ~/repos/homelab && ansible-playbook ansible/deploy_go2rtc.yml
- name: Deploy go2rtc config to HA host
  hosts: homeassistant
  gather_facts: false
  vars:
    ha_root: "{{ playbook_dir }}/../homeassistant"
    go2rtc_addon_slug: a889bffc_go2rtc
    ssh_opts: "-o StrictHostKeyChecking=accept-new"

  tasks:
    - name: Pull Nest OAuth creds from HA storage on the host
      ansible.builtin.raw: >-
        jq -rn
        '"project_id="
        + (input.data.entries[] | select(.domain=="nest") | .data.project_id)'
        /config/.storage/core.config_entries
      register: _ignored
      changed_when: false
      # Real values are fetched in the structured task below; this is a smoke
      # test that jq + the storage file are present before we render.

    - name: Fetch project_id, refresh_token, client_id, client_secret
      ansible.builtin.raw: |
        set -e
        PID=$(jq -r '.data.entries[] | select(.domain=="nest") | .data.project_id' /config/.storage/core.config_entries)
        RT=$(jq -r '.data.entries[] | select(.domain=="nest") | .data.token.refresh_token' /config/.storage/core.config_entries)
        CID=$(jq -r '.data.items[]? | select(.domain=="nest") | .client_id' /config/.storage/application_credentials)
        CSEC=$(jq -r '.data.items[]? | select(.domain=="nest") | .client_secret' /config/.storage/application_credentials)
        printf '%s\n%s\n%s\n%s\n' "$PID" "$RT" "$CID" "$CSEC"
      register: nest_creds
      changed_when: false

    - name: Parse creds into facts
      ansible.builtin.set_fact:
        nest_project_id: "{{ (nest_creds.stdout_lines | reject('match','^\\s*$') | list)[0] }}"
        nest_refresh_token: "{{ (nest_creds.stdout_lines | reject('match','^\\s*$') | list)[1] }}"
        nest_client_id: "{{ (nest_creds.stdout_lines | reject('match','^\\s*$') | list)[2] }}"
        nest_client_secret: "{{ (nest_creds.stdout_lines | reject('match','^\\s*$') | list)[3] }}"
      no_log: true

    - name: Render go2rtc.yaml locally from template
      ansible.builtin.template:
        src: "{{ ha_root }}/go2rtc.yaml.j2"
        dest: "/tmp/go2rtc.rendered.yaml"
        mode: "0600"
      delegate_to: localhost
      no_log: true

    - name: Copy rendered config to HA host /config/go2rtc.yaml
      ansible.builtin.shell: >-
        scp -P {{ ansible_port }} {{ ssh_opts }}
        /tmp/go2rtc.rendered.yaml
        {{ ansible_user }}@{{ ansible_host }}:/config/go2rtc.yaml
      delegate_to: localhost
      register: scp_go2rtc
      changed_when: scp_go2rtc.rc == 0
      no_log: true

    - name: Shred the local rendered file (held secrets)
      ansible.builtin.command: shred -u /tmp/go2rtc.rendered.yaml
      delegate_to: localhost
      changed_when: true

    - name: Restart go2rtc add-on via Supervisor API
      ansible.builtin.raw: >-
        curl -s -X POST -H "Authorization: Bearer $SUPERVISOR_TOKEN"
        http://supervisor/addons/{{ go2rtc_addon_slug }}/restart
      register: addon_restart
      changed_when: true

    - name: Show restart result
      ansible.builtin.debug:
        msg: "go2rtc add-on restart: {{ addon_restart.stdout | default('') | trim }}"
