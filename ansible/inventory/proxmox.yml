all:
  children:
    proxmox_nodes:
      hosts:
        pve01:
          ansible_host: 192.168.86.11
        pve02:
          ansible_host: 192.168.86.12
        pve03:
          ansible_host: 192.168.86.13
      vars:
        ansible_user: root
        # Usage: ansible-playbook -i ansible/inventory/proxmox.yml ... --ask-pass
        # Or ensure SSH keys are deployed.

    # Containers
    # ansible_host values reference the ip_* vars from
    # group_vars/all/vars.yml so the IP layout has a single source of truth
    # (see docs/ipam.md). Tailscale-gw is the exception — it uses its LAN
    # IP, not its private-subnet IP, because reaching the subnet router
    # via the subnet it routes is circular.
    loadbalancer:
      hosts:
        lb-01:
          ansible_host: "{{ ip_loadbalancer }}"
          vmid: 103
          target_node: pve02
      vars:
        ansible_user: root

    authentik_server:
      hosts:
        authentik:
          ansible_host: "{{ ip_authentik }}"
          vmid: 100
          target_node: pve01
      vars:
        ansible_user: root

    dns_server:
      hosts:
        dns-01:
          ansible_host: "{{ ip_dns_primary }}"
          vmid: 102
          target_node: pve02
      vars:
        ansible_user: root

    proxy_server:
      hosts:
        proxy-01:
          ansible_host: "{{ ip_proxy }}"
          vmid: 108
          target_node: pve03
      vars:
        ansible_user: root

    tailscale:
      hosts:
        tailscale-gw:
          # LAN IP, not ip_tailscale_gw (172.16.0.101). Reaching the gateway
          # via 172.16.0.x is circular — Tailscale won't route to its own
          # subnet-router host through itself. The Tailscale IP
          # (100.86.168.35) gets intercepted by Tailscale SSH and requires
          # browser auth, which breaks automation.
          ansible_host: 192.168.86.32
          vmid: 101
          target_node: pve01
      vars:
        ansible_user: root

    mail_server:
      hosts:
        mail-01:
          ansible_host: "{{ ip_mail_server }}"
          vmid: 104
          target_node: pve03
      vars:
        ansible_user: root

    ntp_server:
      hosts:
        ntp-01:
          ansible_host: "{{ ip_ntp_server }}"
          vmid: 105
          target_node: pve03
      vars:
        ansible_user: root

    # Parent group for all CTs on the 172.16.0.0/24 private subnet that need
    # to be reached through the personal MacBook (Tailscale jump host) when
    # ansible is invoked from the work MacBook. The actual ProxyCommand lives
    # in inventory/group_vars/private_subnet.yml. monitoring has its own
    # group_vars/monitoring.yml that overrides this for vm-01/graf-01 (same
    # ProxyCommand value, kept distinct because monitoring predated this group).
    private_subnet:
      children:
        loadbalancer:
        authentik_server:
        dns_server:
        proxy_server:
        tailscale:
        mail_server:
        ntp_server:
        tanium_clients:

    # Tanium Cluster
    tanium_cluster:
      children:
        tanium_servers:
          hosts:
            ts-01:
              vmid: 200
              vm_cores: 4
              vm_memory: 32768
              vm_disk: 500
              ansible_host: 172.16.0.51 # Placeholder IP
            ts-02:
              vmid: 201
              vm_cores: 4
              vm_memory: 32768
              vm_disk: 500
              ansible_host: 172.16.0.52 # Placeholder IP
        tanium_modules:
          hosts:
            tms-01:
              vmid: 202
              vm_cores: 8
              vm_memory: 32768
              vm_disk: 1000
              ansible_host: 172.16.0.53 # Placeholder IP
            tms-02:
              vmid: 203
              vm_cores: 8
              vm_memory: 32768
              vm_disk: 1000
              ansible_host: 172.16.0.54 # Placeholder IP
        tanium_zones:
          hosts:
            tzs-01:
              vmid: 204
              vm_cores: 4
              vm_memory: 16384
              vm_disk: 500
              ansible_host: 172.16.0.55 # Placeholder IP
            tzs-02:
              vmid: 205
              vm_cores: 4
              vm_memory: 16384
              vm_disk: 500
              ansible_host: 172.16.0.56 # Placeholder IP
      vars:
        # ansible_user / SSH options for tanium_cluster live in
        # inventory/group_vars/tanium_cluster.yml so they override the
        # defaults set in group_vars/all.yml.
        vm_storage: nvme-data
        vm_bridge: private
        vm_iso: "local:iso/TanOS.1.8.6.0134-DEV.iso"
    # Tanium Clients
    tanium_clients:
      hosts:
        tc-ubuntu22:
          ansible_host: 172.16.0.61
          vmid: 301
          template: ubuntu-22.04-standard_22.04-1_amd64.tar.zst
          target_node: pve01
        tc-ubuntu24:
          ansible_host: 172.16.0.62
          vmid: 302
          template: ubuntu-24.04-standard_24.04-2_amd64.tar.zst
          target_node: pve01
        tc-rocky8:
          ansible_host: 172.16.0.63
          vmid: 303
          template: rockylinux-8-default_20260112_amd64.tar.xz
          template_url: "https://images.linuxcontainers.org/images/rockylinux/8/amd64/default/20260112_06:33/rootfs.tar.xz"
          target_node: pve01
        tc-rocky9:
          ansible_host: 172.16.0.64
          vmid: 304
          template: rockylinux-9-default_20240912_amd64.tar.xz
          target_node: pve01
        tc-debian12:
          ansible_host: 172.16.0.65
          vmid: 305
          template: debian-12-standard_12.12-1_amd64.tar.zst
          target_node: pve01
        tc-debian11:
          ansible_host: 172.16.0.66
          vmid: 306
          template: debian-11-default_20260111_amd64.tar.xz
          template_url: "https://images.linuxcontainers.org/images/debian/bullseye/amd64/default/20260111_05:24/rootfs.tar.xz"
          target_node: pve02
        tc-oracle9:
          ansible_host: 172.16.0.67
          vmid: 307
          template: oracle-9-default_20260112_amd64.tar.xz
          template_url: "https://images.linuxcontainers.org/images/oracle/9/amd64/default/20260112_07:46/rootfs.tar.xz"
          target_node: pve02
        tc-oracle8:
          ansible_host: 172.16.0.68
          vmid: 308
          template: oracle-8-default_20260112_amd64.tar.xz
          template_url: "https://images.linuxcontainers.org/images/oracle/8/amd64/default/20260112_07:46/rootfs.tar.xz"
          os_family: RedHat
          os_distro_major: "8"
          os_distro: OracleLinux
          ansible_python_interpreter: /usr/bin/python3.9
          target_node: pve02
        tc-alma9:
          ansible_host: 172.16.0.69
          vmid: 309
          template: almalinux-9-default_20240911_amd64.tar.xz
          target_node: pve02
        tc-alma8:
          ansible_host: 172.16.0.70
          vmid: 310
          template: alma-8-default_20260112_amd64.tar.xz
          template_url: "https://images.linuxcontainers.org/images/almalinux/8/amd64/default/20260112_06:09/rootfs.tar.xz"
          target_node: pve03

        tc-rhel8:
          ansible_host: 172.16.0.74
          vmid: 314
          template: alma-8-default_20260112_amd64.tar.xz
          template_url: "https://images.linuxcontainers.org/images/almalinux/8/amd64/default/20260112_06:09/rootfs.tar.xz"
          target_node: pve03
          ansible_python_interpreter: /usr/bin/python3.9

        tc-rhel9:
          ansible_host: 172.16.0.72
          vmid: 312
          template: centos-9-stream-default_20240828_amd64.tar.xz
          target_node: pve03
        tc-suse15:
          ansible_host: 172.16.0.73
          vmid: 313
          template: opensuse-15.6-default_20240910_amd64.tar.xz
          os_family: Suse
          os_distro_major: "15"
          os_distro: openSUSE
          ansible_python_interpreter: /usr/bin/python3.11
          target_node: pve03

    # Hosts that have completed the promtail/node_exporter -> Grafana Alloy
    # cutover. Membership flips per-host as Phase 2/3 of the migration
    # progresses. Effects:
    #   - deploy_monitoring.yml skips installing common_monitoring + promtail
    #   - alloy is deployed without the `agent="alloy"` Phase-1 marker label
    #   - legacy promtail + node_exporter services are stopped + disabled
    #   - vm-01's prometheus.yml drops the host from node_exporter scrape
    # See docs/promtail-to-alloy-plan.md.
    alloy_cutover:
      hosts:
        vm-01:
        graf-01:
        lb-01:
        authentik:
        dns-01:
        proxy-01:
        tailscale-gw:
        mail-01:
        ntp-01:
        tc-ubuntu22:
        tc-ubuntu24:
        tc-rocky8:
        tc-rocky9:
        tc-debian12:
        tc-debian11:
        tc-oracle9:
        tc-oracle8:
        tc-alma9:
        tc-alma8:
        tc-rhel8:
        tc-rhel9:
        tc-suse15:

    # Monitoring Infrastructure
    monitoring:
      children:
        victoriametrics:
          hosts:
            vm-01:
              # 172.16.0.40 was already in use by mail-01 (CT 104, ip_mail_server)
              # — kept colliding via ARP. Moved to .42 (next free after graf-01 at .41).
              ansible_host: "{{ ip_vm }}"
              vmid: 106
              template: debian-12-standard_12.12-1_amd64.tar.zst
              target_node: pve01
              features: "nesting=1"
              net_private_ip: "{{ ip_vm }}/24"
        grafana:
          hosts:
            graf-01:
              ansible_host: "{{ ip_grafana }}"
              vmid: 107
              template: debian-12-standard_12.12-1_amd64.tar.zst
              target_node: pve01
              features: "nesting=1"
              net_private_ip: 172.16.0.41/24

      vars:
        ansible_user: root
        # ansible_ssh_common_args lives in inventory/group_vars/monitoring.yml
        # (precedence — inventory-file group vars rank below group_vars/all.yml).

        vm_cores: 1
        vm_memory: 1024
        vm_swap: 512
        vm_disk: 8
        vm_bridge: private
        vm_storage: nvme-data
        vm_gw: 172.16.0.1
