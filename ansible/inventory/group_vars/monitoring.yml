---
# Monitoring CTs live on the 172.16.0.0/24 private subnet, so the work
# MacBook reaches them by jumping through the personal MacBook's
# Tailscale IP. accept-new auto-adds host keys on first connect.
#
# This must live in group_vars/monitoring.yml (not in the inventory file's
# `vars:` block) — the inventory-file group vars are at lower precedence
# than group_vars/all.yml, which sets a default ansible_ssh_common_args.
ansible_ssh_common_args: '-o ProxyCommand="ssh -W %h:%p -q adam.durham@100.66.19.20" -o StrictHostKeyChecking=accept-new'
